<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Security+ SY0-701</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
:root {
  --bg:#060a12;--surface:#0d1420;--border:rgba(255,255,255,0.08);
  --d1:#7C3AED;--d2:#DC2626;--d3:#0284C7;--d4:#D97706;--d5:#059669;
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;--text:#e2e8f0;--muted:#64748b;
  --mono:'Share Tech Mono',monospace;--sans:'Rajdhani',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overscroll-behavior:none}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px)}
.view{display:none;min-height:100vh;flex-direction:column}
.view.active{display:flex}
.hdr{position:sticky;top:0;z-index:100;background:rgba(6,10,18,0.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.hdr-left .sub{font-family:var(--mono);font-size:9px;color:var(--muted)}
.hdr-left .title{font-size:15px;font-weight:700;line-height:1.2}
.hdr-back{background:none;border:1px solid var(--border);color:var(--muted);padding:7px 13px;border-radius:8px;cursor:pointer;font-family:var(--mono);font-size:11px;min-height:36px}
.hdr-stats{display:flex;gap:14px}
.stat .lbl{font-family:var(--mono);font-size:9px;color:#374151}
.stat .val{font-family:var(--mono);font-size:13px;font-weight:700}
.content{flex:1;max-width:680px;width:100%;margin:0 auto;padding:18px 13px 70px}
/* REALM MAP */
.hero{text-align:center;padding:24px 0 20px}
.hero h1{font-size:22px;font-weight:700;margin-bottom:4px}
.hero p{color:var(--muted);font-size:13px;margin-bottom:18px}
.xp-wrap{max-width:240px;margin:0 auto}
.xp-track{height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.xp-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--d1),var(--d3));transition:width .6s ease}
.xp-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:5px}
.realm-list{display:flex;flex-direction:column;gap:10px}
.realm-card{border-radius:14px;overflow:hidden;border:1.5px solid rgba(255,255,255,0.06);background:var(--surface);cursor:pointer;transition:transform .15s}
.realm-card:active{transform:scale(0.98)}
.realm-card.locked{opacity:.4;cursor:not-allowed}
.realm-top{padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
.realm-card-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.realm-icon{font-size:28px;flex-shrink:0}
.realm-w{font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.realm-n{font-size:15px;font-weight:700;line-height:1.3}
.realm-ct .num{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1;text-align:right}
.realm-ct .lbl{font-family:var(--mono);font-size:9px;color:var(--muted);text-align:right}
.realm-bot{padding:7px 16px 12px;display:flex;gap:6px;flex-wrap:wrap}
.pip{padding:3px 10px;border-radius:20px;font-family:var(--mono);font-size:10px;font-weight:700;border:1px solid}
/* LEVEL MAP */
.lvl-list{display:flex;flex-direction:column;gap:9px}
.lvl-card{padding:14px 15px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.07);background:var(--surface);display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .15s;min-height:72px}
.lvl-card:active{transform:scale(0.98)}
.lvl-card.locked{opacity:.4;cursor:not-allowed}
.lvl-left{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.lvl-num{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:700;border:1.5px solid}
.lvl-name{font-size:14px;font-weight:700;line-height:1.3;margin-bottom:4px}
.lvl-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.lvl-obj{font-family:var(--mono);font-size:10px;color:var(--muted)}
.type-tag{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.06em}
.missed-badge{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.lvl-right{flex-shrink:0;margin-left:10px;display:flex;align-items:center;gap:8px}
.lvl-mastery{font-family:var(--mono);font-size:18px;font-weight:700}
/* RUNNER */
.phase-bar{display:flex;gap:6px;margin-bottom:18px}
.ph-seg{flex:1}
.ph-track{height:4px;border-radius:2px;margin-bottom:4px;transition:background .3s}
.ph-lbl{font-family:var(--mono);font-size:10px;font-weight:700;text-align:center}
.scenario-box{background:rgba(0,0,0,0.4);border-radius:12px;padding:14px 15px;margin-bottom:14px}
.sc-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.sc-tag{font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.sc-cia{font-family:var(--mono);font-size:9px;color:var(--muted);font-style:italic}
.sc-txt{color:#CBD5E1;font-size:13px;line-height:1.72}
.instr{font-family:var(--mono);font-size:11px;color:var(--muted);font-style:italic;text-align:center;margin-bottom:14px}
.meta-pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:6px}
.mpill{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 9px;border-radius:4px;letter-spacing:.08em;border:1px solid}
.meta-note{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:14px}
.pbq-item{border-radius:12px;padding:13px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.02);margin-bottom:10px;transition:border-color .2s,background .2s}
.pbq-item.ok{border-color:var(--green);background:rgba(34,197,94,0.05)}
.pbq-item.bad{border-color:var(--red);background:rgba(239,68,68,0.05)}
.pbq-hdr{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px}
.pbq-num{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700}
.pbq-lbl{flex:1}
.pbq-lbl-t{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:3px}
.pbq-lbl-d{font-family:var(--mono);font-size:11px;color:var(--muted)}
.pbq-ri{font-size:18px;flex-shrink:0}
.axis-sec{margin-bottom:10px}
.axis-lbl{font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.axis-fix{color:var(--red);font-size:10px;font-weight:600}
.axis-pills{display:flex;flex-wrap:wrap;gap:7px}
.apill{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;font-family:var(--sans);cursor:pointer;border:2px solid rgba(255,255,255,0.12);background:transparent;color:#64748b;transition:all .12s;min-height:38px}
.apill:disabled{cursor:default}
.apill.pc{border-color:var(--green)!important;background:rgba(34,197,94,0.15)!important;color:var(--green)!important}
.apill.pw{border-color:var(--red)!important;background:rgba(239,68,68,0.15)!important;color:var(--red)!important}
.expl{margin-top:10px;padding:10px 12px;border-radius:8px;background:rgba(0,0,0,0.3);font-size:12px;color:#94A3B8;line-height:1.65;border-left:3px solid}
.sbtn{width:100%;padding:15px;border-radius:10px;border:none;font-family:var(--mono);font-size:13px;font-weight:700;min-height:52px;cursor:pointer;transition:all .15s;letter-spacing:.05em;margin-top:4px}
.sbtn:active:not(:disabled){opacity:.8;transform:scale(.99)}
.sbtn:disabled{background:rgba(255,255,255,0.06)!important;color:#4B5563!important;cursor:not-allowed}
/* MCQ */
.mcq-prog{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.mcq-dots{display:flex;gap:5px}
.mcq-dot{width:8px;height:8px;border-radius:50%;transition:background .3s}
.qbox{background:rgba(0,0,0,0.4);border-radius:12px;padding:14px 15px;margin-bottom:14px;border-left:3px solid}
.qlbl{font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.qtxt{font-size:14px;font-weight:600;line-height:1.6}
.opts{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
.opt{padding:12px 14px;border-radius:10px;border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);cursor:pointer;display:flex;align-items:flex-start;gap:10px;font-size:13px;font-weight:600;line-height:1.45;min-height:48px;text-align:left;font-family:var(--sans);color:#94A3B8;width:100%;transition:all .15s}
.opt:disabled{cursor:default}
.opt.sel{border-color:var(--sel-c,var(--d1));background:rgba(124,58,237,0.12);color:#fff}
.opt.oc{border-color:var(--green)!important;background:rgba(34,197,94,0.12)!important;color:var(--green)!important}
.opt.ow{border-color:var(--red)!important;background:rgba(239,68,68,0.12)!important;color:var(--red)!important}
.opt-lt{flex-shrink:0;width:22px;height:22px;border-radius:50%;margin-top:1px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;background:rgba(255,255,255,0.07);color:#64748b;transition:all .15s}
.expbox{padding:12px 14px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);margin-bottom:14px}
.exp-t{color:#CBD5E1;font-size:13px;line-height:1.65;margin-bottom:10px}
.tip{padding:9px 12px;border-radius:8px;border-left:2px solid}
.tip-lbl{font-family:var(--mono);font-size:11px;font-weight:700}
.tip-txt{font-size:12px;color:#94A3B8}
/* RESULT */
.res-card{padding:26px 20px;border-radius:14px;text-align:center;border:2px solid;margin-bottom:14px}
.res-obj{font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px}
.res-score{font-family:var(--mono);font-size:64px;font-weight:700;line-height:1;margin-bottom:6px}
.res-sub{font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:18px}
.res-badge{display:inline-block;padding:7px 20px;border-radius:20px;font-family:var(--mono);font-size:11px;font-weight:700;border:1px solid}
.bdown{padding:16px;border-radius:12px;background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.07);margin-bottom:14px}
.bdown-title{font-family:var(--mono);font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.sbar{margin-bottom:12px}
.sbar-hdr{display:flex;justify-content:space-between;margin-bottom:5px}
.sbar-lbl{font-size:12px;color:#94A3B8;font-weight:600}
.sbar-val{font-family:var(--mono);font-size:12px;font-weight:700}
.sbar-track{height:6px;border-radius:3px;background:rgba(255,255,255,0.08);overflow:hidden}
.sbar-fill{height:100%;border-radius:3px;transition:width .7s ease}
.divider{height:1px;background:rgba(255,255,255,0.06);margin:14px 0}
/* MISSED */
.missed-sum{padding:12px 14px;border-radius:10px;margin-bottom:14px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.missed-sum-l{display:flex;align-items:center;gap:10px}
.missed-circle{width:36px;height:36px;border-radius:50%;background:rgba(239,68,68,0.2);border:1.5px solid rgba(239,68,68,0.4);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:14px;font-weight:700;color:var(--red);flex-shrink:0}
.missed-ttl{font-size:13px;font-weight:600;color:#CBD5E1}
.missed-s{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
.missed-ico{font-family:var(--mono);font-size:12px;color:var(--red);transition:transform .2s}
.missed-ico.open{transform:rotate(180deg)}
.missed-panel{display:none;margin-bottom:14px}
.missed-panel.open{display:block}
.m-sec-title{font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--red);margin-bottom:10px;padding:0 2px}
.m-item{padding:12px 13px;border-radius:10px;margin-bottom:8px;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2)}
.m-item-lbl{font-size:13px;font-weight:600;color:#E2E8F0;margin-bottom:8px;line-height:1.4}
.m-axes{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.m-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;font-family:var(--mono);font-size:11px}
.m-axis-name{color:var(--muted);width:70px;flex-shrink:0}
.m-yours{color:var(--red)}
.m-arr{color:var(--muted)}
.m-correct{color:var(--green)}
.m-exp{font-size:12px;color:#94A3B8;line-height:1.6;border-top:1px solid rgba(255,255,255,0.06);padding-top:8px}
.m-mcq-item{padding:12px 13px;border-radius:10px;margin-bottom:8px;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2)}
.m-mcq-q{font-size:13px;font-weight:600;color:#E2E8F0;margin-bottom:8px;line-height:1.4}
.m-mcq-ans{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;font-family:var(--mono);font-size:11px}
.m-mcq-tip{font-size:12px;color:#94A3B8;line-height:1.6;border-top:1px solid rgba(255,255,255,0.06);padding-top:8px}
.focus-hint{padding:12px 14px;border-radius:10px;margin-bottom:14px;background:rgba(217,119,6,0.08);border:1px solid rgba(217,119,6,0.25);font-size:13px;color:#CBD5E1;line-height:1.65}
.res-btns{display:flex;gap:10px}
.btn-sec{flex:1;padding:14px;border-radius:10px;font-family:var(--mono);font-size:12px;font-weight:700;border:1.5px solid;background:transparent;cursor:pointer;min-height:52px;letter-spacing:.04em}
.btn-pri{flex:1;padding:14px;border-radius:10px;font-family:var(--mono);font-size:12px;font-weight:700;border:none;cursor:pointer;min-height:52px;letter-spacing:.04em;color:#fff}
.btn-sec:active,.btn-pri:active{opacity:.8}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.ai{animation:fadeIn .25s ease both}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
</style>
</head>
<body>

<!-- REALM MAP -->
<div id="v-realm" class="view active">
  <div class="hdr">
    <div class="hdr-left"><div class="sub">SY0-701 TRAINER</div><div class="title">Security+</div></div>
    <div class="hdr-stats">
      <div class="stat"><div class="lbl">TOTAL XP</div><div class="val" id="h-xp" style="color:var(--d1)">0</div></div>
      <div class="stat"><div class="lbl">DONE</div><div class="val" id="h-done" style="color:var(--muted)">0/1</div></div>
    </div>
  </div>
  <div class="content">
    <div class="hero">
      <div style="font-size:46px;margin-bottom:10px">🛡️</div>
      <h1>Security+ Trainer</h1>
      <p>SY0-701 · PBQ + MCQ · Realm by Realm</p>
      <div class="xp-wrap">
        <div class="xp-track"><div class="xp-fill" id="g-xp-bar" style="width:2%"></div></div>
        <div class="xp-lbl" id="g-xp-lbl">0 / 100 XP</div>
      </div>
    </div>
    <div class="realm-list" id="realm-list"></div>
  </div>
</div>

<!-- LEVEL MAP -->
<div id="v-level" class="view">
  <div class="hdr">
    <button class="hdr-back" onclick="showRealm()">← REALMS</button>
    <div style="text-align:center">
      <div class="sub" id="lm-sub" style="color:var(--d1)"></div>
      <div class="title" id="lm-title"></div>
    </div>
    <div class="stat"><div class="lbl">DONE</div><div class="val" id="lm-done" style="color:var(--muted)">0/1</div></div>
  </div>
  <div class="content"><div class="lvl-list" id="level-list"></div></div>
</div>

<!-- RUNNER -->
<div id="v-runner" class="view">
  <div class="hdr">
    <button class="hdr-back" id="r-back">← LEVELS</button>
    <div style="text-align:center">
      <div class="sub" id="r-obj"></div>
      <div class="title" id="r-name"></div>
    </div>
    <div class="hdr-stats">
      <div class="stat"><div class="lbl">PBQ</div><div class="val" id="r-pbq" style="color:var(--muted)">60</div></div>
      <div class="stat"><div class="lbl">MCQ</div><div class="val" id="r-mcq" style="color:var(--muted)">40</div></div>
    </div>
  </div>
  <div class="content" id="r-content"></div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const REALMS=[
  {id:"d1",num:"1.0",name:"General Security Concepts",weight:12,icon:"🔐",color:"var(--d1)",
   levels:[{id:"d1l1",obj:"1.1",name:"Security Controls",type:"dual_classify",xp:100},{id:"d1l2",obj:"1.2",name:"Zero Trust Architecture",type:"classify",xp:100},{id:"d1l3",obj:"1.3",name:"Change Management",type:"triage",xp:100},{id:"d1l4",obj:"1.4",name:"Cryptographic Solutions",type:"match",xp:100},{id:"d1l5",obj:"1.0",name:"Realm 1 Review",type:"review",xp:150}]},
  {id:"d2",num:"2.0",name:"Threats, Vulnerabilities & Mitigations",weight:22,icon:"⚠️",color:"var(--d2)",levels:[{id:"d2l1",obj:"2.1",name:"Threat Actors & Motivations",type:"dual_classify",xp:100},{id:"d2l2",obj:"2.2",name:"Threat Vectors & Attack Surfaces",type:"scenario_builder",xp:100},{id:"d2l3",obj:"2.3",name:"Vulnerability Types",type:"classify",xp:100},{id:"d2l4",obj:"2.4",name:"Indicators of Malicious Activity",type:"soc_triage",xp:100},{id:"d2l5",obj:"2.5",name:"Mitigation Techniques",type:"match",xp:100},{id:"d2l6",obj:"2.0",name:"Realm 2 Review",type:"review",xp:150}]},
  {id:"d3",num:"3.0",name:"Security Architecture",weight:18,icon:"🏗️",color:"var(--d3)",levels:[]},
  {id:"d4",num:"4.0",name:"Security Operations",weight:28,icon:"⚙️",color:"var(--d4)",levels:[]},
  {id:"d5",num:"5.0",name:"Security Program Management",weight:20,icon:"📋",color:"var(--d5)",levels:[]},
];
const ALL_LEVELS=REALMS.flatMap(r=>r.levels);
const TOTAL_XP=ALL_LEVELS.reduce((s,l)=>s+l.xp,0)||100;

const D1L1={
  pbq:{
    cia_tag:"⚑ C · I · A",
    scenario:"Following an independent security assessment, a mid-sized enterprise must formally document its control posture before submitting a remediation plan to the board. Each control must be classified across two independent axes. Axis 1: Category — how the control is implemented. Axis 2: Type — what the control does when activated. Both axes must be correct to receive credit.",
    instruction:"For each control select its Category AND its Type. Both must be set before you can submit.",
    items:[
      {id:"i1",label:"Deploy automated patch management applying OS updates within 72 hours of critical advisory",desc:"System-driven remediation of known vulnerabilities"},
      {id:"i2",label:"Enforce Acceptable Use Policy with documented disciplinary consequences, distributed at onboarding and annually",desc:"Policy mandate directing user behavior"},
      {id:"i3",label:"Configure SIEM rules to alert when privileged accounts authenticate outside business hours or from unrecognized IPs",desc:"Event-driven alerting on anomalous authentication"},
      {id:"i4",label:"Deploy DLP agent on all endpoints to inspect and block outbound transfers matching data classification labels",desc:"Content inspection with active blocking enforcement"},
      {id:"i5",label:"Establish formal account remediation procedure requiring IT to disable, review, and document flagged accounts within 5 business days",desc:"Governance-mandated remediation SLA"},
      {id:"i6",label:"Display legal warning banner on all system login screens stating unauthorized access is monitored and subject to prosecution",desc:"System-displayed legal notice at every authentication point"},
      {id:"i7",label:"Implement mandatory security awareness training with documented completion tracking as a condition of system access",desc:"People-executed training with governance-enforced enrollment"},
      {id:"i8",label:"Configure automated revocation of system access for accounts inactive for 45 or more consecutive days",desc:"System-enforced elimination of dormant credential risk"},
    ],
    categories:[{id:"c1",name:"Technical"},{id:"c2",name:"Managerial"},{id:"c3",name:"Operational"},{id:"c4",name:"Physical"}],

        {id:"c", label:"The first is SQL injection — unsanitized input manipulates the database query structure on the server. The second is stored XSS — malicious script is injected into stored content and executes in victims' browsers client-side"},
        {id:"d", label:"Both are XSS — both vulnerabilities exploit unsanitized user input in web applications"},
      ],
      correct:"c",
      explanation:"SQL injection manipulates server-side database query structure by injecting SQL syntax into unsanitized input fields — the attack target is the database. The ' OR '1'='1'-- payload alters query logic to return all records. Stored XSS injects malicious client-side script into content that is stored and later served to other users — the attack target is the victim's browser. Both exploit unsanitized input but attack different layers: SQLi attacks the server/database, XSS attacks the client/browser.",
      exam_tip:"SQLi = server-side, manipulates database query, target is the database. XSS = client-side, executes script in victim browser, target is the user. Both use unsanitized input — ask where the payload executes: database server or browser.",
    },
    {
      id:"m4",
      q:"An attacker sends a small DNS query with a spoofed source IP set to a target organization's address. The query is sent to thousands of open DNS resolvers, each of which sends a response many times larger than the query back to the spoofed address. The target's network is overwhelmed by the volume of DNS responses. Which network attack type does this represent, and what two characteristics define it?",
      options:[
        {id:"a", label:"Reflected DDoS — traffic is reflected off third-party servers, but there is no amplification because DNS responses are the same size as queries"},
        {id:"b", label:"DNS amplification — a form of amplified and reflected DDoS where spoofed queries cause DNS resolvers to send disproportionately large responses to the victim, combining reflection (traffic redirected via third parties) and amplification (response much larger than query)"},
        {id:"c", label:"Credential replay — DNS tokens are captured and replayed to overwhelm the target"},
        {id:"d", label:"On-path attack — the attacker positions between the DNS resolver and the target to intercept and amplify traffic"},
      ],
      correct:"b",
      explanation:"DNS amplification is both reflected and amplified. Reflected: the attacker spoofs the victim's IP so that third-party DNS resolvers unknowingly send traffic to the victim — the attacker never directly attacks the target. Amplified: DNS responses are significantly larger than the queries that triggered them — the attacker sends a small query and the victim receives a large response, multiplying the attack volume. These two characteristics — reflection and amplification — are explicitly listed in the 2.4 objectives as sub-types of DDoS.",
      exam_tip:"Amplified DDoS = response is much larger than the query, multiplies attack volume. Reflected DDoS = traffic is redirected through third-party servers to the victim. DNS amplification combines both — spoofed source causes resolvers to send large responses to the victim.",
    },
    {
      id:"m5",
      q:"A group of activists who oppose a corporation's environmental practices gains access to the company's internal systems and publishes confidential internal communications on a public website. The group releases a statement claiming the action was taken to expose the company's concealment of pollution data. No ransom is demanded and no financial accounts are accessed. Which threat actor type and motivation does this BEST represent?",
      options:[
        {id:"a", label:"Organized crime motivated by data exfiltration — publishing stolen data is a common extortion precursor"},
        {id:"b", label:"Hacktivist motivated by philosophical and political beliefs — the group acted to advance an ideological cause rather than for financial gain"},
        {id:"c", label:"Insider threat motivated by revenge — the access and knowledge of internal systems suggests an insider"},
        {id:"d", label:"Nation-state motivated by espionage — environmental data has strategic intelligence value"},
      ],
      correct:"b",
      explanation:"Hacktivists are threat actors motivated by philosophical or political beliefs — they use hacking as a form of activism or protest. Publishing internal communications to expose perceived wrongdoing, releasing a manifesto, and having no financial motivation are defining hacktivist characteristics. Organized crime would seek financial gain. Nation-state would pursue strategic intelligence objectives. The ideological motivation and public disclosure method are the key distinguishing attributes.",
      exam_tip:"Hacktivist = motivated by philosophical/political beliefs, uses attacks to promote a cause, typically external, often involves data disclosure or defacement rather than financial crime. The absence of financial motivation and presence of ideological messaging are the key indicators.",
    },
    {
      id:"m6",
      q:"An attacker calls an employee at a financial services firm, identifying themselves as a senior IT security analyst conducting an urgent account security review. The caller states that the employee's account has been flagged for suspicious activity and that their password must be reset immediately to prevent a lockout. The employee provides their current password. Which social engineering technique does this represent, and what role does pretexting play?",
      options:[
        {id:"a", label:"Phishing — the attack used a fabricated scenario delivered over a communication channel"},
        {id:"b", label:"Vishing — the attack was conducted over a voice call. Pretexting is the fabricated scenario (fake IT analyst identity and urgent account review) used to make the vishing call convincing"},
        {id:"c", label:"Smishing — the employee received the request via a text message follow-up after the call"},
        {id:"d", label:"Pretexting — pretexting and vishing are the same technique applied to voice calls"},
      ],
      correct:"b",
      explanation:"Vishing is social engineering conducted over a voice call — the channel classification is voice, therefore vishing. Pretexting is the fabricated scenario used within the attack: the fake IT analyst identity, the false claim of suspicious activity, and the manufactured urgency are all components of the pretext. Pretexting is a technique that supports vishing — it is not a separate attack type here. The distinction: vishing identifies the channel, pretexting identifies the deception mechanism used within that channel.",
      exam_tip:"Channel determines the top-level classification: voice call = vishing, SMS = smishing, email = phishing. Pretexting is the fabricated scenario used within any of these attacks — it is a supporting technique, not a channel classification. Vishing + pretexting frequently appear together.",
    },
    {
      id:"m7",
      q:"A company's IT team discovers that three servers in a legacy data center are running an operating system version that the vendor stopped supporting and patching 26 months ago. The servers host an internal application that the business requires for daily operations and cannot be migrated for at least 6 months. Which vulnerability type do these servers represent, and which mitigation technique is MOST appropriate given the migration timeline?",
      options:[
        {id:"a", label:"Zero-day vulnerability — unsupported systems have unpatched vulnerabilities that are unknown to the vendor"},
        {id:"b", label:"End-of-life vulnerability — the OS no longer receives security updates, making any newly discovered vulnerabilities permanently unpatched. Isolation is the most appropriate mitigation: removing the servers from general network access contains the risk without decommissioning systems that are still operationally required"},
        {id:"c", label:"Misconfiguration vulnerability — running an old OS version is a configuration choice that can be corrected by updating settings"},
        {id:"d", label:"End-of-life vulnerability — decommissioning is the most appropriate mitigation because EOL systems should always be immediately removed"},
      ],
      correct:"b",
      explanation:"End-of-life (EOL) systems are those no longer receiving vendor security updates — any newly discovered vulnerabilities will never be patched, creating a permanent and growing attack surface. The correct mitigation when decommissioning is not immediately possible is isolation: removing network connectivity from the EOL systems to contain the risk while the migration plan is completed. Decommissioning is the ultimate solution but cannot be applied when the systems are still operationally required — isolation bridges the gap.",
      exam_tip:"EOL = no more vendor patches, permanent vulnerability accumulation. Isolation = remove from network access to contain risk when immediate decommissioning is not possible. This is a 2.3 + 2.5 integration: identify the vulnerability type, then select the appropriate mitigation given operational constraints.",
    },
    {
      id:"m8",
      q:"An attacker compromises a small software development firm that produces a widely used open-source code library. The attacker injects malicious code into a legitimate update of the library. The update is downloaded and integrated by hundreds of organizations that depend on the library for their applications. Which threat vector does this BEST represent?",
      options:[
        {id:"a", label:"Vulnerable software — the library contained an exploitable vulnerability that was not discovered during code review"},
        {id:"b", label:"Supply chain — the attacker compromised a software provider whose product is trusted and distributed to many downstream organizations, using that trust relationship to propagate malicious code"},
        {id:"c", label:"Malicious update — the attack vector is the update mechanism itself, which is a separate category from supply chain"},
        {id:"d", label:"Watering hole — the attacker compromised a resource known to be used by the target organizations"},
      ],
      correct:"b",
      explanation:"Supply chain attacks target a trusted third-party software, hardware, or service provider to reach downstream organizations through the existing trust relationship. A software provider whose library is integrated by hundreds of organizations is a high-value supply chain target — a single compromise propagates to all consumers of that library. The malicious update is the delivery mechanism, but the attack vector is the supply chain relationship between the library provider and its consumers.",
      exam_tip:"Supply chain = attacker compromises a trusted provider to reach downstream targets through the trust relationship. Software providers, hardware manufacturers, and MSPs are the three supply chain categories in 2.2. Malicious update is a malware delivery mechanism — supply chain is the attack vector that enabled it.",
    },
    {
      id:"m9",
      q:"A forensic analyst investigating a compromised executive workstation finds a hidden process that has been running for 11 weeks. The process is not visible in the task manager, does not appear in the running services list, and has modified system calls to hide its presence from the operating system. A separate investigation on another workstation finds a process silently capturing every keystroke and transmitting the data to an external IP every 6 hours. Which option CORRECTLY identifies both malware types?",
      options:[
        {id:"a", label:"Both are spyware — any malware that operates silently and transmits data is classified as spyware"},
        {id:"b", label:"The first is a trojan — it disguised itself as a legitimate process. The second is spyware — it monitors and transmits user activity"},
        {id:"c", label:"The first is a rootkit — it operates at a system level to conceal itself from the OS by modifying system calls. The second is a keylogger — it specifically captures keystrokes and exfiltrates them, distinct from broader spyware"},
        {id:"d", label:"Both are rootkits — any malware that hides itself from detection tools is a rootkit"},
      ],
      correct:"c",
      explanation:"Rootkit: modifies system calls and OS structures to conceal itself and other processes from detection tools including task manager and service lists. Kernel or OS-level self-concealment is the defining rootkit characteristic — it attacks the integrity of the OS itself. Keylogger: specifically captures keystrokes and exfiltrates them — it is targeted input surveillance. Spyware is a broader category covering general activity monitoring. CompTIA lists keylogger and spyware separately because their mechanisms, detection signatures, and forensic indicators differ. A keylogger is a specific type within the spyware family but is classified independently on the exam.",
      exam_tip:"Rootkit = OS/kernel-level, conceals itself by modifying system calls, invisible to standard tools. Keylogger = captures keystrokes specifically, exfiltrates input data. Spyware = broader surveillance category. When a scenario describes self-concealment via system call modification, the answer is rootkit.",
    },
    {
      id:"m10",
      q:"A security administrator needs to prevent users from executing any software that has not been explicitly approved by the IT security team. The environment has experienced incidents involving unapproved remote access tools and cryptocurrency miners installed by end users. Which control BEST meets this requirement?",
      options:[
        {id:"a", label:"Endpoint protection platform — scans for known malware signatures and blocks detected threats before execution"},
        {id:"b", label:"Application allow list — permits only explicitly approved applications to execute and blocks everything else by default, regardless of whether it is known to be malicious"},
        {id:"c", label:"Host-based firewall — blocks inbound and outbound network connections from unauthorized applications"},
        {id:"d", label:"Patching — keeping software up to date prevents exploitation of the vulnerabilities that unauthorized tools rely on"},
      ],
      correct:"b",
      explanation:"An application allow list operates on a default-deny model: only applications explicitly approved and listed are permitted to execute. Everything else is blocked regardless of whether it is known malicious software. Endpoint protection blocks known threats based on signatures or behavior — it cannot block unknown or legitimately appearing unauthorized software. A host-based firewall controls network traffic but does not prevent local application execution. Patching closes known vulnerabilities but does not prevent unauthorized software from running.",
      exam_tip:"Allow list = default deny, only approved apps execute, blocks unknown and unauthorized software regardless of malicious intent. Endpoint protection = blocks known threats only, default allow for unknown software. When the requirement is to prevent any unauthorized software from executing, the answer is application allow list.",
    },
  ],
};

const LEVEL_DATA={d1l1:D1L1,d1l2:D1L2,d1l3:D1L3,d1l4:D1L4,d1l5:D1L5,d2l1:D2L1,d2l2:D2L2,d2l3:D2L3,d2l4:D2L4,d2l5:D2L5,d2l6:D2L6};

// ── PROGRESS ─────────────────────────────────────────────────────────────────
function loadP(){try{return JSON.parse(localStorage.getItem('sp_v2')||'{}')}catch{return{}}}
function saveP(p){localStorage.setItem('sp_v2',JSON.stringify(p))}
function getLP(id){return loadP()[id]||{completed:false,mastery:0,attempts:0,xp:0,missedPBQ:[],missedMCQ:[]}}
function setLP(id,d){const p=loadP();p[id]=d;saveP(p)}
function unlocked(id){
  if(id==='d1l1'||id==='d1l2'||id==='d1l3'||id==='d1l4'||id==='d1l5'||id==='d2l1'||id==='d2l2'||id==='d2l3'||id==='d2l4'||id==='d2l5'||id==='d2l6')return true;
  for(const r of REALMS){
    const i=r.levels.findIndex(l=>l.id===id);
    if(i>0)return getLP(r.levels[i-1].id).completed;
    if(i===0){const ri=REALMS.indexOf(r);return ri===0||REALMS[ri-1].levels.every(l=>getLP(l.id).completed)}
  }
  return false;
}

// ── NAV ───────────────────────────────────────────────────────────────────────
let CR=null,CL=null;
function show(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0)}
function showRealm(){renderRealm();show('v-realm')}
function showLevel(rid){CR=REALMS.find(r=>r.id===rid);if(CR){renderLevel();show('v-level')}}
function showRunner(lid){CL=ALL_LEVELS.find(l=>l.id===lid);if(CL&&unlocked(lid)){initRunner();show('v-runner')}}

// ── REALM MAP ─────────────────────────────────────────────────────────────────
function renderRealm(){
  const p=loadP();
  const xpE=ALL_LEVELS.reduce((s,l)=>s+(p[l.id]?.xp||0),0);
  const done=ALL_LEVELS.filter(l=>p[l.id]?.completed).length;
  document.getElementById('h-xp').textContent=xpE;
  document.getElementById('h-done').textContent=done+'/'+ALL_LEVELS.length;
  document.getElementById('g-xp-bar').style.width=Math.max(2,(xpE/TOTAL_XP)*100)+'%';
  document.getElementById('g-xp-lbl').textContent=xpE+' / '+TOTAL_XP+' XP';
  const list=document.getElementById('realm-list');list.innerHTML='';
  REALMS.forEach((r,ri)=>{
    const done=r.levels.filter(l=>p[l.id]?.completed).length;
    const lock=ri>0&&!REALMS[ri-1].levels.every(l=>p[l.id]?.completed)&&!['d2'].includes(r.id);
    const c=r.color;
    const card=document.createElement('div');
    card.className='realm-card ai'+(lock?' locked':'');
    card.style.cssText=`border-color:${lock?'rgba(255,255,255,0.06)':`color-mix(in srgb,${c} 35%,transparent)`};animation-delay:${ri*.05}s`;
    if(!lock)card.onclick=()=>showLevel(r.id);
    const pips=r.levels.map(l=>{
      const lp=p[l.id];const lu=unlocked(l.id);
      return`<div class="pip" style="background:${lp?.completed?`color-mix(in srgb,${c} 18%,transparent)`:'rgba(255,255,255,0.05)'};border-color:${lp?.completed?c:lu?'rgba(255,255,255,0.2)':'rgba(255,255,255,0.07)'};color:${lp?.completed?c:lu?'#94A3B8':'#374151'}">${lp?.completed?'✓ ':lu?'▶ ':'🔒 '}${l.obj}</div>`;
    }).join('');
    card.innerHTML=`<div class="realm-top" style="background:linear-gradient(135deg,color-mix(in srgb,${c} 7%,transparent),transparent)">
      <div class="realm-card-left"><div class="realm-icon">${r.icon}</div>
      <div><div class="realm-w" style="color:${c}">REALM ${ri+1} · ${r.weight}% OF EXAM${lock?' · 🔒':''}</div><div class="realm-n">${r.name}</div></div></div>
      <div class="realm-ct"><div class="num" style="color:${c}">${done}/${r.levels.length}</div><div class="lbl">levels</div></div>
    </div>
    <div class="realm-bot">${r.levels.length?pips:'<div style="font-family:var(--mono);font-size:10px;color:var(--muted)">Coming soon</div>'}</div>`;
    list.appendChild(card);
  });
}

// ── LEVEL MAP ─────────────────────────────────────────────────────────────────
function renderLevel(){
  const r=CR;const c=r.color;const p=loadP();
  const done=r.levels.filter(l=>p[l.id]?.completed).length;
  document.getElementById('lm-sub').textContent=r.num+' · '+r.weight+'% OF EXAM';
  document.getElementById('lm-sub').style.color=c;
  document.getElementById('lm-title').textContent=r.name;
  document.getElementById('lm-done').textContent=done+'/'+r.levels.length;
  const list=document.getElementById('level-list');list.innerHTML='';
  r.levels.forEach((lv,li)=>{
    const lp=p[lv.id]||{};const lock=!unlocked(lv.id);
    const missed=(lp.missedPBQ?.length||0)+(lp.missedMCQ?.length||0);
    const mc=lp.mastery>=90?'var(--green)':lp.mastery>=70?c:'var(--amber)';
    const card=document.createElement('div');
    card.className='lvl-card ai'+(lock?' locked':'');
    card.style.cssText=`border-color:${lock?'rgba(255,255,255,0.06)':lp.completed?`color-mix(in srgb,${c} 38%,transparent)`:`color-mix(in srgb,${c} 18%,transparent)`};background:${lp.completed?`color-mix(in srgb,${c} 5%,var(--surface))`:'var(--surface)'};animation-delay:${li*.05}s`;
    if(!lock)card.onclick=()=>showRunner(lv.id);
    card.innerHTML=`<div class="lvl-left">
      <div class="lvl-num" style="background:${lp.completed?`color-mix(in srgb,${c} 20%,transparent)`:'rgba(255,255,255,0.06)'};border-color:${lp.completed?c:lock?'rgba(255,255,255,0.1)':'rgba(255,255,255,0.2)'};color:${lp.completed?c:'#64748b'}">${lock?'🔒':lp.completed?'✓':li+1}</div>
      <div><div class="lvl-name">${lv.name}</div>
      <div class="lvl-meta">
        <span class="lvl-obj">OBJ ${lv.obj}</span>
        <span class="type-tag" style="background:color-mix(in srgb,${c} 14%,transparent);color:${c};border:1px solid color-mix(in srgb,${c} 28%,transparent)">${lv.type==='review'?'REALM REVIEW':lv.type.replace('_',' ').toUpperCase()}</span>
        <span class="lvl-obj">${lv.xp} XP</span>
        ${missed>0?`<span class="missed-badge">⚑ ${missed} missed</span>`:''}
      </div></div></div>
    <div class="lvl-right">
      ${lp.mastery?`<div class="lvl-mastery" style="color:${mc}">${lp.mastery}%</div>`:''}
      ${!lock?`<div style="font-size:20px;color:${c}">›</div>`:''}
    </div>`;
    list.appendChild(card);
  });
}

// ── RUNNER STATE ──────────────────────────────────────────────────────────────
let RS={};
function initRunner(){
  const r=REALMS.find(r=>r.levels.some(l=>l.id===CL.id));
  const c=r.color;
  document.getElementById('r-obj').textContent=CL.type==='review'?'REALM REVIEW':'OBJ '+CL.obj;
  document.getElementById('r-obj').style.color=c;
  document.getElementById('r-name').textContent=CL.name;
  const isRevLevel=!LEVEL_DATA[CL.id].pbq;document.getElementById('r-pbq').textContent=isRevLevel?'—':'60 pts';
  document.getElementById('r-pbq').style.color='var(--muted)';
  document.getElementById('r-mcq').textContent=isRevLevel?'100 pts':'40 pts';
  document.getElementById('r-mcq').style.color='var(--muted)';
  document.getElementById('r-back').onclick=()=>showLevel(r.id);
  RS={phase:'pbq',color:c,data:LEVEL_DATA[CL.id],levelId:CL.id,conSels:{},triageSels:{},matchSels:{},scenarioSels:{},socSels:{},
      pbqScore:0,mcqScore:0,missedPBQ:[],missedMCQ:[],
      catSels:{},typeSels:{},pbqDone:false,
      mcqIdx:0,mcqSel:null,mcqDone:false,mcqScores:[]};
  renderPhase();
}
function renderPhase(){if(RS.phase==='pbq'){if(!RS.data.pbq){RS.phase='mcq';rMCQ();return;}if(RS.data.pbq.type==='triage')rTriagePBQ();else if(RS.data.pbq.type==='match')rMatchPBQ();else if(RS.data.pbq.type==='scenario_builder')rScenarioBuilder();else if(RS.data.pbq.type==='soc_triage')rSOCTriage();else if(RS.data.pbq.concepts)rClassifyPBQ();else rPBQ();}else if(RS.phase==='mcq')rMCQ();else rResult();}

// ── PHASE BAR ─────────────────────────────────────────────────────────────────
function phaseBar(phase,c){
  const ps=['pbq','mcq','result'];const labels=['PBQ','MCQ','Result'];
  return`<div class="phase-bar">${labels.map((l,i)=>{
    const idx=ps.indexOf(phase);
    const done=i<idx;const active=i===idx;
    const bg=done?'var(--green)':active?c:'rgba(255,255,255,0.1)';
    const col=done?'var(--green)':active?c:'#374151';
    return`<div class="ph-seg"><div class="ph-track" style="background:${bg}"></div><div class="ph-lbl" style="color:${col}">${l}</div></div>`;
  }).join('')}</div>`;
}

// ── PBQ ───────────────────────────────────────────────────────────────────────
function rPBQ(){
  const s=RS;const pbq=s.data.pbq;const c=s.color;
  const PPI=60/pbq.items.length;
  const sc=Object.keys(s.catSels).length+Object.keys(s.typeSels).length;
  const needed=pbq.items.length*2;const allSet=sc===needed;
  let h=phaseBar('pbq',c);
  h+=`<div class="meta-pills">
    <span class="mpill" style="background:color-mix(in srgb,${c} 14%,transparent);color:${c};border-color:color-mix(in srgb,${c} 28%,transparent)">DUAL CLASSIFY</span>
    <span class="mpill" style="background:rgba(217,119,6,0.14);color:var(--amber);border-color:rgba(217,119,6,0.28)">6 CONTROL TYPES</span>
    <span class="mpill" style="background:rgba(2,132,199,0.14);color:var(--d3);border-color:rgba(2,132,199,0.28)">HARD</span>
  </div><div class="meta-note">8 items · Category × Type · 7.5 pts per item · 60 pts total</div>`;
  h+=`<div class="scenario-box">
    <div class="sc-hdr"><span class="sc-tag" style="color:${c}">◉ SCENARIO</span><span class="sc-cia">${pbq.cia_tag}</span></div>
    <div class="sc-txt">${pbq.scenario}</div>
  </div><div class="instr">${pbq.instruction}</div>`;
  pbq.items.forEach((it,idx)=>{
    const cs=s.catSels[it.id];const ts=s.typeSels[it.id];
    const sub=s.pbqDone;
    const cok=sub&&cs===pbq.cat_answers[it.id];
    const tok=sub&&ts===pbq.type_answers[it.id];
    const aok=sub&&cok&&tok;
    h+=`<div class="pbq-item${sub?(aok?' ok':' bad'):''}" id="pi-${it.id}">
      <div class="pbq-hdr">
        <div class="pbq-num" style="background:color-mix(in srgb,${c} 18%,transparent);border:1px solid color-mix(in srgb,${c} 40%,transparent);color:${c}">${idx+1}</div>
        <div class="pbq-lbl"><div class="pbq-lbl-t">${it.label}</div><div class="pbq-lbl-d">${it.desc}</div></div>
        ${sub?`<div class="pbq-ri">${aok?'✓':'✗'}</div>`:''}
      </div>`;
    // Category
    h+=`<div class="axis-sec"><div class="axis-lbl" style="color:${c}">${pbq.cat_label||'Category'}`;
    if(sub&&!cok)h+=` <span class="axis-fix">✗ → ${pbq.categories.find(x=>x.id===pbq.cat_answers[it.id])?.name}</span>`;
    h+=`</div><div class="axis-pills">`;
    pbq.categories.forEach(cat=>{
      const sel=cs===cat.id;const ok=sub&&cat.id===pbq.cat_answers[it.id];const bad=sub&&sel&&!ok;
      const st=(!sub&&sel)?`border-color:${c};background:color-mix(in srgb,${c} 18%,transparent);color:${c}`:'';
      h+=`<button class="apill${ok?' pc':bad?' pw':''}" style="${st}" ${sub?'disabled':''} onclick="selCat('${it.id}','${cat.id}')">${cat.name}</button>`;
    });
    h+=`</div></div>`;
    // Type
    h+=`<div class="axis-sec"><div class="axis-lbl" style="color:var(--amber)">${pbq.type_label||'Type'}`;
    if(sub&&!tok)h+=` <span class="axis-fix">✗ → ${pbq.types.find(x=>x.id===pbq.type_answers[it.id])?.name}</span>`;
    h+=`</div><div class="axis-pills">`;
    pbq.types.forEach(typ=>{
      const sel=ts===typ.id;const ok=sub&&typ.id===pbq.type_answers[it.id];const bad=sub&&sel&&!ok;
      const st=(!sub&&sel)?`border-color:var(--amber);background:rgba(217,119,6,0.17);color:var(--amber)`:'';
      h+=`<button class="apill${ok?' pc':bad?' pw':''}" style="${st}" ${sub?'disabled':''} onclick="selTyp('${it.id}','${typ.id}')">${typ.name}</button>`;
    });
    h+=`</div></div>`;
    if(sub)h+=`<div class="expl" style="border-color:${aok?'var(--green)':'var(--red)'}">${pbq.explanations[it.id]}</div>`;
    h+=`</div>`;
  });
  if(!s.pbqDone){
    h+=`<button class="sbtn" ${allSet?'':'disabled'} style="background:${allSet?`linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c})`:''}; color:${allSet?'#fff':''}" onclick="submitPBQ()">
      ${allSet?'SUBMIT PBQ':`SET ALL AXES TO SUBMIT (${sc}/${needed})`}</button>`;
  } else {
    h+=`<button class="sbtn" onclick="gotoMCQ()" style="background:linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c});color:#fff">CONTINUE TO MCQ (${Math.round(s.pbqScore)}/60) →</button>`;
  }

}
function selCat(id,val){if(RS.pbqDone)return;RS.catSels[id]=val;rPBQ()}
function selTyp(id,val){if(RS.pbqDone)return;RS.typeSels[id]=val;rPBQ()}
function submitPBQ(){
  const s=RS;const pbq=s.data.pbq;const PPI=60/pbq.items.length;
  let sc=0;s.missedPBQ=[];
  pbq.items.forEach(it=>{

      yourCat:pbq.categories.find(x=>x.id===s.catSels[it.id])?.name||'—',
      correctCat:pbq.categories.find(x=>x.id===pbq.cat_answers[it.id])?.name,
      yourType:pbq.types.find(x=>x.id===s.typeSels[it.id])?.name||'—',
      correctType:pbq.types.find(x=>x.id===pbq.type_answers[it.id])?.name,
      explanation:pbq.explanations[it.id]});

  document.getElementById('r-pbq').textContent=Math.round(sc)+'/60';

function gotoMCQ(){RS.phase='mcq';RS.mcqIdx=0;RS.mcqSel=null;RS.mcqDone=false;RS.mcqScores=[];rMCQ();window.scrollTo(0,0);}

// ── MCQ ───────────────────────────────────────────────────────────────────────
function rMCQ(){
  const s=RS;const mcqs=s.data.mcqs;const q=mcqs[s.mcqIdx];const c=s.color;
  const isLast=s.mcqIdx===mcqs.length-1;const isReview=RS.data.pbq===null;const MPQ=isReview?100/mcqs.length:40/mcqs.length;
  let h=phaseBar('mcq',c);
  const dots=mcqs.map((_,i)=>`<div class="mcq-dot" style="background:${i<s.mcqIdx?'var(--green)':i===s.mcqIdx?c:'rgba(255,255,255,0.12)'}"></div>`).join('');
  h+=`<div class="mcq-prog">
    <span style="font-family:var(--mono);font-size:11px;color:${c};font-weight:700">MCQ ${s.mcqIdx+1} of ${mcqs.length}</span>
    <div class="mcq-dots">${dots}</div>
    <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">8 pts each</span>
  </div>`;
  h+=`<div class="qbox" style="border-left-color:${c}"><div class="qlbl" style="color:${c}">◉ QUESTION</div><div class="qtxt">${q.q}</div></div>`;
  h+=`<div class="opts">`;
  q.options.forEach(opt=>{
    const sel=s.mcqSel===opt.id;const ok=s.mcqDone&&opt.id===q.correct;const bad=s.mcqDone&&sel&&!ok;
    const ltBg=ok?'rgba(34,197,94,0.25)':bad?'rgba(239,68,68,0.25)':sel?`color-mix(in srgb,${c} 25%,transparent)`:'rgba(255,255,255,0.07)';
    const ltCol=ok?'var(--green)':bad?'var(--red)':sel?c:'#64748b';
    h+=`<button class="opt${ok?' oc':bad?' ow':sel?' sel':''}" ${s.mcqDone?'disabled':''} onclick="selMCQ('${opt.id}')">
      <span class="opt-lt" style="background:${ltBg};color:${ltCol}">${opt.id.toUpperCase()}</span>
      <span>${opt.label}</span></button>`;
  });
  h+=`</div>`;
  if(s.mcqDone){
    h+=`<div class="expbox"><div class="exp-t">${q.explanation}</div>
      <div class="tip" style="background:color-mix(in srgb,${c} 7%,transparent);border-left-color:${c}">
        <span class="tip-lbl" style="color:${c}">EXAM TIP: </span>
        <span class="tip-txt">${q.exam_tip}</span>
      </div></div>`;
  }
  if(!s.mcqDone){
    h+=`<button class="sbtn" ${s.mcqSel?'':'disabled'} style="background:${s.mcqSel?`linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c})`:''}; color:${s.mcqSel?'#fff':''}" onclick="submitMCQ()">SUBMIT ANSWER</button>`;
  } else {
    h+=`<button class="sbtn" onclick="nextMCQ()" style="background:linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c});color:#fff">${isLast?'VIEW RESULTS →':`NEXT QUESTION (${s.mcqIdx+2}/${mcqs.length}) →`}</button>`;
  }
  document.getElementById('r-content').innerHTML=h;
}
function selMCQ(id){if(RS.mcqDone)return;RS.mcqSel=id;rMCQ();}
function submitMCQ(){
  const s=RS;const q=s.data.mcqs[s.mcqIdx];const MPQ=40/s.data.mcqs.length;
  const ok=s.mcqSel===q.correct;
  s.mcqDone=true;s.mcqScores.push(ok?MPQ:0);
  if(!ok)s.missedMCQ.push({id:q.id,q:q.q,
    yourAnswer:q.options.find(o=>o.id===s.mcqSel)?.label||'—',
    correctAnswer:q.options.find(o=>o.id===q.correct)?.label,
    explanation:q.explanation,exam_tip:q.exam_tip});
  rMCQ();
}
function nextMCQ(){
  const s=RS;const isLast=s.mcqIdx===s.data.mcqs.length-1;
  if(isLast){
    s.mcqScore=s.mcqScores.reduce((a,b)=>a+b,0);
    const isRev=RS.data.pbq===null;document.getElementById('r-mcq').textContent=Math.round(s.mcqScore)+(isRev?'/100':'/40');
    document.getElementById('r-mcq').style.color=s.mcqScore>=(isRev?70:28)?'var(--green)':'var(--amber)';
    s.phase='result';saveResult();rResult();window.scrollTo(0,0);
  } else {
    s.mcqIdx++;s.mcqSel=null;s.mcqDone=false;rMCQ();window.scrollTo(0,0);
  }
}






// ── SOC TRIAGE PBQ (attack type + indicator per ticket) ──────────────────────
function rSOCTriage(){
  const s=RS;const pbq=s.data.pbq;const c=s.color;
  const PPS=60/pbq.tickets.length;
  const totalSels=pbq.tickets.reduce((acc,tk)=>{
    const sel=s.socSels[tk.id]||{};
    return acc+(sel.attack?1:0)+(sel.indicator?1:0);
  },0);
  const totalNeeded=pbq.tickets.length*2;
  const allSet=totalSels===totalNeeded;

  let h=phaseBar('pbq',c);
  h+=`<div class="meta-pills">
    <span class="mpill" style="background:color-mix(in srgb,${c} 14%,transparent);color:${c};border-color:color-mix(in srgb,${c} 28%,transparent)">SOC INCIDENT TRIAGE</span>
    <span class="mpill" style="background:rgba(220,38,38,0.14);color:var(--d2);border-color:rgba(220,38,38,0.28)">${pbq.tickets.length} TICKETS</span>
    <span class="mpill" style="background:rgba(217,119,6,0.14);color:var(--amber);border-color:rgba(217,119,6,0.28)">HARD</span>
  </div>
  <div class="meta-note">${pbq.tickets.length} incident tickets · attack type + indicator per ticket · ${Math.round(PPS)} pts each · 60 pts total</div>`;

  h+=`<div class="scenario-box">
    <div class="sc-hdr"><span class="sc-tag" style="color:${c}">◉ SCENARIO</span><span class="sc-cia">${pbq.cia_tag}</span></div>
    <div class="sc-txt">${pbq.scenario}</div>
  </div><div class="instr">${pbq.instruction}</div>`;

  pbq.tickets.forEach((tk,ti)=>{
    const sel=s.socSels[tk.id]||{};
    const sub=s.pbqDone;
    const atkOk=sub&&sel.attack===tk.attack_answer;
    const indOk=sub&&sel.indicator===tk.indicator_answer;
    const bothOk=atkOk&&indOk;
    const score=sub?Math.round((((atkOk?1:0)+(indOk?1:0))/2)*PPS):null;

    let cardBorder,cardBg;
    if(sub&&bothOk){cardBorder='rgba(34,197,94,0.5)';cardBg='rgba(34,197,94,0.04)';}
    else if(sub&&!atkOk&&!indOk){cardBorder='rgba(239,68,68,0.5)';cardBg='rgba(239,68,68,0.04)';}
    else if(sub){cardBorder='rgba(245,158,11,0.5)';cardBg='rgba(245,158,11,0.04)';}
    else if(sel.attack||sel.indicator){cardBorder=`color-mix(in srgb,${c} 45%,transparent)`;cardBg=`color-mix(in srgb,${c} 3%,transparent)`;}
    else{cardBorder='rgba(255,255,255,0.1)';cardBg='rgba(255,255,255,0.02)';}

    const priorityColor=tk.priority==='CRITICAL'?'var(--red)':'var(--amber)';

    h+=`<div style="border-radius:14px;padding:16px;border:2px solid ${cardBorder};background:${cardBg};margin-bottom:16px">`;

    // Ticket header
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;flex-wrap:wrap">
      <div>
        <div style="font-family:var(--mono);font-size:10px;font-weight:700;color:${c};letter-spacing:.05em;margin-bottom:3px">${tk.title}</div>
        <div style="display:inline-block;padding:2px 10px;border-radius:12px;font-family:var(--mono);font-size:9px;font-weight:700;
          background:${tk.priority==='CRITICAL'?'rgba(239,68,68,0.18)':'rgba(245,158,11,0.18)'};
          color:${priorityColor};border:1px solid ${priorityColor}">● ${tk.priority}</div>
      </div>
      ${sub?`<div style="font-family:var(--mono);font-size:12px;font-weight:700;color:${bothOk?'var(--green)':score>0?'var(--amber)':'var(--red)'}">${score}/${Math.round(PPS)}pts</div>`:''}
    </div>`;

    // Summary
    h+=`<div style="font-size:13px;color:#CBD5E1;line-height:1.7;padding:12px 14px;background:rgba(0,0,0,0.35);border-radius:10px;border-left:3px solid ${cardBorder};margin-bottom:12px">${tk.summary}</div>`;

    // Observed indicators list
    h+=`<div style="margin-bottom:14px">
      <div style="font-family:var(--mono);font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.08em;margin-bottom:6px">OBSERVED INDICATORS</div>
      <div style="display:flex;flex-direction:column;gap:4px">`;
    tk.indicators.forEach(ind=>{
      h+=`<div style="padding:5px 10px;border-radius:6px;font-size:12px;color:#94A3B8;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08)">· ${ind}</div>`;
    });
    h+=`</div></div>`;

    // Attack type selector
    const atkSel=sel.attack;
    const atkCorrect=tk.attack_answer;
    h+=`<div style="margin-bottom:12px">
      <div style="font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--d2);margin-bottom:7px">
        ATTACK TYPE ${sub?(atkOk?'✓':'✗'):''}
        ${sub&&!atkOk?`<span style="color:var(--muted);font-weight:400"> — correct: ${pbq.attack_options.find(x=>x.id===atkCorrect)?.name}</span>`:''}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">`;
    pbq.attack_options.forEach(opt=>{
      const isSel=atkSel===opt.id;
      const isCorrectOpt=sub&&opt.id===atkCorrect;
      const isWrongSel=sub&&isSel&&!isCorrectOpt;
      let bg,border,color;
      if(isCorrectOpt){bg='rgba(34,197,94,0.18)';border='var(--green)';color='var(--green)';}
      else if(isWrongSel){bg='rgba(239,68,68,0.18)';border='var(--red)';color='var(--red)';}
      else if(isSel){bg='rgba(220,38,38,0.18)';border='var(--d2)';color='#fff';}
      else{bg='transparent';border='rgba(255,255,255,0.12)';color='#475569';}
      h+=`<button onclick="selSOC('${tk.id}','attack','${opt.id}')" ${sub?'disabled':''}
        style="padding:7px 13px;border-radius:8px;font-family:var(--mono);font-size:11px;font-weight:600;
        background:${bg};border:1.5px solid ${border};color:${color};cursor:${sub?'default':'pointer'};transition:all .12s">${opt.name}</button>`;
    });
    h+=`</div>`;
    if(sub)h+=`<div class="expl" style="border-color:${atkOk?'var(--green)':'var(--red)'};margin-top:8px;font-size:12px">${tk.attack_explanation}</div>`;
    h+=`</div>`;

    // Confirming indicator selector
    const indSel=sel.indicator;
    const indCorrect=tk.indicator_answer;
    h+=`<div style="margin-bottom:4px">
      <div style="font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--d3);margin-bottom:7px">
        CONFIRMING INDICATOR ${sub?(indOk?'✓':'✗'):''}
        ${sub&&!indOk?`<span style="color:var(--muted);font-weight:400"> — correct: ${pbq.indicator_options.find(x=>x.id===indCorrect)?.name}</span>`:''}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">`;
    pbq.indicator_options.forEach(opt=>{
      const isSel=indSel===opt.id;
      const isCorrectOpt=sub&&opt.id===indCorrect;
      const isWrongSel=sub&&isSel&&!isCorrectOpt;
      let bg,border,color;
      if(isCorrectOpt){bg='rgba(34,197,94,0.18)';border='var(--green)';color='var(--green)';}
      else if(isWrongSel){bg='rgba(239,68,68,0.18)';border='var(--red)';color='var(--red)';}
      else if(isSel){bg='rgba(14,165,233,0.18)';border='var(--d3)';color='#fff';}
      else{bg='transparent';border='rgba(255,255,255,0.12)';color='#475569';}
      h+=`<button onclick="selSOC('${tk.id}','indicator','${opt.id}')" ${sub?'disabled':''}
        style="padding:7px 13px;border-radius:8px;font-family:var(--mono);font-size:11px;font-weight:600;
        background:${bg};border:1.5px solid ${border};color:${color};cursor:${sub?'default':'pointer'};transition:all .12s">${opt.name}</button>`;
    });
    h+=`</div>`;
    if(sub)h+=`<div class="expl" style="border-color:${indOk?'var(--green)':'var(--red)'};margin-top:8px;font-size:12px">${tk.indicator_explanation}</div>`;
    h+=`</div>`;

    h+=`</div>`; // end ticket card
  });

  if(!s.pbqDone){
    h+=`<button class="sbtn" ${allSet?'':'disabled'}
      style="background:${allSet?`linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c})`:''}; color:${allSet?'#fff':''}"
      onclick="submitSOCTriage()">
      ${allSet?'SUBMIT TRIAGE':`COMPLETE ALL TICKETS TO SUBMIT (${totalSels}/${totalNeeded})`}</button>`;
  } else {
    h+=`<button class="sbtn" onclick="gotoMCQ()" style="background:linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c});color:#fff">CONTINUE TO MCQ (${Math.round(s.pbqScore)}/60) →</button>`;
  }
  document.getElementById('r-content').innerHTML=h;
}

function selSOC(tkId, axis, optId){
  if(RS.pbqDone)return;
  if(!RS.socSels[tkId])RS.socSels[tkId]={};
  RS.socSels[tkId][axis]=optId;
  rSOCTriage();
}

function submitSOCTriage(){
  const s=RS;const pbq=s.data.pbq;
  const PPS=60/pbq.tickets.length;
  let sc=0;s.missedPBQ=[];
  pbq.tickets.forEach(tk=>{
    const sel=s.socSels[tk.id]||{};
    const atkOk=sel.attack===tk.attack_answer;
    const indOk=sel.indicator===tk.indicator_answer;
    const pts=Math.round((((atkOk?1:0)+(indOk?1:0))/2)*PPS);
    sc+=pts;
    if(!atkOk||!indOk){
      s.missedPBQ.push({
        id:tk.id,label:tk.title,
        yourCat:pbq.attack_options.find(x=>x.id===sel.attack)?.name||'—',
        correctCat:pbq.attack_options.find(x=>x.id===tk.attack_answer)?.name,
        yourType:pbq.indicator_options.find(x=>x.id===sel.indicator)?.name||'—',
        correctType:pbq.indicator_options.find(x=>x.id===tk.indicator_answer)?.name,
        explanation:(atkOk?'':tk.attack_explanation)+(!atkOk&&!indOk?' | ':'')+(!indOk?tk.indicator_explanation:''),
      });
    }
  });
  s.pbqScore=sc;s.pbqDone=true;
  document.getElementById('r-pbq').textContent=Math.round(sc)+'/60';
  document.getElementById('r-pbq').style.color=sc>=42?'var(--green)':'var(--amber)';
  rSOCTriage();window.scrollTo(0,0);
}

// ── SCENARIO BUILDER PBQ ─────────────────────────────────────────────────────
function rScenarioBuilder(){
  const s=RS;const pbq=s.data.pbq;const c=s.color;
  const axisKeys=['vector','technique','surface'];
  const totalSels=pbq.scenarios.reduce((acc,sc)=>acc+axisKeys.filter(ax=>s.scenarioSels[sc.id]?.[ax]).length,0);
  const totalNeeded=pbq.scenarios.length*axisKeys.length;
  const allSet=totalSels===totalNeeded;
  const PPS=60/pbq.scenarios.length; // pts per scenario (all 3 axes correct)

  let h=phaseBar('pbq',c);
  h+=`<div class="meta-pills">
    <span class="mpill" style="background:color-mix(in srgb,${c} 14%,transparent);color:${c};border-color:color-mix(in srgb,${c} 28%,transparent)">SCENARIO BUILDER</span>
    <span class="mpill" style="background:rgba(220,38,38,0.14);color:var(--d2);border-color:rgba(220,38,38,0.28)">${pbq.scenarios.length} INCIDENTS</span>
    <span class="mpill" style="background:rgba(217,119,6,0.14);color:var(--amber);border-color:rgba(217,119,6,0.28)">HARD</span>
  </div>
  <div class="meta-note">${pbq.scenarios.length} scenarios · 3 selections each · ${Math.round(PPS)} pts per scenario · 60 pts total</div>`;

  h+=`<div class="scenario-box">
    <div class="sc-hdr"><span class="sc-tag" style="color:${c}">◉ SCENARIO</span><span class="sc-cia">${pbq.cia_tag}</span></div>
    <div class="sc-txt">${pbq.scenario}</div>
  </div><div class="instr">${pbq.instruction}</div>`;

  pbq.scenarios.forEach((scenario,si)=>{
    const sels=s.scenarioSels[scenario.id]||{};
    const sub=s.pbqDone;

    // Score this scenario
    let scenCorrect=0;
    if(sub){
      axisKeys.forEach(ax=>{
        if(sels[ax]===scenario.axes[ax].answer)scenCorrect++;
      });
    }
    const scenScore=sub?Math.round((scenCorrect/3)*PPS):null;

    let cardBorder,cardBg;
    if(sub&&scenCorrect===3){cardBorder='rgba(34,197,94,0.5)';cardBg='rgba(34,197,94,0.04)';}
    else if(sub&&scenCorrect===0){cardBorder='rgba(239,68,68,0.5)';cardBg='rgba(239,68,68,0.04)';}
    else if(sub){cardBorder='rgba(245,158,11,0.5)';cardBg='rgba(245,158,11,0.04)';}
    else{cardBorder=`color-mix(in srgb,${c} 30%,transparent)`;cardBg='rgba(255,255,255,0.02)';}

    h+=`<div style="border-radius:14px;padding:16px;border:2px solid ${cardBorder};background:${cardBg};margin-bottom:16px">`;

    // Incident header
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px">
      <div style="font-family:var(--mono);font-size:10px;font-weight:700;color:${c};letter-spacing:.05em">${scenario.title}</div>
      ${sub?`<div style="font-family:var(--mono);font-size:11px;font-weight:700;color:${scenCorrect===3?'var(--green)':scenCorrect>0?'var(--amber)':'var(--red)'};flex-shrink:0">${scenCorrect}/3 · ${scenScore}pts</div>`:''}
    </div>`;

    // Outcome block
    h+=`<div style="font-size:13px;color:#CBD5E1;line-height:1.7;padding:12px 14px;background:rgba(0,0,0,0.35);border-radius:10px;border-left:3px solid ${cardBorder};margin-bottom:12px">${scenario.outcome}</div>`;

    // Evidence pills
    h+=`<div style="margin-bottom:14px">
      <div style="font-family:var(--mono);font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.08em;margin-bottom:6px">EVIDENCE</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">`;
    scenario.evidence.forEach(ev=>{
      h+=`<div style="padding:4px 10px;border-radius:6px;font-size:11px;color:#94A3B8;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1)">· ${ev}</div>`;
    });
    h+=`</div></div>`;

    // Three axis selectors
    const axisConfig=[
      {key:'vector',   label:'Initial Vector',  opts:pbq.vector_options,    color:'var(--d3)'},
      {key:'technique',label:'Technique',        opts:pbq.technique_options, color:'var(--d2)'},
      {key:'surface',  label:'Attack Surface',   opts:pbq.surface_options,   color:'var(--d4)'},
    ];

    axisConfig.forEach(ax=>{
      const sel=sels[ax.key];
      const correct=scenario.axes[ax.key].answer;
      const isOk=sub&&sel===correct;
      const isBad=sub&&sel&&sel!==correct;
      const correctOpt=ax.opts.find(o=>o.id===correct);
      const selOpt=ax.opts.find(o=>o.id===sel);

      h+=`<div style="margin-bottom:10px">
        <div style="font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:${ax.color};margin-bottom:6px">
          ${ax.label} ${sub?(isOk?'✓':'✗'):''}
          ${sub&&isBad?`<span style="color:var(--muted);font-weight:400"> — correct: ${correctOpt?.name}</span>`:''}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">`;

      ax.opts.forEach(opt=>{
        const isSel=sel===opt.id;
        const isCorrectOpt=sub&&opt.id===correct;
        const isWrongSel=sub&&isSel&&!isCorrectOpt;
        let bg,border,color;
        if(isCorrectOpt){bg='rgba(34,197,94,0.18)';border='var(--green)';color='var(--green)';}
        else if(isWrongSel){bg='rgba(239,68,68,0.18)';border='var(--red)';color='var(--red)';}
        else if(isSel){bg=`color-mix(in srgb,${ax.color} 18%,transparent)`;border=ax.color;color='#fff';}
        else{bg='transparent';border='rgba(255,255,255,0.12)';color='#475569';}

        h+=`<button onclick="selScenario('${scenario.id}','${ax.key}','${opt.id}')" 
          ${sub?'disabled':''}
          style="padding:7px 13px;border-radius:8px;font-family:var(--mono);font-size:11px;font-weight:600;
          background:${bg};border:1.5px solid ${border};color:${color};
          cursor:${sub?'default':'pointer'};transition:all .12s;min-height:36px">${opt.name}</button>`;
      });
      h+=`</div>`;

      // Explanation per axis post-submit
      if(sub){
        h+=`<div class="expl" style="border-color:${isOk?'var(--green)':'var(--red)'};margin-top:8px;font-size:12px">${scenario.axes[ax.key].explanation}</div>`;
      }
      h+=`</div>`;
    });

    h+=`</div>`; // end scenario card
  });

  if(!s.pbqDone){
    h+=`<button class="sbtn" ${allSet?'':'disabled'}
      style="background:${allSet?`linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c})`:''}; color:${allSet?'#fff':''}"
      onclick="submitScenarioBuilder()">
      ${allSet?'SUBMIT ANALYSIS':`COMPLETE ALL SELECTIONS TO SUBMIT (${totalSels}/${totalNeeded})`}</button>`;
  } else {
    h+=`<button class="sbtn" onclick="gotoMCQ()" style="background:linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c});color:#fff">CONTINUE TO MCQ (${Math.round(s.pbqScore)}/60) →</button>`;
  }
  document.getElementById('r-content').innerHTML=h;
}

function selScenario(scenId,axisKey,optId){
  if(RS.pbqDone)return;
  if(!RS.scenarioSels[scenId])RS.scenarioSels[scenId]={};
  RS.scenarioSels[scenId][axisKey]=optId;
  rScenarioBuilder();
}

function submitScenarioBuilder(){
  const s=RS;const pbq=s.data.pbq;
  const axisKeys=['vector','technique','surface'];
  const PPS=60/pbq.scenarios.length;
  let sc=0;s.missedPBQ=[];

  pbq.scenarios.forEach(scenario=>{
    const sels=s.scenarioSels[scenario.id]||{};
    let correct=0;
    axisKeys.forEach(ax=>{if(sels[ax]===scenario.axes[ax].answer)correct++;});
    const pts=Math.round((correct/3)*PPS);
    sc+=pts;
    if(correct<3){
      s.missedPBQ.push({
        id:scenario.id,
        label:scenario.title,
        yourCat:pts+'/'+Math.round(PPS)+' pts',
        correctCat:'Review all three axes below',
        yourType:'',correctType:'',
        explanation:axisKeys.filter(ax=>sels[ax]!==scenario.axes[ax].answer)
          .map(ax=>scenario.axes[ax].explanation).join(' | ')
      });
    }
  });

  s.pbqScore=sc;s.pbqDone=true;
  document.getElementById('r-pbq').textContent=Math.round(sc)+'/60';
  document.getElementById('r-pbq').style.color=sc>=42?'var(--green)':'var(--amber)';
  rScenarioBuilder();window.scrollTo(0,0);
}

// ── MATCH PBQ (scenario-to-solution) ─────────────────────────────────────────
function rMatchPBQ(){
  const s=RS;const pbq=s.data.pbq;const c=s.color;
  const PPI=60/pbq.rows.length;
  const selCount=Object.keys(s.matchSels).length;
  const allSet=selCount===pbq.rows.length;
  const usedSols=Object.values(s.matchSels);

  let h=phaseBar('pbq',c);
  h+=`<div class="meta-pills">
    <span class="mpill" style="background:color-mix(in srgb,${c} 14%,transparent);color:${c};border-color:color-mix(in srgb,${c} 28%,transparent)">SCENARIO MATCH</span>
    <span class="mpill" style="background:rgba(220,38,38,0.14);color:var(--d2);border-color:rgba(220,38,38,0.28)">${pbq.solutions.length} SOLUTIONS</span>
    <span class="mpill" style="background:rgba(217,119,6,0.14);color:var(--amber);border-color:rgba(217,119,6,0.28)">HARD</span>
  </div>
  <div class="meta-note">${pbq.rows.length} scenarios · ${Math.round(PPI)} pts each · not all solutions will be used · 60 pts total</div>`;

  h+=`<div class="scenario-box">
    <div class="sc-hdr"><span class="sc-tag" style="color:${c}">◉ SCENARIO</span><span class="sc-cia">${pbq.cia_tag}</span></div>
    <div class="sc-txt">${pbq.scenario}</div>
  </div><div class="instr">${pbq.instruction}</div>`;

  // Solution pool
  h+=`<div style="margin-bottom:16px">
    <div style="font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px">SOLUTION POOL — tap a row below, then tap your solution here</div>
    <div style="display:flex;flex-wrap:wrap;gap:7px;">`;
  pbq.solutions.forEach(sol=>{
    const isUsed=!s.pbqDone&&usedSols.includes(sol.id);
    const isActive=s.activeSel&&!s.pbqDone;
    // post-submit coloring
    let bg,border,color;
    if(s.pbqDone){
      const usedInRow=Object.entries(s.matchSels).find(([,v])=>v===sol.id);
      if(usedInRow){
        const rowId=usedInRow[0];
        const correct=pbq.rows.find(r=>r.id===rowId)?.answer===sol.id;
        bg=correct?'rgba(34,197,94,0.18)':'rgba(239,68,68,0.18)';
        border=correct?'var(--green)':'var(--red)';
        color=correct?'var(--green)':'var(--red)';
      } else {
        bg='transparent';border='rgba(255,255,255,0.08)';color='#374151';
      }
    } else if(isUsed){
      bg=`color-mix(in srgb,${c} 20%,transparent)`;border=c;color='#fff';
    } else {
      bg='rgba(255,255,255,0.04)';border='rgba(255,255,255,0.18)';color='#94A3B8';
    }
    h+=`<button onclick="assignSol('${sol.id}')" ${s.pbqDone?'disabled':''} 
      style="padding:8px 15px;border-radius:20px;font-family:var(--mono);font-size:11px;font-weight:700;
      background:${bg};border:2px solid ${border};color:${color};cursor:${s.pbqDone?'default':'pointer'};
      transition:all .12s;min-height:38px;${isUsed&&!s.pbqDone?'opacity:0.5;':''}">${sol.name}</button>`;
  });
  h+=`</div></div>`;

  // Scenario rows
  pbq.rows.forEach((row,idx)=>{
    const selId=s.matchSels[row.id];
    const selSol=pbq.solutions.find(x=>x.id===selId);
    const isActive=s.activeSel===row.id&&!s.pbqDone;
    const sub=s.pbqDone;
    const isOk=sub&&selId===row.answer;
    const isBad=sub&&selId&&selId!==row.answer;
    const correctSol=pbq.solutions.find(x=>x.id===row.answer);

    let cardBorder,cardBg;
    if(sub&&isOk){cardBorder='rgba(34,197,94,0.5)';cardBg='rgba(34,197,94,0.05)';}
    else if(sub&&isBad){cardBorder='rgba(239,68,68,0.5)';cardBg='rgba(239,68,68,0.05)';}
    else if(isActive){cardBorder=c;cardBg=`color-mix(in srgb,${c} 6%,transparent)`;}
    else if(selId){cardBorder=`color-mix(in srgb,${c} 40%,transparent)`;cardBg=`color-mix(in srgb,${c} 4%,transparent)`;}
    else{cardBorder='rgba(255,255,255,0.1)';cardBg='rgba(255,255,255,0.02)';}

    h+=`<div style="border-radius:12px;padding:14px;border:1.5px solid ${cardBorder};background:${cardBg};margin-bottom:10px;transition:all .2s;cursor:${sub?'default':'pointer'}" 
      ${sub?'':` onclick="setActiveRow('${row.id}')"`}>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px">
        <div style="flex:1">
          <div style="font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:${c};margin-bottom:4px">SCENARIO ${idx+1} — ${row.label}</div>
          <div style="font-size:13px;color:#CBD5E1;line-height:1.65">${row.requirement}</div>
        </div>
        ${sub?`<div style="font-size:20px;flex-shrink:0">${isOk?'✓':'✗'}</div>`:''}
      </div>`;

    // Selection state
    if(!sub){
      if(isActive){
        h+=`<div style="font-family:var(--mono);font-size:10px;color:${c};font-weight:700;padding:8px 12px;border-radius:8px;background:color-mix(in srgb,${c} 10%,transparent);border:1px solid color-mix(in srgb,${c} 30%,transparent)">
          ${selSol?`✓ ${selSol.name} — tap another solution to change, or tap another scenario`:'▶ Now tap a solution from the pool above'}</div>`;
      } else {
        h+=`<div style="font-family:var(--mono);font-size:10px;padding:8px 12px;border-radius:8px;border:1px dashed rgba(255,255,255,0.1);color:${selSol?'#94A3B8':'#374151'}">
          ${selSol?`→ ${selSol.name}`:'tap to select'}</div>`;
      }
    } else {
      // Post-submit
      h+=`<div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:${isOk?'0':'8px'}">
        <div style="padding:6px 13px;border-radius:20px;font-family:var(--mono);font-size:11px;font-weight:700;
          background:${isOk?'rgba(34,197,94,0.18)':'rgba(239,68,68,0.18)'};
          border:1.5px solid ${isOk?'var(--green)':'var(--red)'};
          color:${isOk?'var(--green)':'var(--red)'}">
          ${isOk?'✓':'✗'} ${selSol?.name||'No answer'}</div>
        ${isBad?`<div style="padding:6px 13px;border-radius:20px;font-family:var(--mono);font-size:11px;font-weight:700;background:rgba(34,197,94,0.18);border:1.5px solid var(--green);color:var(--green)">→ ${correctSol?.name}</div>`:''}
      </div>`;
      h+=`<div class="expl" style="border-color:${isOk?'var(--green)':'var(--red)'};margin-top:8px">${row.explanation}</div>`;
    }
    h+=`</div>`;
  });

  if(!s.pbqDone){
    h+=`<button class="sbtn" ${allSet?'':'disabled'} 
      style="background:${allSet?`linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c})`:''}; color:${allSet?'#fff':''}" 
      onclick="submitMatchPBQ()">
      ${allSet?'SUBMIT MATCHES':`MATCH ALL SCENARIOS TO SUBMIT (${selCount}/${pbq.rows.length})`}</button>`;
  } else {
    h+=`<button class="sbtn" onclick="gotoMCQ()" style="background:linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c});color:#fff">CONTINUE TO MCQ (${Math.round(s.pbqScore)}/60) →</button>`;
  }
  document.getElementById('r-content').innerHTML=h;
}

function setActiveRow(rowId){
  if(RS.pbqDone)return;
  RS.activeSel=RS.activeSel===rowId?null:rowId;
  rMatchPBQ();
}

function assignSol(solId){
  if(RS.pbqDone||!RS.activeSel)return;
  const rowId=RS.activeSel;
  // Unassign if already used in a different row
  for(const[k,v] of Object.entries(RS.matchSels)){if(v===solId&&k!==rowId)delete RS.matchSels[k];}
  RS.matchSels[rowId]=solId;
  RS.activeSel=null;
  rMatchPBQ();
}

function submitMatchPBQ(){
  const s=RS;const pbq=s.data.pbq;const PPI=60/pbq.rows.length;
  let sc=0;s.missedPBQ=[];
  pbq.rows.forEach(row=>{
    const ok=s.matchSels[row.id]===row.answer;
    if(ok){sc+=PPI;}
    else s.missedPBQ.push({
      id:row.id,
      label:row.label,
      yourCat:pbq.solutions.find(x=>x.id===s.matchSels[row.id])?.name||'—',
      correctCat:pbq.solutions.find(x=>x.id===row.answer)?.name,
      yourType:'',correctType:'',
      explanation:row.explanation});
  });
  s.pbqScore=sc;s.pbqDone=true;
  s.activeSel=null;
  document.getElementById('r-pbq').textContent=Math.round(sc)+'/60';
  document.getElementById('r-pbq').style.color=sc>=42?'var(--green)':'var(--amber)';
  rMatchPBQ();window.scrollTo(0,0);
}

    <span class="mpill" style="background:rgba(217,119,6,0.14);color:var(--amber);border-color:rgba(217,119,6,0.28)">MEDIUM</span>
  </div>

  h+=`<div class="scenario-box">
    <div class="sc-hdr"><span class="sc-tag" style="color:${c}">◉ CHANGE REQUEST #CR-2024-0847</span><span class="sc-cia">${pbq.cia_tag}</span></div>

  </div><div class="instr">${pbq.instruction}</div>`;

  // Legend
  h+=`<div style="display:flex;gap:10px;margin-bottom:16px">
    <div style="flex:1;padding:8px 12px;border-radius:8px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);text-align:center;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--green)">✓ APPROVE — field is complete and acceptable</div>
    <div style="flex:1;padding:8px 12px;border-radius:8px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);text-align:center;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--red)">⚑ FLAG — missing, vague, or insufficient</div>

    // Card border state

    else if(sub&&isBad){cardBorder='rgba(245,158,11,0.5)';cardBg='rgba(245,158,11,0.05)';}
    else if(!sub&&sel==='approve'){cardBorder='rgba(34,197,94,0.4)';cardBg='rgba(34,197,94,0.04)';}
    else if(!sub&&sel==='flag'){cardBorder='rgba(239,68,68,0.4)';cardBg='rgba(239,68,68,0.04)';}

    h+=`<div style="border-radius:12px;padding:14px;border:1.5px solid ${cardBorder};background:${cardBg};margin-bottom:10px;transition:all .2s">`;

      </div>

    </div>`;

    // Triage buttons
    if(!sub){
      h+=`<div style="display:flex;gap:8px">
        <button onclick="selTriage('${field.id}','approve')" style="flex:1;padding:11px;border-radius:9px;border:2px solid ${sel==='approve'?'var(--green)':'rgba(34,197,94,0.25)'};background:${sel==='approve'?'rgba(34,197,94,0.18)':'transparent'};color:${sel==='approve'?'var(--green)':'#64748b'};font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer;transition:all .12s;min-height:44px">✓ APPROVE</button>

      </div>`;
    } else {
      // Post-submit: show what they picked vs correct

        <div style="flex:1;padding:9px;border-radius:8px;border:2px solid ${isOk?selColor:'rgba(245,158,11,0.5)'};background:${isOk?'rgba(255,255,255,0.04)':'rgba(245,158,11,0.08)'};color:${isOk?selColor:'var(--amber)'};font-family:var(--mono);font-size:12px;font-weight:700;text-align:center">${isOk?selLabel:'✗ '+selLabel}</div>

      h+=`<div class="expl" style="border-color:${isOk?correctColor:'var(--amber)'}">${field.explanation}</div>`;

    h+=`</div>`;

  if(!s.pbqDone){
    h+=`<button class="sbtn" ${allSet?'':'disabled'} style="background:${allSet?`linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c})`:''}; color:${allSet?'#fff':''}" onclick="submitTriagePBQ()">

    h+=`<button class="sbtn" onclick="gotoMCQ()" style="background:linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c});color:#fff">CONTINUE TO MCQ (${Math.round(s.pbqScore)}/60) →</button>`;

  document.getElementById('r-content').innerHTML=h;

// ── CLASSIFY PBQ (single-axis concept picker) ─────────────────────────────────
