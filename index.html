    {
      id:"q11",
      q:"A security team is evaluating email authentication controls after a phishing campaign successfully impersonated their CEO's domain. They review three protocols already partially configured: Protocol A publishes a DNS TXT record listing all IP addresses authorized to send email on behalf of the organization's domain — receiving mail servers check this record and reject email from unlisted sources. Protocol B adds a cryptographic signature to outgoing email headers using a private key — receiving servers retrieve the corresponding public key from DNS to verify the signature was applied by the legitimate sender. Protocol C is a policy layer that tells receiving mail servers what to do when emails fail the checks performed by the first two protocols — it can instruct servers to quarantine or reject failing messages and sends aggregate reports back to the domain owner showing authentication results. Which option CORRECTLY identifies all three protocols and their relationship?",
      options:[
        {id:"a", label:"Protocol A: DKIM — DKIM publishes authorized sender IPs in DNS. Protocol B: SPF — SPF signs email headers with cryptographic keys. Protocol C: DMARC — correctly identified as the policy layer. The three protocols are independent and provide overlapping but redundant protection"},
        {id:"b", label:"Protocol A: DMARC — DMARC publishes IP allowlists in DNS. Protocol B: SPF — SPF signs messages cryptographically. Protocol C: DKIM — DKIM is the policy enforcement layer that quarantines or rejects failing messages and sends reports"},
        {id:"c", label:"Protocol A: SPF (Sender Policy Framework) — DNS TXT record listing authorized sending IP addresses. Protocol B: DKIM (DomainKeys Identified Mail) — cryptographic signature on email headers verified via DNS public key. Protocol C: DMARC (Domain-based Message Authentication Reporting and Conformance) — policy layer that defines handling of SPF/DKIM failures and provides reporting. DMARC depends on SPF and DKIM — it enforces and reports on their results but cannot function without them"},
        {id:"d", label:"All three are forms of DKIM — SPF and DMARC are vendor-specific implementations of the DKIM standard that use different verification mechanisms but serve the same cryptographic signing function"},

      exam_tip:"SPF = authorized sender IPs in DNS, checks sending server IP. DKIM = cryptographic signature on headers, verifies sender identity and message integrity. DMARC = policy (none/quarantine/reject) for SPF/DKIM failures + aggregate reporting. Relationship: SPF and DKIM do the checking; DMARC enforces the policy on failures and reports results. All three together = complete email authentication. DMARC alone = no protection without SPF/DKIM.",

      id:"q12",
      q:"A security architect is selecting tools to address four detection and response requirements. Requirement 1: detect when a user who normally works 9-5 in Chicago suddenly authenticates from Singapore at 2 AM, downloads 4GB of files, and emails them externally — without matching any known malware signature. Requirement 2: prevent unauthorized devices from connecting to the corporate network — any device without a valid certificate and compliant security posture should be blocked at the network access layer before receiving an IP address. Requirement 3: collect and correlate telemetry from endpoints, network, cloud, and email into a single detection platform that can investigate and respond across all surfaces simultaneously. Requirement 4: detect, investigate, and respond to threats on individual endpoints — including isolating a compromised host, killing malicious processes, and collecting forensic artifacts. Which option CORRECTLY maps each requirement to its tool?",
      options:[
        {id:"a", label:"Requirement 1: EDR — endpoint agents detect anomalous user behavior. Requirement 2: DLP — DLP prevents unauthorized data from leaving through network connections. Requirement 3: EDR — EDR correlates endpoint telemetry across the environment. Requirement 4: XDR — XDR provides endpoint isolation and process termination"},
        {id:"b", label:"Requirement 1: UBA (User Behavior Analytics) — detects anomalous user activity by baselining normal behavior and flagging statistical deviations, regardless of signature matches. Requirement 2: NAC (Network Access Control) — enforces device posture and authentication requirements before granting network access. Requirement 3: XDR (Extended Detection and Response) — collects and correlates telemetry across endpoint, network, cloud, and email for unified detection and response. Requirement 4: EDR (Endpoint Detection and Response) — provides endpoint-level detection, investigation, isolation, and forensic collection"},
        {id:"c", label:"Requirement 1: SIEM — SIEMs detect behavioral anomalies through log correlation. Requirement 2: firewall — firewalls block unauthorized devices at the network perimeter. Requirement 3: SIEM — SIEMs aggregate multi-source telemetry. Requirement 4: antivirus — antivirus isolates infected endpoints and removes malicious processes"},
        {id:"d", label:"Requirement 1: IDS — IDS detects anomalous authentication patterns through signature matching. Requirement 2: VPN — VPN authenticates devices before granting network access. Requirement 3: EDR — EDR is the correct multi-surface detection platform. Requirement 4: XDR — XDR handles individual endpoint response actions"},
      ],
      correct:"b",
      explanation:"UBA baselines normal user behavior and detects statistical anomalies — authentication location, time, data volume, and destination patterns that deviate from the baseline trigger alerts without requiring signature matches. NAC enforces device posture at the network access layer — certificates, patch compliance, and security agent presence are verified before an IP address is assigned. XDR extends detection and response across multiple security surfaces (endpoint, network, cloud, email) into a unified platform. EDR operates at the individual endpoint level — isolation, process termination, and forensic artifact collection are endpoint-scoped actions.",
      exam_tip:"UBA = behavioral baseline + anomaly detection, no signature required, detects insider threats and account compromise. NAC = network access enforcement, posture check before IP assignment, certificate-based. XDR = multi-surface (endpoint + network + cloud + email) unified detection and response. EDR = endpoint-only detection, isolation, forensics, process termination. XDR is EDR + network + cloud + email. The trap: SIEM aggregates and correlates logs; XDR actively responds across surfaces.",

    {
      id:"q13",
      q:"A network administrator is reviewing the firewall ruleset and secure communication configurations for an organization's perimeter. She identifies four issues: Issue 1 — a rule permits all inbound traffic on TCP port 23 from any source to the internal server subnet. Issue 2 — a rule permits outbound traffic on any port to any destination from the entire internal network. Issue 3 — the organization's remote administration policy requires encrypted management of all network devices, but administrators are currently using an unencrypted protocol that transmits credentials in plaintext. Issue 4 — the organization's web application is accessible on TCP port 80 with no redirect to port 443. Which option CORRECTLY identifies all four issues and their remediation?",
      options:[
        {id:"a", label:"Issue 1: overly permissive HTTPS rule — port 23 is HTTPS. Remediation: restrict to specific source IPs. Issue 2: correct rule — any-to-any outbound is standard practice. Issue 3: SSH is already encrypted — no change needed. Issue 4: port 80 is secure — HTTP and HTTPS provide equivalent protection"},
        {id:"b", label:"Issue 2 is the only real security issue — inbound port 23 is a low-risk legacy protocol, unencrypted management is acceptable on internal networks, and HTTP is equivalent to HTTPS for non-login pages"},
        {id:"c", label:"Issue 1: SSH permitted inbound — port 23 is SSH, which is acceptable for encrypted remote access. Issue 2: overly permissive — correctly identified, remediate by blocking all outbound traffic. Issue 3: SNMP used for management — replace with SNMPv3 for encryption. Issue 4: port 80 only needs HTTPS if the site handles financial data — informational sites can remain on HTTP"},
        {id:"d", label:"Issue 1: Telnet (port 23) permitted inbound — Telnet transmits in plaintext including credentials. Remediation: block port 23, replace with SSH (port 22) with source IP restrictions. Issue 2: overly permissive outbound rule — any/any outbound allows data exfiltration and C2 callbacks. Remediation: restrict to required ports and destinations. Issue 3: Telnet used for device management — replace with SSH for encrypted credential transmission. Issue 4: HTTP (port 80) without HTTPS redirect — traffic is unencrypted. Remediation: redirect HTTP to HTTPS (port 443) or block port 80"},

      correct:"d",
      explanation:"Port 23 = Telnet — unencrypted, plaintext credential transmission, a critical inbound exposure. SSH (port 22) is the encrypted replacement. Any/any outbound rules create exfiltration and C2 callback paths — outbound should be restricted to required ports and known-good destinations. Using Telnet for device management transmits admin credentials in plaintext — SSH replaces Telnet for encrypted management. Port 80 HTTP without HTTPS redirect exposes session tokens and transmitted data — all web traffic should be redirected to port 443 with TLS.",
      exam_tip:"Telnet = port 23, plaintext, replace with SSH (port 22). HTTP = port 80, unencrypted, replace with HTTPS (port 443). FTP = port 21, plaintext, replace with SFTP (port 22) or FTPS (port 990). Any/any firewall rules = least privilege violation. Least privilege for firewall rules = permit only required ports, protocols, and sources/destinations. The exam tests protocol/port pairs — know which protocols transmit credentials in plaintext and their encrypted replacements.",

    {
      id:"q14",
      q:"A security team is classifying access control implementations across four systems. System 1: a cloud platform where access decisions evaluate the requesting user's department, the device's patch compliance status, the sensitivity label of the requested data, and whether the request originates from a trusted geographic region — all four attributes must match the policy for access to be granted. System 2: a document management system where the person who creates a document decides who else can read, edit, or delete it — the creator can grant or revoke permissions at any time. System 3: a government database where every document has a classification label (UNCLASSIFIED, SECRET, TOP SECRET) and every user has a clearance level — the system enforces access based on labels regardless of what the document owner prefers. System 4: a hospital system where physicians automatically receive access to patient records, nurses receive read-only access, and administrators receive billing access — permissions change automatically when an employee's job title changes. Which option CORRECTLY identifies all four access control models?",

        {id:"c", label:"System 1: MAC — mandatory policy evaluates all attributes. System 2: RBAC — document creators are assigned an owner role with full permissions. System 3: ABAC — clearance levels and classification labels are attributes evaluated simultaneously. System 4: DAC — hospital administrators discretionarily assign job-title-based permissions"},

const LEVEL_DATA={d1l1:D1L1,d1l2:D1L2,d1l3:D1L3,d1l4:D1L4,d1l5:D1L5,d2l1:D2L1,d2l2:D2L2,d2l3:D2L3,d2l4:D2L4,d2l5:D2L5,d2l6:D2L6,d3l1:D3L1,d3l2:D3L2,d3l3:D3L3,d3l4:D3L4,d3l5:D3L5,d4l1:D4L1,d4l2:D4L2,d4l3:D4L3,d4l4:D4L4,d4l5:D4L5,d4l6:D4L6,d4l7:D4L7,d4l8:D4L8,d4l9:D4L9,d4l10:D4L10};

// ── PROGRESS ─────────────────────────────────────────────────────────────────
function loadP(){try{return JSON.parse(localStorage.getItem('sp_v2')||'{}')}catch{return{}}}
function saveP(p){localStorage.setItem('sp_v2',JSON.stringify(p))}
function getLP(id){return loadP()[id]||{completed:false,mastery:0,attempts:0,xp:0,missedPBQ:[],missedMCQ:[]}}
function setLP(id,d){const p=loadP();p[id]=d;saveP(p)}
function migrateXP(){
  const p=loadP();let dirty=false;
  ALL_LEVELS.forEach(lv=>{
    const lp=p[lv.id];if(!lp||!lp.completed)return;
    const xpMax=lv.xp;
    const correct=lp.mastery===100?xpMax:lp.mastery>=70?(xpMax===175?135:xpMax===125?95:xpMax===150?115:75):0;
    if(lp.xp!==correct){lp.xp=correct;dirty=true;}
  });
  if(dirty)saveP(p);
}
function unlocked(id){
  if(id==='d1l1'||id==='d1l2'||id==='d1l3'||id==='d1l4'||id==='d1l5'||id==='d2l1'||id==='d2l2'||id==='d2l3'||id==='d2l4'||id==='d2l5'||id==='d2l6'||id==='d3l1'||id==='d3l2'||id==='d3l3'||id==='d3l4'||id==='d3l5'||id==='d4l1'||id==='d4l2'||id==='d4l3'||id==='d4l4'||id==='d4l5'||id==='d4l6'||id==='d4l7'||id==='d4l8'||id==='d4l9'||id==='d4l10')return true;
  for(const r of REALMS){
    const i=r.levels.findIndex(l=>l.id===id);
    if(i>0)return getLP(r.levels[i-1].id).completed;
    if(i===0){const ri=REALMS.indexOf(r);return ri===0||REALMS[ri-1].levels.every(l=>getLP(l.id).completed)}
  }
  return false;
}

// ── NAV ───────────────────────────────────────────────────────────────────────
let CR=null,CL=null;
function show(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0)}
function showRealm(){renderRealm();show('v-realm')}
function showLevel(rid){CR=REALMS.find(r=>r.id===rid);if(CR){renderLevel();show('v-level')}}
function showRunner(lid){CL=ALL_LEVELS.find(l=>l.id===lid);if(CL&&unlocked(lid)){initRunner();show('v-runner')}}

// ── REALM MAP ─────────────────────────────────────────────────────────────────
function renderRealm(){
  const p=loadP();
  const xpE=ALL_LEVELS.reduce((s,l)=>s+(p[l.id]?.xp||0),0);
  const done=ALL_LEVELS.filter(l=>p[l.id]?.completed).length;
  document.getElementById('h-xp').textContent=xpE;
  document.getElementById('h-done').textContent=done+'/'+ALL_LEVELS.length;
  document.getElementById('g-xp-bar').style.width=Math.max(2,(xpE/TOTAL_XP)*100)+'%';
  document.getElementById('g-xp-lbl').textContent=xpE+' / '+TOTAL_XP+' XP';
  const list=document.getElementById('realm-list');list.innerHTML='';
  REALMS.forEach((r,ri)=>{
    const done=r.levels.filter(l=>p[l.id]?.completed).length;
    const lock=ri>0&&!REALMS[ri-1].levels.every(l=>p[l.id]?.completed)&&!['d2','d3','d4'].includes(r.id);
    const c=r.color;
    const card=document.createElement('div');
    card.className='realm-card ai'+(lock?' locked':'');
    card.style.cssText=`border-color:${lock?'rgba(255,255,255,0.06)':`color-mix(in srgb,${c} 35%,transparent)`};animation-delay:${ri*.05}s`;
    if(!lock)card.onclick=()=>showLevel(r.id);
    const pips=r.levels.map(l=>{
      const lp=p[l.id];const lu=unlocked(l.id);
      return`<div class="pip" style="background:${lp?.completed?`color-mix(in srgb,${c} 18%,transparent)`:'rgba(255,255,255,0.05)'};border-color:${lp?.completed?c:lu?'rgba(255,255,255,0.2)':'rgba(255,255,255,0.07)'};color:${lp?.completed?c:lu?'#94A3B8':'#374151'}">${lp?.completed?'✓ ':lu?'▶ ':'🔒 '}${l.obj}</div>`;
    }).join('');
    const realmXP=r.levels.reduce((s,l)=>s+l.xp,0);
    const earnedXP=r.levels.reduce((s,l)=>s+(p[l.id]?.xp||0),0);
    card.innerHTML=`<div class="realm-top" style="background:linear-gradient(135deg,color-mix(in srgb,${c} 7%,transparent),transparent)">
      <div class="realm-card-left"><div class="realm-icon">${r.icon}</div>
      <div><div class="realm-w" style="color:${c}">REALM ${ri+1} · ${r.weight}% OF EXAM${lock?' · 🔒':''}</div><div class="realm-n">${r.name}</div></div></div>
      <div class="realm-ct">
        <div class="num" style="color:${c}">${done}/${r.levels.length}</div><div class="lbl">levels</div>
        <div style="font-family:var(--mono);font-size:10px;margin-top:4px;color:${earnedXP>0?c:'var(--muted)'}">
          ${earnedXP>0?earnedXP+'/'+realmXP:realmXP} XP
        </div>
      </div>
    </div>
    <div class="realm-bot">${r.levels.length?pips:'<div style="font-family:var(--mono);font-size:10px;color:var(--muted)">Coming soon</div>'}</div>`;
    list.appendChild(card);
  });
}

// ── LEVEL MAP ─────────────────────────────────────────────────────────────────
function renderLevel(){
  const r=CR;const c=r.color;const p=loadP();
  const done=r.levels.filter(l=>p[l.id]?.completed).length;
  document.getElementById('lm-sub').textContent=r.num+' · '+r.weight+'% OF EXAM';
  document.getElementById('lm-sub').style.color=c;
  document.getElementById('lm-title').textContent=r.name;
  document.getElementById('lm-done').textContent=done+'/'+r.levels.length;
  const list=document.getElementById('level-list');list.innerHTML='';
  r.levels.forEach((lv,li)=>{
    const lp=p[lv.id]||{};const lock=!unlocked(lv.id);
    const missed=(lp.missedPBQ?.length||0)+(lp.missedMCQ?.length||0);
    const mc=lp.mastery>=90?'var(--green)':lp.mastery>=70?c:'var(--amber)';
    const card=document.createElement('div');
    card.className='lvl-card ai'+(lock?' locked':'');
    card.style.cssText=`border-color:${lock?'rgba(255,255,255,0.06)':lp.completed?`color-mix(in srgb,${c} 38%,transparent)`:`color-mix(in srgb,${c} 18%,transparent)`};background:${lp.completed?`color-mix(in srgb,${c} 5%,var(--surface))`:'var(--surface)'};animation-delay:${li*.05}s`;
    if(!lock)card.onclick=()=>showRunner(lv.id);
    card.innerHTML=`<div class="lvl-left">
      <div class="lvl-num" style="background:${lp.completed?`color-mix(in srgb,${c} 20%,transparent)`:'rgba(255,255,255,0.06)'};border-color:${lp.completed?c:lock?'rgba(255,255,255,0.1)':'rgba(255,255,255,0.2)'};color:${lp.completed?c:'#64748b'}">${lock?'🔒':lp.completed?'✓':li+1}</div>
      <div><div class="lvl-name">${lv.name}</div>
      <div class="lvl-meta">
        <span class="lvl-obj">OBJ ${lv.obj}</span>
        <span class="type-tag" style="background:color-mix(in srgb,${c} 14%,transparent);color:${c};border:1px solid color-mix(in srgb,${c} 28%,transparent)">${lv.type==='review'?'REALM REVIEW':lv.type.replace('_',' ').toUpperCase()}</span>
        <span class="lvl-obj">${lv.xp} XP</span>
        ${missed>0?`<span class="missed-badge">⚑ ${missed} missed</span>`:''}
      </div></div></div>
    <div class="lvl-right">
      ${lp.mastery?`<div class="lvl-mastery" style="color:${mc}">${lp.mastery}%</div>`:''}
      ${!lock?`<div style="font-size:20px;color:${c}">›</div>`:''}
    </div>`;
    list.appendChild(card);
  });
}

// ── RUNNER STATE ──────────────────────────────────────────────────────────────
let RS={};
function initRunner(){
  const r=REALMS.find(r=>r.levels.some(l=>l.id===CL.id));
  const c=r.color;
  document.getElementById('r-obj').textContent=CL.type==='review'?'REALM REVIEW':'OBJ '+CL.obj;
  document.getElementById('r-obj').style.color=c;
  document.getElementById('r-name').textContent=CL.name;

  document.getElementById('r-pbq').style.color='var(--muted)';

  document.getElementById('r-mcq').style.color='var(--muted)';

      pbqScore:0,mcqScore:0,missedPBQ:[],missedMCQ:[],

function renderPhase(){if(RS.phase==='pbq'){if(!RS.data.pbq){RS.phase='mcq';rMCQ();return;}if(RS.data.pbq.type==='triage')rTriagePBQ();else if(RS.data.pbq.type==='match')rMatchPBQ();else if(RS.data.pbq.type==='match2')rMatch2PBQ();else if(RS.data.pbq.type==='scenario_builder')rScenarioBuilder();else if(RS.data.pbq.type==='soc_triage')rSOCTriage();else if(RS.data.pbq.type==='hotspot')rHotspotPBQ();else if(RS.data.pbq.type==='sequence')rSequencePBQ();else if(RS.data.pbq.type==='yesno')rYesNoPBQ();else if(RS.data.pbq.type==='automation_risk')rAutomationRiskPBQ();else if(RS.data.pbq.type==='fillagap')rFillAGapPBQ();else if(RS.data.pbq.type==='alert_triage')rAlertTriage();else if(RS.data.pbq.type==='config_table')rConfigTablePBQ();else if(RS.data.pbq.type==='automation_risk')rAutomationRiskPBQ();else if(RS.data.pbq.concepts)rClassifyPBQ();else rPBQ();}else if(RS.phase==='mcq')rMCQ();else rResult();}

// ── PHASE BAR ─────────────────────────────────────────────────────────────────
function phaseBar(phase,c){
  const ps=['pbq','mcq','result'];const labels=['PBQ','MCQ','Result'];
  return`<div class="phase-bar">${labels.map((l,i)=>{
    const idx=ps.indexOf(phase);
    const done=i<idx;const active=i===idx;
    const bg=done?'var(--green)':active?c:'rgba(255,255,255,0.1)';
    const col=done?'var(--green)':active?c:'#374151';
    return`<div class="ph-seg"><div class="ph-track" style="background:${bg}"></div><div class="ph-lbl" style="color:${col}">${l}</div></div>`;
  }).join('')}</div>`;
}

// ── PBQ ───────────────────────────────────────────────────────────────────────
function rPBQ(){
  const s=RS;const pbq=s.data.pbq;const c=s.color;
  const PPI=60/pbq.items.length;
  const sc=Object.keys(s.catSels).length+Object.keys(s.typeSels).length;
  const needed=pbq.items.length*2;const allSet=sc===needed;
  let h=phaseBar('pbq',c);
  h+=`<div class="meta-pills">
    <span class="mpill" style="background:color-mix(in srgb,${c} 14%,transparent);color:${c};border-color:color-mix(in srgb,${c} 28%,transparent)">DUAL CLASSIFY</span>
    <span class="mpill" style="background:rgba(217,119,6,0.14);color:var(--amber);border-color:rgba(217,119,6,0.28)">6 CONTROL TYPES</span>
    <span class="mpill" style="background:rgba(2,132,199,0.14);color:var(--d3);border-color:rgba(2,132,199,0.28)">HARD</span>
  </div><div class="meta-note">8 items · Category × Type · 7.5 pts per item · 60 pts total</div>`;
  h+=`<div class="scenario-box">
    <div class="sc-hdr"><span class="sc-tag" style="color:${c}">◉ SCENARIO</span><span class="sc-cia">${pbq.cia_tag}</span></div>
    <div class="sc-txt">${pbq.scenario}</div>
  </div><div class="instr">${pbq.instruction}</div>`;
  pbq.items.forEach((it,idx)=>{
    const cs=s.catSels[it.id];const ts=s.typeSels[it.id];
    const sub=s.pbqDone;
    const cok=sub&&cs===pbq.cat_answers[it.id];
    const tok=sub&&ts===pbq.type_answers[it.id];
    const aok=sub&&cok&&tok;
    h+=`<div class="pbq-item${sub?(aok?' ok':' bad'):''}" id="pi-${it.id}">
      <div class="pbq-hdr">
        <div class="pbq-num" style="background:color-mix(in srgb,${c} 18%,transparent);border:1px solid color-mix(in srgb,${c} 40%,transparent);color:${c}">${idx+1}</div>
        <div class="pbq-lbl"><div class="pbq-lbl-t">${it.label}</div><div class="pbq-lbl-d">${it.desc}</div></div>
        ${sub?`<div class="pbq-ri">${aok?'✓':'✗'}</div>`:''}
      </div>`;
    // Category
    h+=`<div class="axis-sec"><div class="axis-lbl" style="color:${c}">${pbq.cat_label||'Category'}`;
    if(sub&&!cok)h+=` <span class="axis-fix">✗ → ${pbq.categories.find(x=>x.id===pbq.cat_answers[it.id])?.name}</span>`;
    h+=`</div><div class="axis-pills">`;
    pbq.categories.forEach(cat=>{
      const sel=cs===cat.id;const ok=sub&&cat.id===pbq.cat_answers[it.id];const bad=sub&&sel&&!ok;
      const st=(!sub&&sel)?`border-color:${c};background:color-mix(in srgb,${c} 18%,transparent);color:${c}`:'';
      h+=`<button class="apill${ok?' pc':bad?' pw':''}" style="${st}" ${sub?'disabled':''} onclick="selCat('${it.id}','${cat.id}')">${cat.name}</button>`;
    });
    h+=`</div></div>`;
    // Type
    h+=`<div class="axis-sec"><div class="axis-lbl" style="color:var(--amber)">${pbq.type_label||'Type'}`;
    if(sub&&!tok)h+=` <span class="axis-fix">✗ → ${pbq.types.find(x=>x.id===pbq.type_answers[it.id])?.name}</span>`;
    h+=`</div><div class="axis-pills">`;
    pbq.types.forEach(typ=>{
      const sel=ts===typ.id;const ok=sub&&typ.id===pbq.type_answers[it.id];const bad=sub&&sel&&!ok;
      const st=(!sub&&sel)?`border-color:var(--amber);background:rgba(217,119,6,0.17);color:var(--amber)`:'';
      h+=`<button class="apill${ok?' pc':bad?' pw':''}" style="${st}" ${sub?'disabled':''} onclick="selTyp('${it.id}','${typ.id}')">${typ.name}</button>`;
    });
    h+=`</div></div>`;
    if(sub)h+=`<div class="expl" style="border-color:${aok?'var(--green)':'var(--red)'}">${pbq.explanations[it.id]}</div>`;
    h+=`</div>`;
  });
  if(!s.pbqDone){
    h+=`<button class="sbtn" ${allSet?'':'disabled'} style="background:${allSet?`linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c})`:''}; color:${allSet?'#fff':''}" onclick="submitPBQ()">
      ${allSet?'SUBMIT PBQ':`SET ALL AXES TO SUBMIT (${sc}/${needed})`}</button>`;
  } else {
    h+=`<button class="sbtn" onclick="gotoMCQ()" style="background:linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c});color:#fff">CONTINUE TO MCQ (${Math.round(s.pbqScore)}/60) →</button>`;
  }
  document.getElementById('r-content').innerHTML=h;
}
function selCat(id,val){if(RS.pbqDone)return;RS.catSels[id]=val;rPBQ()}
function selTyp(id,val){if(RS.pbqDone)return;RS.typeSels[id]=val;rPBQ()}
function submitPBQ(){
  const s=RS;const pbq=s.data.pbq;const PPI=60/pbq.items.length;
  let sc=0;s.missedPBQ=[];
  pbq.items.forEach(it=>{
    const cok=s.catSels[it.id]===pbq.cat_answers[it.id];
    const tok=s.typeSels[it.id]===pbq.type_answers[it.id];
    if(cok&&tok){sc+=PPI;}
    else s.missedPBQ.push({id:it.id,label:it.label,
      yourCat:pbq.categories.find(x=>x.id===s.catSels[it.id])?.name||'—',
      correctCat:pbq.categories.find(x=>x.id===pbq.cat_answers[it.id])?.name,
      yourType:pbq.types.find(x=>x.id===s.typeSels[it.id])?.name||'—',
      correctType:pbq.types.find(x=>x.id===pbq.type_answers[it.id])?.name,
      explanation:pbq.explanations[it.id]});
  });
  s.pbqScore=sc;s.pbqDone=true;
  document.getElementById('r-pbq').textContent=Math.round(sc)+'/60';
  document.getElementById('r-pbq').style.color=sc>=42?'var(--green)':'var(--amber)';
  rPBQ();window.scrollTo(0,0);
}
function gotoMCQ(){RS.phase='mcq';RS.mcqIdx=0;RS.mcqSel=null;RS.mcqDone=false;RS.mcqScores=[];rMCQ();window.scrollTo(0,0);}

// ── MCQ ───────────────────────────────────────────────────────────────────────
function rMCQ(){
  const s=RS;const mcqs=s.data.mcqs;const q=mcqs[s.mcqIdx];const c=s.color;
  const isLast=s.mcqIdx===mcqs.length-1;const isReview=RS.data.pbq===null;const MPQ=isReview?100/mcqs.length:(RS.data.pbq?.type==='yesno'?60/mcqs.length:40/mcqs.length);
  let h=phaseBar('mcq',c);
  const dots=mcqs.map((_,i)=>`<div class="mcq-dot" style="background:${i<s.mcqIdx?'var(--green)':i===s.mcqIdx?c:'rgba(255,255,255,0.12)'}"></div>`).join('');
  h+=`<div class="mcq-prog">
    <span style="font-family:var(--mono);font-size:11px;color:${c};font-weight:700">MCQ ${s.mcqIdx+1} of ${mcqs.length}</span>
    <div class="mcq-dots">${dots}</div>
    <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">${Math.round(MPQ)} pts each</span>
  </div>`;
  h+=`<div class="qbox" style="border-left-color:${c}"><div class="qlbl" style="color:${c}">◉ QUESTION</div><div class="qtxt">${q.q}</div></div>`;
  h+=`<div class="opts">`;
  q.options.forEach(opt=>{
    const sel=s.mcqSel===opt.id;const ok=s.mcqDone&&opt.id===q.correct;const bad=s.mcqDone&&sel&&!ok;
    const ltBg=ok?'rgba(34,197,94,0.25)':bad?'rgba(239,68,68,0.25)':sel?`color-mix(in srgb,${c} 25%,transparent)`:'rgba(255,255,255,0.07)';
    const ltCol=ok?'var(--green)':bad?'var(--red)':sel?c:'#64748b';
    h+=`<button class="opt${ok?' oc':bad?' ow':sel?' sel':''}" ${s.mcqDone?'disabled':''} onclick="selMCQ('${opt.id}')">
      <span class="opt-lt" style="background:${ltBg};color:${ltCol}">${opt.id.toUpperCase()}</span>
      <span>${opt.label}</span></button>`;
  });
  h+=`</div>`;
  if(s.mcqDone){
    h+=`<div class="expbox"><div class="exp-t">${q.explanation}</div>
      <div class="tip" style="background:color-mix(in srgb,${c} 7%,transparent);border-left-color:${c}">
        <span class="tip-lbl" style="color:${c}">EXAM TIP: </span>
        <span class="tip-txt">${q.exam_tip}</span>
      </div></div>`;
  }
  if(!s.mcqDone){
    h+=`<button class="sbtn" ${s.mcqSel?'':'disabled'} style="background:${s.mcqSel?`linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c})`:''}; color:${s.mcqSel?'#fff':''}" onclick="submitMCQ()">SUBMIT ANSWER</button>`;
  } else {
    h+=`<button class="sbtn" onclick="nextMCQ()" style="background:linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c});color:#fff">${isLast?'VIEW RESULTS →':`NEXT QUESTION (${s.mcqIdx+2}/${mcqs.length}) →`}</button>`;
  }
  document.getElementById('r-content').innerHTML=h;
}
function selMCQ(id){if(RS.mcqDone)return;RS.mcqSel=id;rMCQ();}
function submitMCQ(){
  const s=RS;const q=s.data.mcqs[s.mcqIdx];const MPQ=(s.data.pbq?.type==='yesno'?60:40)/s.data.mcqs.length;
  const ok=s.mcqSel===q.correct;
  s.mcqDone=true;s.mcqScores.push(ok?MPQ:0);
  if(!ok)s.missedMCQ.push({id:q.id,q:q.q,
    yourAnswer:q.options.find(o=>o.id===s.mcqSel)?.label||'—',
    correctAnswer:q.options.find(o=>o.id===q.correct)?.label,
    explanation:q.explanation,exam_tip:q.exam_tip});
  rMCQ();
}
function nextMCQ(){
  const s=RS;const isLast=s.mcqIdx===s.data.mcqs.length-1;
  if(isLast){
    s.mcqScore=s.mcqScores.reduce((a,b)=>a+b,0);
    const isRev=RS.data.pbq===null;const mcqMax=isRev?100:(RS.data.pbq?.type==='yesno'?60:40);document.getElementById('r-mcq').textContent=Math.round(s.mcqScore)+'/'+mcqMax;
    document.getElementById('r-mcq').style.color=s.mcqScore>=(isRev?70:Math.round(mcqMax*0.7))?'var(--green)':'var(--amber)';
    s.phase='result';saveResult();rResult();window.scrollTo(0,0);
  } else {
    s.mcqIdx++;s.mcqSel=null;s.mcqDone=false;rMCQ();window.scrollTo(0,0);
  }
}












// ── ALERT TRIAGE PBQ (configurable response options per alert) ────────────────
function rAlertTriage(){
  const s=RS;const pbq=s.data.pbq;const c=s.color;
  const PPI=60/pbq.alerts.length;
  const selCount=Object.keys(s.triageSels).length;
  const allSet=selCount===pbq.alerts.length;

  let h=phaseBar('pbq',c);
  h+=`<div class="meta-pills">
    <span class="mpill" style="background:color-mix(in srgb,${c} 14%,transparent);color:${c};border-color:color-mix(in srgb,${c} 28%,transparent)">ALERT TRIAGE</span>
    <span class="mpill" style="background:rgba(220,38,38,0.14);color:var(--d2);border-color:rgba(220,38,38,0.28)">${pbq.alerts.length} ALERTS</span>
    <span class="mpill" style="background:rgba(217,119,6,0.14);color:var(--amber);border-color:rgba(217,119,6,0.28)">HARD</span>
  </div>

  h+=`<div class="scenario-box">
    <div class="sc-hdr"><span class="sc-tag" style="color:${c}">◉ SCENARIO</span><span class="sc-cia">${pbq.cia_tag}</span></div>

    h+=`<div style="font-family:var(--mono);font-size:9px;font-weight:700;padding:4px 10px;border-radius:20px;border:1px solid ${r.color};color:${r.color};background:${r.bg}">${r.label}</div>`;
  });
  h+=`</div>`;

  pbq.alerts.forEach((alert,ai)=>{
    const sel=s.triageSels[alert.id];
    const correct=sub&&sel===alert.answer;
    const wrong=sub&&sel&&sel!==alert.answer;
    const correctResp=pbq.responses.find(r=>r.id===alert.answer);
    const selResp=pbq.responses.find(r=>r.id===sel);

    let cardBorder,cardBg;
    if(sub&&correct){cardBorder='rgba(34,197,94,0.45)';cardBg='rgba(34,197,94,0.04)';}
    else if(sub&&(wrong||!sel)){cardBorder='rgba(239,68,68,0.45)';cardBg='rgba(239,68,68,0.04)';}
    else if(sel){cardBorder=`color-mix(in srgb,${c} 45%,transparent)`;cardBg=`color-mix(in srgb,${c} 4%,transparent)`;}
    else{cardBorder='rgba(255,255,255,0.1)';cardBg='rgba(255,255,255,0.02)';}

    h+=`<div style="border-radius:12px;padding:14px;border:1.5px solid ${cardBorder};background:${cardBg};margin-bottom:10px">

        <div style="flex:1">
          <div style="font-family:var(--mono);font-size:9px;font-weight:700;color:${c};letter-spacing:.06em;margin-bottom:5px">ALERT ${ai+1} — ${alert.label}</div>
          <div style="font-size:15px;color:#CBD5E1;line-height:1.65">${alert.description}</div>
        </div>
        ${sub?`<div style="font-family:var(--mono);font-size:9px;font-weight:700;color:${correct?'var(--green)':'var(--red)'};flex-shrink:0">${correct?'✓ CORRECT':'✗ INCORRECT'}</div>`:''}
      </div>`;

    if(!sub){
      h+=`<div style="display:flex;gap:6px;flex-wrap:wrap">`;
      pbq.responses.forEach(r=>{
        const isSel=sel===r.id;
        h+=`<button onclick="selAlertTriage('${alert.id}','${r.id}')"
          style="padding:8px 14px;border-radius:9px;font-family:var(--mono);font-size:11px;font-weight:700;
          border:1.5px solid ${isSel?r.color:'rgba(255,255,255,0.12)'};
          background:${isSel?r.bg:'transparent'};
          color:${isSel?r.color:'#475569'};cursor:pointer;transition:all .12s">${r.label}</button>`;
      });
      h+=`</div>`;
    } else {
      h+=`<div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
        <div style="padding:6px 13px;border-radius:20px;font-family:var(--mono);font-size:11px;font-weight:700;
          background:${correct?'rgba(34,197,94,0.18)':'rgba(239,68,68,0.18)'};
          border:1.5px solid ${correct?'var(--green)':'var(--red)'};
          color:${correct?'var(--green)':'var(--red)'}">
          ${correct?'✓':'✗'} ${selResp?.label||'Not answered'}</div>
        ${!correct?`<div style="padding:6px 13px;border-radius:20px;font-family:var(--mono);font-size:11px;font-weight:700;background:rgba(34,197,94,0.18);border:1.5px solid var(--green);color:var(--green)">→ ${correctResp?.label}</div>`:''}
      </div>
      <div class="expl" style="border-color:${correct?'var(--green)':'var(--red)'};font-size:12px">${alert.explanation}</div>`;
    }
    h+=`</div>`;
  });

  if(!sub){
    h+=`<button class="sbtn" ${allSet?'':'disabled'}
      style="background:${allSet?`linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c})`:''}; color:${allSet?'#fff':''}"
      onclick="submitAlertTriage()">
      ${allSet?'SUBMIT TRIAGE':`TRIAGE ALL ALERTS TO SUBMIT (${selCount}/${pbq.alerts.length})`}</button>`;
  } else {
    h+=`<button class="sbtn" onclick="gotoMCQ()" style="background:linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c});color:#fff">CONTINUE TO MCQ (${Math.round(s.pbqScore)}/60) →</button>`;
  }
  document.getElementById('r-content').innerHTML=h;
}

function submitAlertTriage(){

}


// ── CONFIGURATION TABLE PBQ ───────────────────────────────────────────────────
function rConfigTablePBQ(){

    {id:'remove',      lbl:'REMOVE',                 col:'var(--red)',   bg:'rgba(239,68,68,0.15)'},

    <span class="mpill" style="background:rgba(220,38,38,0.14);color:var(--d2);border-color:rgba(220,38,38,0.28)">${pbq.rules.length} RULES</span>

  h+=`<div class="scenario-box">
    <div class="sc-hdr"><span class="sc-tag" style="color:${c}">◉ SCENARIO</span><span class="sc-cia">${pbq.cia_tag}</span></div>
    <div class="sc-txt">${pbq.scenario}</div>

  pbq.rules.forEach((rule)=>{

    const wrong=sub&&!correct;
    const borderCol=sub?(correct?'rgba(34,197,94,0.45)':wrong?'rgba(239,68,68,0.45)':'rgba(255,255,255,0.1)'):'rgba(255,255,255,0.1)';
    const cardBg=sub?(correct?'rgba(34,197,94,0.04)':wrong?'rgba(239,68,68,0.04)':'rgba(255,255,255,0.02)'):'rgba(255,255,255,0.02)';

    h+=`<div style="border:1.5px solid ${borderCol};background:${cardBg};border-radius:12px;overflow:hidden;margin-bottom:12px">`;

    // Card header bar
    h+=`<div style="padding:8px 12px;background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.08)">
      <span style="font-family:var(--mono);font-size:11px;font-weight:700;color:${c}">RULE ${rule.num}</span>

    // Field rows — label above value
    h+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;border-bottom:1px solid rgba(255,255,255,0.08)">
      ${[
        {lbl:'DIR',  val:rule.dir},
        {lbl:'SRC',  val:rule.src},
        {lbl:'DST',  val:rule.dst},

        {lbl:'STATUS',val:rule.current},
      ].map((f,i)=>`
        <div style="padding:8px 10px;${i<4?'border-right:1px solid rgba(255,255,255,0.06)':''}">

          <div style="font-family:var(--mono);font-size:${f.lbl==='PORT'?'12px':'11px'};font-weight:700;
            color:${f.lbl==='PORT'?c:f.lbl==='STATUS'?(f.val==='ALLOW'?'var(--green)':'var(--red)'):'#CBD5E1'}">${f.val}</div>
        </div>`).join('')}
    </div>`;

    // Action buttons
    if(!sub){
      h+=`<div style="padding:10px 12px;display:flex;flex-wrap:wrap;gap:7px">
        ${ACTIONS.map(act=>{
          const isSel=sel===act.id;
          return `<button onclick="selConfig('${rule.id}','${act.id}')"
            style="font-family:var(--mono);font-size:11px;font-weight:700;padding:8px 14px;border-radius:9px;
            border:1.5px solid ${isSel?act.col:'rgba(255,255,255,0.15)'};

            color:${isSel?act.col:'#475569'};cursor:pointer;transition:all .12s">${act.lbl}</button>`;
        }).join('')}
      </div>`;
    } else {
      const ansAct=ACTIONS.find(a=>a.id===rule.answer);
      h+=`<div style="padding:10px 12px">
        <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:${correct?'0':'8px'}">
          ${correct
            ? `<span style="font-family:var(--mono);font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;background:rgba(34,197,94,0.18);border:1.5px solid var(--green);color:var(--green)">✓ ${ansAct.lbl}</span>`
            : `<span style="font-family:var(--mono);font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;background:rgba(239,68,68,0.18);border:1.5px solid var(--red);color:var(--red)">✗ ${selAct?.lbl||'—'}</span>
               <span style="font-family:var(--mono);font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;background:rgba(34,197,94,0.18);border:1.5px solid var(--green);color:var(--green)">→ ${ansAct.lbl}</span>`
          }
        </div>
        ${!correct?`<div style="font-size:13px;color:#94A3B8;line-height:1.6;border-left:3px solid var(--red);padding-left:10px;margin-top:8px">${rule.explanation}</div>`
          :`<div style="font-size:13px;color:#94A3B8;line-height:1.6;border-left:3px solid var(--green);padding-left:10px;margin-top:8px">${rule.explanation}</div>`}
      </div>`;
    }

    h+=`</div>`;
  });

  if(!sub){
    h+=`<button class="sbtn" ${allSet?'':'disabled'}
      style="background:${allSet?`linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c})`:''}; color:${allSet?'#fff':''}"
      onclick="submitConfigTable()">
      ${allSet?'SUBMIT RULE DECISIONS':`EVALUATE ALL RULES TO SUBMIT (${selCount}/${pbq.rules.length})`}</button>`;
  } else {
    h+=`<button class="sbtn" onclick="gotoMCQ()" style="background:linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c});color:#fff">CONTINUE TO MCQ (${Math.round(s.pbqScore)}/60) →</button>`;
  }
  document.getElementById('r-content').innerHTML=h;
}

function selConfig(ruleId,val){
  if(RS.pbqDone)return;
  if(!RS.configSels)RS.configSels={};
  RS.configSels[ruleId]=val;
  rConfigTablePBQ();
}

function submitConfigTable(){
  const s=RS;const pbq=s.data.pbq;
  const PPI=60/pbq.rules.length;
  let sc=0;s.missedPBQ=[];
  pbq.rules.forEach(rule=>{
    const sel=(s.configSels||{})[rule.id];
    const correct=sel===rule.answer;
    if(correct){sc+=PPI;}
    else{
      const ACTS={keep:'Keep',remove:'Remove',modify_src:'Modify → restrict source',modify_port:'Modify → restrict port',modify_dst:'Modify → restrict dest'};
      const ansLbl=ACTS[rule.answer]||rule.answer;
      const selLbl=sel?(ACTS[sel]||sel):'Not answered';
      s.missedPBQ.push({
        id:rule.id,label:'Rule '+rule.num+' ('+rule.port+')',
        yourCat:selLbl,correctCat:ansLbl,
        yourType:'',correctType:'',
        explanation:rule.explanation,
      });
    }
  });
  s.pbqScore=Math.round(sc);s.pbqDone=true;
  document.getElementById('r-pbq').textContent=Math.round(sc)+'/60';
  document.getElementById('r-pbq').style.color=sc>=42?'var(--green)':'var(--amber)';
  rConfigTablePBQ();window.scrollTo(0,0);
}

// ── AUTOMATION RISK PBQ (SOUND / RISK binary) ────────────────────────────────
function rAutomationRiskPBQ(){
  const s=RS;const pbq=s.data.pbq;const c=s.color;
  const PPI=60/pbq.statements.length;
  const answered=Object.keys(s.yesnoSels).length;
  const allAnswered=answered===pbq.statements.length;
  const sub=s.pbqDone;

  let h=phaseBar('pbq',c);
  h+=`<div class="meta-pills">
    <span class="mpill" style="background:color-mix(in srgb,${c} 14%,transparent);color:${c};border-color:color-mix(in srgb,${c} 28%,transparent)">AUTOMATION RISK REVIEW</span>
    <span class="mpill" style="background:rgba(220,38,38,0.14);color:var(--d2);border-color:rgba(220,38,38,0.28)">${pbq.statements.length} DESIGNS</span>
    <span class="mpill" style="background:rgba(217,119,6,0.14);color:var(--amber);border-color:rgba(217,119,6,0.28)">HARD</span>
  </div>
  <div class="meta-note">${pbq.statements.length} automation designs · ${Math.round(PPI)} pts each · 60 pts total</div>`;

  h+=`<div class="scenario-box">
    <div class="sc-hdr"><span class="sc-tag" style="color:${c}">◉ SCENARIO</span><span class="sc-cia">${pbq.cia_tag}</span></div>
    <div class="sc-txt">${pbq.scenario}</div>
  </div><div class="instr">${pbq.instruction}</div>`;

  // Legend
  h+=`<div style="display:flex;gap:10px;margin-bottom:14px">
    <div style="font-family:var(--mono);font-size:10px;font-weight:700;padding:4px 14px;border-radius:20px;border:1.5px solid var(--green);color:var(--green);background:rgba(34,197,94,0.08)">✓ SOUND</div>
    <div style="font-family:var(--mono);font-size:10px;font-weight:700;padding:4px 14px;border-radius:20px;border:1.5px solid var(--red);color:var(--red);background:rgba(239,68,68,0.08)">⚠ RISK</div>
  </div>`;

  pbq.statements.forEach(stmt=>{
    const sel=s.yesnoSels[stmt.id];
    const sub2=sub;
    const correct=sub2&&sel===stmt.answer;
    const wrong=sub2&&sel&&sel!==stmt.answer;
    const cardBorder=sub2?(correct?'rgba(34,197,94,0.4)':wrong?'rgba(239,68,68,0.4)':'rgba(255,255,255,0.1)'):(sel?`color-mix(in srgb,${c} 35%,transparent)`:'rgba(255,255,255,0.1)');
    const cardBg=sub2?(correct?'rgba(34,197,94,0.04)':wrong?'rgba(239,68,68,0.04)':'rgba(255,255,255,0.02)'):'rgba(255,255,255,0.02)';

    h+=`<div style="border:1.5px solid ${cardBorder};background:${cardBg};border-radius:12px;padding:13px;margin-bottom:10px">`;

    // Context tag
    h+=`<div style="font-family:var(--mono);font-size:9px;font-weight:700;color:${c};letter-spacing:.06em;margin-bottom:6px">${stmt.context}</div>`;

    // Statement text
    h+=`<div style="font-size:15px;color:#CBD5E1;line-height:1.65;margin-bottom:11px">${stmt.text}</div>`;

    if(!sub2){
      h+=`<div style="display:flex;gap:8px">
        <button onclick="selYesNo('${stmt.id}','sound')"
          style="flex:1;padding:9px;border-radius:9px;font-family:var(--mono);font-size:11px;font-weight:700;
          border:1.5px solid ${sel==='sound'?'var(--green)':'rgba(34,197,94,0.2)'};
          background:${sel==='sound'?'rgba(34,197,94,0.18)':'transparent'};
          color:${sel==='sound'?'var(--green)':'#475569'};cursor:pointer">✓ SOUND</button>
        <button onclick="selYesNo('${stmt.id}','risk')"
          style="flex:1;padding:9px;border-radius:9px;font-family:var(--mono);font-size:11px;font-weight:700;
          border:1.5px solid ${sel==='risk'?'var(--red)':'rgba(239,68,68,0.2)'};
          background:${sel==='risk'?'rgba(239,68,68,0.18)':'transparent'};
          color:${sel==='risk'?'var(--red)':'#475569'};cursor:pointer">⚠ RISK</button>
      </div>`;
    } else {
      const col=correct?'var(--green)':'var(--red)';
      const ansLbl=stmt.answer==='sound'?'✓ SOUND':'⚠ RISK';
      const selLbl=sel==='sound'?'✓ SOUND':'⚠ RISK';
      h+=`<div style="display:flex;gap:8px;margin-bottom:8px">
        <div style="padding:5px 14px;border-radius:20px;font-family:var(--mono);font-size:11px;font-weight:700;
          background:${correct?'rgba(34,197,94,0.18)':'rgba(239,68,68,0.18)'};
          border:1.5px solid ${col};color:${col}">
          ${correct?ansLbl:'✗ '+selLbl}</div>
        ${!correct?`<div style="padding:5px 14px;border-radius:20px;font-family:var(--mono);font-size:11px;font-weight:700;
          background:rgba(34,197,94,0.18);border:1.5px solid var(--green);color:var(--green)">→ ${ansLbl}</div>`:''}
      </div>
      <div class="expl" style="border-color:${col}">${stmt.explanation}</div>`;
    }
    h+=`</div>`;
  });

  if(!sub){
    h+=`<button class="sbtn" ${allAnswered?'':'disabled'}
      style="background:${allAnswered?`linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c})`:''}; color:${allAnswered?'#fff':''}"
      onclick="submitAutomationRisk()">
      ${allAnswered?'SUBMIT RISK REVIEW':`EVALUATE ALL DESIGNS TO SUBMIT (${answered}/${pbq.statements.length})`}</button>`;
  } else {
    h+=`<button class="sbtn" onclick="gotoMCQ()" style="background:linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c});color:#fff">CONTINUE TO MCQ (${Math.round(s.pbqScore)}/60) →</button>`;
  }
  document.getElementById('r-content').innerHTML=h;
}

function submitAutomationRisk(){
  const s=RS;const pbq=s.data.pbq;
  const PPI=60/pbq.statements.length;
  let sc=0;s.missedPBQ=[];
  pbq.statements.forEach(stmt=>{
    const sel=s.yesnoSels[stmt.id];
    const correct=sel===stmt.answer;
    if(correct){sc+=PPI;}
    else s.missedPBQ.push({
      id:stmt.id,label:stmt.context,
      yourCat:sel==='sound'?'SOUND':'RISK',
      correctCat:stmt.answer==='sound'?'SOUND':'RISK',
      yourType:'',correctType:'',
      explanation:stmt.explanation,
    });
  });
  s.pbqScore=Math.round(sc);s.pbqDone=true;
  document.getElementById('r-pbq').textContent=Math.round(sc)+'/60';
  document.getElementById('r-pbq').style.color=sc>=42?'var(--green)':'var(--amber)';
  rAutomationRiskPBQ();window.scrollTo(0,0);
}
// ── FILL-A-GAP PBQ ────────────────────────────────────────────────────────────
function rFillAGapPBQ(){
  const s=RS;const pbq=s.data.pbq;const c=s.color;
  const PPG=Math.round(60/pbq.gaps.length);
  const answered=Object.keys(s.gapSels).length;
  const allAnswered=answered===pbq.gaps.length;
  const sub=s.pbqDone;
  const usedOpts=Object.values(s.gapSels);

  let h=phaseBar('pbq',c);
  h+=`<div class="meta-pills">
    <span class="mpill" style="background:color-mix(in srgb,${c} 14%,transparent);color:${c};border-color:color-mix(in srgb,${c} 28%,transparent)">FILL THE GAP</span>
    <span class="mpill" style="background:rgba(220,38,38,0.14);color:var(--d2);border-color:rgba(220,38,38,0.28)">${pbq.gaps.length} GAPS</span>
    <span class="mpill" style="background:rgba(217,119,6,0.14);color:var(--amber);border-color:rgba(217,119,6,0.28)">MEDIUM</span>
  </div>
  <div class="meta-note">${pbq.gaps.length} blanks · ${PPG} pts each · 60 pts total</div>`;

  h+=`<div class="scenario-box">
    <div class="sc-hdr"><span class="sc-tag" style="color:${c}">◉ SCENARIO</span><span class="sc-cia">${pbq.cia_tag}</span></div>
    <div class="sc-txt">${pbq.scenario}</div>
  </div><div class="instr">${pbq.instruction}</div>`;

  // Build document with inline gap dropdowns
  let doc=pbq.document;
  pbq.gaps.forEach((gap,gi)=>{
    const sel=s.gapSels[gap.id];
    const correct=sub&&sel===gap.answer;
    const wrong=sub&&sel&&sel!==gap.answer;
    let slotHtml;
    if(!sub){
      const shuffledOpts=[...pbq.options].sort(()=>Math.random()-0.5);
      let opts=`<option value="">— select —</option>`;
      shuffledOpts.forEach(opt=>{
        const taken=usedOpts.includes(opt)&&sel!==opt;
        opts+=`<option value="${opt}" ${sel===opt?'selected':''} ${taken?'disabled':''}>${opt}</option>`;
      });
      slotHtml=`<select onchange="selGap('${gap.id}',this.value)"
        style="font-family:var(--mono);font-size:11px;font-weight:700;
        padding:3px 8px;border-radius:7px;cursor:pointer;
        border:1.5px solid ${sel?`color-mix(in srgb,${c} 60%,transparent)`:'rgba(255,255,255,0.2)'};
        background:${sel?`color-mix(in srgb,${c} 14%,transparent)`:'rgba(255,255,255,0.05)'};
        color:${sel?c:'#94A3B8'}">${opts}</select>`;
    } else {
      slotHtml=`<span style="font-family:var(--mono);font-size:11px;font-weight:700;
        padding:3px 10px;border-radius:7px;
        border:1.5px solid ${correct?'var(--green)':wrong?'var(--red)':'rgba(255,255,255,0.2)'};
        background:${correct?'rgba(34,197,94,0.15)':wrong?'rgba(239,68,68,0.15)':'transparent'};
        color:${correct?'var(--green)':wrong?'var(--red)':'#94A3B8'}">
        ${sel||'—'}${wrong?` → <span style="color:var(--green)">${gap.answer}</span>`:''}
        </span>`;
    }
    doc=doc.replace(`<span class="gap-slot" data-id="${gap.id}">___</span>`,slotHtml);
  });

  h+=`<div style="background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:14px;padding:16px 18px;margin-bottom:16px">${doc}</div>`;

  // Post-submit explanations
  if(sub){
    h+=`<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">`;
    pbq.gaps.forEach(gap=>{
      const sel=s.gapSels[gap.id];
      const correct=sel===gap.answer;
      h+=`<div style="padding:10px 14px;border-radius:10px;border:1.5px solid ${correct?'rgba(34,197,94,0.35)':'rgba(239,68,68,0.35)'};background:${correct?'rgba(34,197,94,0.04)':'rgba(239,68,68,0.04)'}">
        <div style="font-family:var(--mono);font-size:10px;font-weight:700;color:${correct?'var(--green)':'var(--red)'};margin-bottom:4px">
          ${correct?'✓':' ✗'} GAP ${pbq.gaps.indexOf(gap)+1}: <span style="color:var(--green)">${gap.answer}</span>${!correct&&sel?` (you selected: ${sel})`:''}
        </div>
        <div style="font-size:12px;color:#64748B;line-height:1.6">${gap.explanation}</div>
      </div>`;
    });
    h+=`</div>`;
    h+=`<button class="sbtn" onclick="gotoMCQ()" style="background:linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c});color:#fff">CONTINUE TO MCQ (${Math.round(s.pbqScore)}/60) →</button>`;
  } else {
    h+=`<button class="sbtn" ${allAnswered?'':'disabled'}
      style="background:${allAnswered?`linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c})`:''}; color:${allAnswered?'#fff':''}"
      onclick="submitFillAGap()">
      ${allAnswered?'SUBMIT POLICY':`FILL ALL GAPS TO SUBMIT (${answered}/${pbq.gaps.length})`}</button>`;
  }
  document.getElementById('r-content').innerHTML=h;
}

function selGap(id,val){
  if(RS.pbqDone)return;
  if(val)RS.gapSels[id]=val;
  else delete RS.gapSels[id];
  rFillAGapPBQ();
}

function submitFillAGap(){
  const s=RS;const pbq=s.data.pbq;
  const PPG=60/pbq.gaps.length;
  let sc=0;s.missedPBQ=[];
  pbq.gaps.forEach(gap=>{
    const sel=s.gapSels[gap.id];
    const correct=sel===gap.answer;
    if(correct){sc+=PPG;}
    else{
      s.missedPBQ.push({
        id:gap.id,label:`Gap: ${gap.answer}`,
        yourCat:sel||'Not answered',correctCat:gap.answer,
        yourType:'',correctType:'',
        explanation:gap.explanation,
      });
    }
  });
  s.pbqScore=Math.round(sc);s.pbqDone=true;
  document.getElementById('r-pbq').textContent=Math.round(sc)+'/60';
  document.getElementById('r-pbq').style.color=sc>=42?'var(--green)':'var(--amber)';
  rFillAGapPBQ();window.scrollTo(0,0);
}

// ── YES/NO PBQ (hardens / weakens per statement) ─────────────────────────────
function rYesNoPBQ(){
  const s=RS;const pbq=s.data.pbq;const c=s.color;
  const PPItem=40/pbq.statements.length;
  const answered=Object.keys(s.yesnoSels).length;
  const allAnswered=answered===pbq.statements.length;
  const sub=s.pbqDone;

  let h=phaseBar('pbq',c);
  h+=`<div class="meta-pills">
    <span class="mpill" style="background:color-mix(in srgb,${c} 14%,transparent);color:${c};border-color:color-mix(in srgb,${c} 28%,transparent)">HARDENING REVIEW</span>
    <span class="mpill" style="background:rgba(220,38,38,0.14);color:var(--d2);border-color:rgba(220,38,38,0.28)">${pbq.statements.length} STATEMENTS</span>
    <span class="mpill" style="background:rgba(217,119,6,0.14);color:var(--amber);border-color:rgba(217,119,6,0.28)">MEDIUM</span>
  </div>
  <div class="meta-note">${pbq.statements.length} configuration statements · ${Math.round(PPItem)} pts each · 40 pts total</div>`;

  h+=`<div class="scenario-box">
    <div class="sc-hdr"><span class="sc-tag" style="color:${c}">◉ SCENARIO</span><span class="sc-cia">${pbq.cia_tag}</span></div>
    <div class="sc-txt">${pbq.scenario}</div>
  </div><div class="instr">${pbq.instruction}</div>`;

  h+=`<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">`;
  pbq.statements.forEach((stmt,si)=>{
    const sel=s.yesnoSels[stmt.id];
    const isAnswered=sel!==undefined;
    const correct=sub&&sel===stmt.answer;
    const wrong=sub&&sel!==undefined&&sel!==stmt.answer;
    const missed=sub&&sel===undefined;

    let cardBorder,cardBg;
    if(sub&&correct){cardBorder='rgba(34,197,94,0.45)';cardBg='rgba(34,197,94,0.04)';}
    else if(sub&&(wrong||missed)){cardBorder='rgba(239,68,68,0.45)';cardBg='rgba(239,68,68,0.04)';}
    else if(isAnswered){cardBorder=`color-mix(in srgb,${c} 45%,transparent)`;cardBg=`color-mix(in srgb,${c} 4%,transparent)`;}
    else{cardBorder='rgba(255,255,255,0.1)';cardBg='rgba(255,255,255,0.02)';}

    h+=`<div style="border-radius:12px;padding:12px 14px;border:2px solid ${cardBorder};background:${cardBg};transition:all .12s">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;flex-wrap:wrap">
        <div style="font-family:var(--mono);font-size:9px;font-weight:700;color:${c};letter-spacing:.06em">${stmt.device}</div>
        ${sub?`<div style="font-family:var(--mono);font-size:9px;font-weight:700;color:${correct?'var(--green)':'var(--red)'}">${correct?'✓ CORRECT':'✗ INCORRECT'}</div>`:''}
      </div>
      <div style="font-size:13px;color:#CBD5E1;line-height:1.65;margin-bottom:10px">${stmt.text}</div>`;

    if(!sub){
      h+=`<div style="display:flex;gap:8px">
        <button onclick="selYesNo('${stmt.id}','hardens')"
          style="flex:1;padding:9px;border-radius:9px;font-family:var(--mono);font-size:11px;font-weight:700;
          border:1.5px solid ${sel==='hardens'?'var(--green)':'rgba(34,197,94,0.2)'};
          background:${sel==='hardens'?'rgba(34,197,94,0.18)':'transparent'};
          color:${sel==='hardens'?'var(--green)':'#475569'};cursor:pointer">⬆ HARDENS</button>

// ── SEQUENCE PBQ (drag-and-drop ordering) ─────────────────────────────────────
function initSequence(){
  if(RS.sequenceOrder.length===0){
    const steps=[...RS.data.pbq.steps];
    // Fisher-Yates shuffle
    for(let i=steps.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [steps[i],steps[j]]=[steps[j],steps[i]];
    }
    RS.sequenceOrder=steps.map(s=>s.id);
  }
}

  initSequence();
  const s=RS;const pbq=s.data.pbq;const c=s.color;

let seqDragId=null;
function seqDragStart(e,id){
  seqDragId=id;
  e.target.style.opacity='0.4';
  e.dataTransfer.effectAllowed='move';
}
function seqDragEnd(e){e.target.style.opacity='1';}
function seqDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';}
function seqDrop(e,targetId){
  e.preventDefault();
  if(seqDragId===targetId)return;
  const order=RS.sequenceOrder;
  const fromIdx=order.indexOf(seqDragId);
  const toIdx=order.indexOf(targetId);
  order.splice(fromIdx,1);
  order.splice(toIdx,0,seqDragId);
  seqDragId=null;
  rSequencePBQ();
}

// Touch support for mobile drag-and-drop
let touchDragId=null,touchClone=null;
function seqTouchStart(e,id){
  touchDragId=id;
  const item=e.currentTarget;
  touchClone=item.cloneNode(true);
  touchClone.style.cssText=`position:fixed;opacity:0.8;pointer-events:none;width:${item.offsetWidth}px;z-index:9999;transform:scale(1.02);transition:none`;
  document.body.appendChild(touchClone);
  item.style.opacity='0.4';
}
function seqTouchMove(e){
  if(!touchClone)return;
  e.preventDefault();
  const t=e.touches[0];
  touchClone.style.left=(t.clientX-touchClone.offsetWidth/2)+'px';
  touchClone.style.top=(t.clientY-30)+'px';
}
function seqTouchEnd(e){
  if(!touchDragId)return;
  if(touchClone){touchClone.remove();touchClone=null;}
  const t=e.changedTouches[0];
  const el=document.elementFromPoint(t.clientX,t.clientY);
  const item=el?.closest('.seq-item');
  if(item&&item.dataset.id&&item.dataset.id!==touchDragId){
    const order=RS.sequenceOrder;
    const fromIdx=order.indexOf(touchDragId);
    const toIdx=order.indexOf(item.dataset.id);
    order.splice(fromIdx,1);
    order.splice(toIdx,0,touchDragId);
  }
  document.querySelectorAll('.seq-item').forEach(x=>x.style.opacity='1');
  touchDragId=null;
  rSequencePBQ();
}

// ── HOTSPOT PBQ (tap sensitive fields + assign protection method) ─────────────
function rHotspotPBQ(){
  const s=RS;const pbq=s.data.pbq;const c=s.color;
  const sensitiveFields=pbq.fields.filter(f=>f.requires_protection);
  const totalFields=sensitiveFields.length;
  // Count correctly flagged + correctly assigned
  const flagged=Object.keys(s.hotspotSels).filter(id=>{
    const f=pbq.fields.find(x=>x.id===id);
    return f&&f.requires_protection&&s.hotspotSels[id]!==undefined;
  });
  const wrongFlags=Object.keys(s.hotspotSels).filter(id=>{
    const f=pbq.fields.find(x=>x.id===id);
    return f&&!f.requires_protection;
  });
  const allFlagged=sensitiveFields.every(f=>s.hotspotSels[f.id]!==undefined);
  const PPF=Math.round(60/totalFields);

  let h=phaseBar('pbq',c);
  h+=`<div class="meta-pills">
    <span class="mpill" style="background:color-mix(in srgb,${c} 14%,transparent);color:${c};border-color:color-mix(in srgb,${c} 28%,transparent)">DATA FIELD ANALYSIS</span>
    <span class="mpill" style="background:rgba(220,38,38,0.14);color:var(--d2);border-color:rgba(220,38,38,0.28)">${pbq.fields.length} FIELDS</span>
    <span class="mpill" style="background:rgba(217,119,6,0.14);color:var(--amber);border-color:rgba(217,119,6,0.28)">HARD</span>
  </div>
  <div class="meta-note">${pbq.fields.length} fields · flag sensitive fields · assign protection method · ${PPF} pts per field · 60 pts total</div>`;

  h+=`<div class="scenario-box">
    <div class="sc-hdr"><span class="sc-tag" style="color:${c}">◉ SCENARIO</span><span class="sc-cia">${pbq.cia_tag}</span></div>
    <div class="sc-txt">${pbq.scenario}</div>
  </div><div class="instr">${pbq.instruction}</div>`;

  // Field grid
  h+=`<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">`;
  pbq.fields.forEach(field=>{
    const sel=s.hotspotSels[field.id];
    const isFlagged=sel!==undefined;
    const sub=s.pbqDone;
    const isCorrectFlag=field.requires_protection;
    const wrongFlag=sub&&isFlagged&&!isCorrectFlag;
    const missedFlag=sub&&!isFlagged&&isCorrectFlag;
    const methodCorrect=sub&&isFlagged&&isCorrectFlag&&sel===field.method_answer;
    const methodWrong=sub&&isFlagged&&isCorrectFlag&&sel!==field.method_answer;

    let cardBorder,cardBg,flagBtnStyle;
    if(sub&&isCorrectFlag&&methodCorrect){
      cardBorder='rgba(34,197,94,0.5)';cardBg='rgba(34,197,94,0.04)';
    } else if(sub&&(wrongFlag||missedFlag||methodWrong)){
      cardBorder='rgba(239,68,68,0.5)';cardBg='rgba(239,68,68,0.04)';
    } else if(isFlagged){
      cardBorder=`color-mix(in srgb,${c} 50%,transparent)`;cardBg=`color-mix(in srgb,${c} 5%,transparent)`;
    } else {
      cardBorder='rgba(255,255,255,0.1)';cardBg='rgba(255,255,255,0.02)';
    }

    h+=`<div style="border-radius:12px;padding:12px 14px;border:2px solid ${cardBorder};background:${cardBg};transition:all .15s">`;

    // Field header row
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;flex-wrap:wrap">
      <div>
        <div style="font-family:var(--mono);font-size:10px;font-weight:700;color:${c};letter-spacing:.05em;margin-bottom:2px">${field.label}</div>
        <div style="font-size:12px;color:#94A3B8;font-family:var(--mono)">${field.value}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${sub&&wrongFlag?`<span style="font-family:var(--mono);font-size:9px;color:var(--red)">✗ NOT SENSITIVE</span>`:''}
        ${sub&&missedFlag?`<span style="font-family:var(--mono);font-size:9px;color:var(--red)">✗ MISSED</span>`:''}
        ${sub&&isCorrectFlag&&methodCorrect?`<span style="font-family:var(--mono);font-size:9px;color:var(--green)">✓</span>`:''}
        ${!sub?`<button onclick="toggleHotspot('${field.id}')" style="padding:5px 12px;border-radius:20px;font-family:var(--mono);font-size:10px;font-weight:700;
          border:1.5px solid ${isFlagged?c:'rgba(255,255,255,0.2)'};
          background:${isFlagged?`color-mix(in srgb,${c} 20%,transparent)`:'transparent'};
          color:${isFlagged?c:'#475569'};cursor:pointer">${isFlagged?'⚑ FLAGGED':'FLAG'}</button>`:''}
      </div>
    </div>`;

    // Method selector — only shown when flagged
    if(isFlagged&&!sub){
      h+=`<div style="margin-top:8px">
        <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-bottom:6px;font-weight:700">SELECT PROTECTION METHOD:</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">`;
      pbq.method_options.forEach(opt=>{
        const isSel=sel===opt.id;
        h+=`<button onclick="selHotspotMethod('${field.id}','${opt.id}')"
          style="padding:5px 11px;border-radius:7px;font-family:var(--mono);font-size:10px;font-weight:600;
          border:1.5px solid ${isSel?c:'rgba(255,255,255,0.12)'};
          background:${isSel?`color-mix(in srgb,${c} 20%,transparent)`:'transparent'};
          color:${isSel?c:'#475569'};cursor:pointer">${opt.name}</button>`;
      });
      h+=`</div></div>`;
    }

    // Post-submit feedback
    if(sub){
      if(wrongFlag){
        h+=`<div class="expl" style="border-color:var(--red);margin-top:8px;font-size:12px">${field.explanation}</div>`;
      } else if(missedFlag){
        h+=`<div class="expl" style="border-color:var(--red);margin-top:8px;font-size:12px">⚑ This field required protection. ${field.explanation}</div>`;
      } else if(isCorrectFlag){
        const corrMethod=pbq.method_options.find(x=>x.id===field.method_answer)?.name;
        const selMethod=pbq.method_options.find(x=>x.id===sel)?.name;
        if(methodWrong){
          h+=`<div style="font-family:var(--mono);font-size:10px;color:var(--red);margin-top:6px">✗ You selected: ${selMethod} → Correct: ${corrMethod}</div>`;
          h+=`<div class="expl" style="border-color:var(--red);margin-top:6px;font-size:12px">${field.method_explanation}</div>`;
        } else {
          h+=`<div style="display:flex;align-items:center;gap:6px;margin-top:6px">
            <span style="font-family:var(--mono);font-size:10px;padding:3px 10px;border-radius:12px;background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3)">${corrMethod}</span>
          </div>`;
          h+=`<div class="expl" style="border-color:var(--green);margin-top:6px;font-size:12px">${field.method_explanation||field.explanation}</div>`;
        }
      } else {
        h+=`<div class="expl" style="border-color:var(--green);margin-top:8px;font-size:12px">${field.explanation}</div>`;
      }
    }

    h+=`</div>`;
  });
  h+=`</div>`;

  if(!s.pbqDone){
    const readyCount=sensitiveFields.filter(f=>s.hotspotSels[f.id]!==undefined).length;
    h+=`<button class="sbtn" ${allFlagged?'':'disabled'}
      style="background:${allFlagged?`linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c})`:''}; color:${allFlagged?'#fff':''}"
      onclick="submitHotspotPBQ()">
      ${allFlagged?'SUBMIT ANALYSIS':`FLAG ALL SENSITIVE FIELDS AND ASSIGN METHODS (${readyCount}/${totalFields})`}</button>`;
  } else {
    h+=`<button class="sbtn" onclick="gotoMCQ()" style="background:linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c});color:#fff">CONTINUE TO MCQ (${Math.round(s.pbqScore)}/60) →</button>`;
  }
  document.getElementById('r-content').innerHTML=h;
}

function toggleHotspot(fieldId){
  if(RS.pbqDone)return;
  if(RS.hotspotSels[fieldId]!==undefined){
    delete RS.hotspotSels[fieldId];
  } else {
    RS.hotspotSels[fieldId]=null;
  }
  rHotspotPBQ();
}

function selHotspotMethod(fieldId,methodId){
  if(RS.pbqDone)return;
  RS.hotspotSels[fieldId]=methodId;
  rHotspotPBQ();
}

function submitHotspotPBQ(){
  const s=RS;const pbq=s.data.pbq;
  const sensitiveFields=pbq.fields.filter(f=>f.requires_protection);
  const PPF=60/sensitiveFields.length;
  let sc=0;s.missedPBQ=[];
  pbq.fields.forEach(field=>{
    const sel=s.hotspotSels[field.id];
    const isFlagged=sel!==undefined;
    if(field.requires_protection){
      const methodOk=sel===field.method_answer;
      const pts=isFlagged?(methodOk?PPF:PPF*0.5):0;
      sc+=pts;
      if(!isFlagged||!methodOk){
        const corrMethod=pbq.method_options.find(x=>x.id===field.method_answer)?.name;
        const selMethod=isFlagged?pbq.method_options.find(x=>x.id===sel)?.name:'Not flagged';
        s.missedPBQ.push({
          id:field.id,label:field.label,
          yourCat:isFlagged?'Flagged':'Not flagged',correctCat:'Requires protection',
          yourType:selMethod,correctType:corrMethod,
          explanation:field.method_explanation||field.explanation,
        });
      }
    }
  });
  s.pbqScore=Math.round(sc);s.pbqDone=true;
  document.getElementById('r-pbq').textContent=Math.round(sc)+'/60';
  document.getElementById('r-pbq').style.color=sc>=42?'var(--green)':'var(--amber)';
  rHotspotPBQ();window.scrollTo(0,0);
}

// ── MATCH2 PBQ (architecture model + security implication per scenario) ───────
function rMatch2PBQ(){
  const s=RS;const pbq=s.data.pbq;const c=s.color;
  const PPS=60/pbq.scenarios.length;
  const totalSels=pbq.scenarios.reduce((acc,sc)=>{

  const totalNeeded=pbq.scenarios.length*2;

  let h=phaseBar('pbq',c);
  h+=`<div class="meta-pills">
    <span class="mpill" style="background:color-mix(in srgb,${c} 14%,transparent);color:${c};border-color:color-mix(in srgb,${c} 28%,transparent)">ARCHITECTURE ANALYSIS</span>
    <span class="mpill" style="background:rgba(220,38,38,0.14);color:var(--d2);border-color:rgba(220,38,38,0.28)">${pbq.scenarios.length} SCENARIOS</span>
    <span class="mpill" style="background:rgba(217,119,6,0.14);color:var(--amber);border-color:rgba(217,119,6,0.28)">HARD</span>
  </div>
  <div class="meta-note">${pbq.scenarios.length} scenarios · model + implication per scenario · ${Math.round(PPS)} pts each · 60 pts total</div>`;

  h+=`<div class="scenario-box">
    <div class="sc-hdr"><span class="sc-tag" style="color:${c}">◉ SCENARIO</span><span class="sc-cia">${pbq.cia_tag}</span></div>
    <div class="sc-txt">${pbq.scenario}</div>
  </div><div class="instr">${pbq.instruction}</div>`;

  pbq.scenarios.forEach((sc,si)=>{
    const sel=s.match2Sels[sc.id]||{};
    const sub=s.pbqDone;
    const modOk=sub&&sel.model===sc.model_answer;
    const impOk=sub&&sel.implication===sc.implication_answer;
    const bothOk=modOk&&impOk;
    const score=sub?Math.round((((modOk?1:0)+(impOk?1:0))/2)*PPS):null;

    let cardBorder,cardBg;
    if(sub&&bothOk){cardBorder='rgba(34,197,94,0.5)';cardBg='rgba(34,197,94,0.04)';}
    else if(sub&&!modOk&&!impOk){cardBorder='rgba(239,68,68,0.5)';cardBg='rgba(239,68,68,0.04)';}
    else if(sub){cardBorder='rgba(245,158,11,0.5)';cardBg='rgba(245,158,11,0.04)';}
    else if(sel.model||sel.implication){cardBorder=`color-mix(in srgb,${c} 45%,transparent)`;cardBg=`color-mix(in srgb,${c} 3%,transparent)`;}
    else{cardBorder='rgba(255,255,255,0.1)';cardBg='rgba(255,255,255,0.02)';}

    h+=`<div style="border-radius:14px;padding:16px;border:2px solid ${cardBorder};background:${cardBg};margin-bottom:16px">`;

    // Scenario header
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;flex-wrap:wrap">
      <div style="font-family:var(--mono);font-size:10px;font-weight:700;color:${c};letter-spacing:.05em">SCENARIO ${si+1} — ${sc.label}</div>
      ${sub?`<div style="font-family:var(--mono);font-size:12px;font-weight:700;color:${bothOk?'var(--green)':score>0?'var(--amber)':'var(--red)'}">${score}/${Math.round(PPS)}pts</div>`:''}
    </div>`;

    // Description
    h+=`<div style="font-size:13px;color:#CBD5E1;line-height:1.7;padding:12px 14px;background:rgba(0,0,0,0.35);border-radius:10px;border-left:3px solid ${cardBorder};margin-bottom:14px">${sc.description}</div>`;

    // Model selector
    const modSel=sel.model;const modCorrect=sc.model_answer;
    h+=`<div style="margin-bottom:12px">
      <div style="font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--d3);margin-bottom:7px">
        ARCHITECTURE MODEL ${sub?(modOk?'✓':'✗'):''}
        ${sub&&!modOk?`<span style="color:var(--muted);font-weight:400"> — correct: ${pbq.model_options.find(x=>x.id===modCorrect)?.name}</span>`:''}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">`;
    pbq.model_options.forEach(opt=>{
      const isSel=modSel===opt.id;
      const isCorrectOpt=sub&&opt.id===modCorrect;
      const isWrongSel=sub&&isSel&&!isCorrectOpt;
      let bg,border,color;
      if(isCorrectOpt){bg='rgba(34,197,94,0.18)';border='var(--green)';color='var(--green)';}
      else if(isWrongSel){bg='rgba(239,68,68,0.18)';border='var(--red)';color='var(--red)';}
      else if(isSel){bg='rgba(14,165,233,0.18)';border='var(--d3)';color='#fff';}
      else{bg='transparent';border='rgba(255,255,255,0.12)';color='#475569';}
      h+=`<button onclick="selMatch2('${sc.id}','model','${opt.id}')" ${sub?'disabled':''}
        style="padding:7px 13px;border-radius:8px;font-family:var(--mono);font-size:11px;font-weight:600;
        background:${bg};border:1.5px solid ${border};color:${color};cursor:${sub?'default':'pointer'};transition:all .12s">${opt.name}</button>`;
    });
    h+=`</div>`;
    if(sub)h+=`<div class="expl" style="border-color:${modOk?'var(--green)':'var(--red)'};margin-top:8px;font-size:12px">${sc.model_explanation}</div>`;
    h+=`</div>`;

    // Implication selector
    const impSel=sel.implication;const impCorrect=sc.implication_answer;
    h+=`<div>
      <div style="font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--amber);margin-bottom:7px">

        ${sub&&!impOk?`<span style="color:var(--muted);font-weight:400"> — correct: ${pbq.implication_options.find(x=>x.id===impCorrect)?.name}</span>`:''}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">`;
    pbq.implication_options.forEach(opt=>{
      const isSel=impSel===opt.id;
      const isCorrectOpt=sub&&opt.id===impCorrect;
      const isWrongSel=sub&&isSel&&!isCorrectOpt;
      let bg,border,color;
      if(isCorrectOpt){bg='rgba(34,197,94,0.18)';border='var(--green)';color='var(--green)';}
      else if(isWrongSel){bg='rgba(239,68,68,0.18)';border='var(--red)';color='var(--red)';}
      else if(isSel){bg='rgba(217,119,6,0.18)';border='var(--amber)';color='#fff';}
      else{bg='transparent';border='rgba(255,255,255,0.12)';color='#475569';}
      h+=`<button onclick="selMatch2('${sc.id}','implication','${opt.id}')" ${sub?'disabled':''}
        style="padding:7px 13px;border-radius:8px;font-family:var(--mono);font-size:11px;font-weight:600;
        background:${bg};border:1.5px solid ${border};color:${color};cursor:${sub?'default':'pointer'};transition:all .12s">${opt.name}</button>`;
    });
    h+=`</div>`;
    if(sub)h+=`<div class="expl" style="border-color:${impOk?'var(--green)':'var(--red)'};margin-top:8px;font-size:12px">${sc.implication_explanation}</div>`;
    h+=`</div></div>`;
  });

  if(!s.pbqDone){
    h+=`<button class="sbtn" ${allSet?'':'disabled'}
      style="background:${allSet?`linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c})`:''}; color:${allSet?'#fff':''}"
      onclick="submitMatch2PBQ()">
      ${allSet?'SUBMIT ANALYSIS':`COMPLETE ALL SCENARIOS TO SUBMIT (${totalSels}/${totalNeeded})`}</button>`;
  } else {
    h+=`<button class="sbtn" onclick="gotoMCQ()" style="background:linear-gradient(135deg,color-mix(in srgb,${c} 90%,#000),${c});color:#fff">CONTINUE TO MCQ (${Math.round(s.pbqScore)}/60) →</button>`;
  }
  document.getElementById('r-content').innerHTML=h;
}

function selMatch2(scId,axis,optId){
  if(RS.pbqDone)return;
  if(!RS.match2Sels[scId])RS.match2Sels[scId]={};
  RS.match2Sels[scId][axis]=optId;
  rMatch2PBQ();
}

function submitMatch2PBQ(){
  const s=RS;const pbq=s.data.pbq;
  const PPS=60/pbq.scenarios.length;
  let sc=0;s.missedPBQ=[];
  pbq.scenarios.forEach(scenario=>{
    const sel=s.match2Sels[scenario.id]||{};
    const modOk=sel.model===scenario.model_answer;
    const impOk=sel.implication===scenario.implication_answer;
    const pts=Math.round((((modOk?1:0)+(impOk?1:0))/2)*PPS);
    sc+=pts;
    if(!modOk||!impOk){
      s.missedPBQ.push({
        id:scenario.id,label:scenario.label,
        yourCat:pbq.model_options.find(x=>x.id===sel.model)?.name||'—',
        correctCat:pbq.model_options.find(x=>x.id===scenario.model_answer)?.name,
        yourType:pbq.implication_options.find(x=>x.id===sel.implication)?.name||'—',
        correctType:pbq.implication_options.find(x=>x.id===scenario.implication_answer)?.name,
        explanation:(!modOk?scenario.model_explanation:'')+(!modOk&&!impOk?' | ':'')+(!impOk?scenario.implication_explanation:''),
      });
    }
  });
  s.pbqScore=sc;s.pbqDone=true;
  document.getElementById('r-pbq').textContent=Math.round(sc)+'/60';
  document.getElementById('r-pbq').style.color=sc>=42?'var(--green)':'var(--amber)';
  rMatch2PBQ();window.scrollTo(0,0);
}
