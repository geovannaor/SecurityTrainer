<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Security+ SY0-701</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
:root {
  --bg:#060a12;--surface:#0d1420;--border:rgba(255,255,255,0.08);
  --d1:#7C3AED;--d2:#DC2626;--d3:#0284C7;--d4:#D97706;--d5:#059669;
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;--text:#e2e8f0;--muted:#64748b;
  --mono:'Share Tech Mono',monospace;--sans:'Rajdhani',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overscroll-behavior:none}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px)}
.view{display:none;min-height:100vh;flex-direction:column}
.view.active{display:flex}
.hdr{position:sticky;top:0;z-index:100;background:rgba(6,10,18,0.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.hdr-left .sub{font-family:var(--mono);font-size:11px;color:var(--muted)}
.hdr-left .title{font-size:18px;font-weight:700;line-height:1.2}
.hdr-back{background:none;border:1px solid var(--border);color:var(--muted);padding:7px 13px;border-radius:8px;cursor:pointer;font-family:var(--mono);font-size:11px;min-height:36px}
.hdr-stats{display:flex;gap:14px}
.stat .lbl{font-family:var(--mono);font-size:11px;color:#374151}
.stat .val{font-family:var(--mono);font-size:15px;font-weight:700}
.content{flex:1;max-width:680px;width:100%;margin:0 auto;padding:18px 13px 70px}
/* REALM MAP */
.hero{text-align:center;padding:24px 0 20px}
.hero h1{font-size:22px;font-weight:700;margin-bottom:4px}
.hero p{color:var(--muted);font-size:15px;margin-bottom:18px}
.xp-wrap{max-width:240px;margin:0 auto}
.xp-track{height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.xp-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--d1),var(--d3));transition:width .6s ease}
.xp-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:5px}
.realm-list{display:flex;flex-direction:column;gap:10px}
.realm-card{border-radius:14px;overflow:hidden;border:1.5px solid rgba(255,255,255,0.06);background:var(--surface);cursor:pointer;transition:transform .15s}
.realm-card:active{transform:scale(0.98)}
.realm-card.locked{opacity:.4;cursor:not-allowed}
.realm-top{padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
.realm-card-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.realm-icon{font-size:28px;flex-shrink:0}
.realm-w{font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.realm-n{font-size:15px;font-weight:700;line-height:1.3}
.realm-ct .num{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1;text-align:right}
.realm-ct .lbl{font-family:var(--mono);font-size:9px;color:var(--muted);text-align:right}
.realm-bot{padding:7px 16px 12px;display:flex;gap:6px;flex-wrap:wrap}
.pip{padding:3px 10px;border-radius:20px;font-family:var(--mono);font-size:10px;font-weight:700;border:1px solid}
/* LEVEL MAP */
.lvl-list{display:flex;flex-direction:column;gap:9px}
.lvl-card{padding:14px 15px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.07);background:var(--surface);display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .15s;min-height:72px}
.lvl-card:active{transform:scale(0.98)}
.lvl-card.locked{opacity:.4;cursor:not-allowed}
.lvl-left{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.lvl-num{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:700;border:1.5px solid}
.lvl-name{font-size:14px;font-weight:700;line-height:1.3;margin-bottom:4px}
.lvl-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.lvl-obj{font-family:var(--mono);font-size:10px;color:var(--muted)}
.type-tag{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.06em}
.missed-badge{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.lvl-right{flex-shrink:0;margin-left:10px;display:flex;align-items:center;gap:8px}
.lvl-mastery{font-family:var(--mono);font-size:18px;font-weight:700}
/* RUNNER */
.phase-bar{display:flex;gap:6px;margin-bottom:18px}
.ph-seg{flex:1}
.ph-track{height:4px;border-radius:2px;margin-bottom:4px;transition:background .3s}
.ph-lbl{font-family:var(--mono);font-size:10px;font-weight:700;text-align:center}
.scenario-box{background:rgba(0,0,0,0.4);border-radius:12px;padding:14px 15px;margin-bottom:14px}
.sc-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.sc-tag{font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.sc-cia{font-family:var(--mono);font-size:9px;color:var(--muted);font-style:italic}
.sc-txt{color:#CBD5E1;font-size:15px;line-height:1.72}
.instr{font-family:var(--mono);font-size:11px;color:var(--muted);font-style:italic;text-align:center;margin-bottom:14px}
.meta-pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:6px}
.mpill{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 9px;border-radius:4px;letter-spacing:.08em;border:1px solid}
.meta-note{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:14px}
.pbq-item{border-radius:12px;padding:13px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.02);margin-bottom:10px;transition:border-color .2s,background .2s}
.pbq-item.ok{border-color:var(--green);background:rgba(34,197,94,0.05)}
.pbq-item.bad{border-color:var(--red);background:rgba(239,68,68,0.05)}
.pbq-hdr{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px}
.pbq-num{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700}
.pbq-lbl{flex:1}
.pbq-lbl-t{font-size:15px;font-weight:600;line-height:1.4;margin-bottom:3px}
.pbq-lbl-d{font-family:var(--mono);font-size:11px;color:var(--muted)}
.pbq-ri{font-size:18px;flex-shrink:0}
.axis-sec{margin-bottom:10px}
.axis-lbl{font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.axis-fix{color:var(--red);font-size:10px;font-weight:600}
.axis-pills{display:flex;flex-wrap:wrap;gap:7px}
.apill{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;font-family:var(--sans);cursor:pointer;border:2px solid rgba(255,255,255,0.12);background:transparent;color:#64748b;transition:all .12s;min-height:38px}
.apill:disabled{cursor:default}
.apill.pc{border-color:var(--green)!important;background:rgba(34,197,94,0.15)!important;color:var(--green)!important}
.apill.pw{border-color:var(--red)!important;background:rgba(239,68,68,0.15)!important;color:var(--red)!important}
.expl{margin-top:10px;padding:10px 12px;border-radius:8px;background:rgba(0,0,0,0.3);font-size:12px;color:#94A3B8;line-height:1.65;border-left:3px solid}
.sbtn{width:100%;padding:15px;border-radius:10px;border:none;font-family:var(--mono);font-size:13px;font-weight:700;min-height:52px;cursor:pointer;transition:all .15s;letter-spacing:.05em;margin-top:4px}
.sbtn:active:not(:disabled){opacity:.8;transform:scale(.99)}
.sbtn:disabled{background:rgba(255,255,255,0.06)!important;color:#4B5563!important;cursor:not-allowed}
/* MCQ */
.mcq-prog{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.mcq-dots{display:flex;gap:5px}
.mcq-dot{width:8px;height:8px;border-radius:50%;transition:background .3s}
.qbox{background:rgba(0,0,0,0.4);border-radius:12px;padding:14px 15px;margin-bottom:14px;border-left:3px solid}
.qlbl{font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.qtxt{font-size:16px;font-weight:600;line-height:1.6}
.opts{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
.opt{padding:12px 14px;border-radius:10px;border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);cursor:pointer;display:flex;align-items:flex-start;gap:10px;font-size:15px;font-weight:600;line-height:1.45;min-height:48px;text-align:left;font-family:var(--sans);color:#94A3B8;width:100%;transition:all .15s}
.opt:disabled{cursor:default}
.opt.sel{border-color:var(--sel-c,var(--d1));background:rgba(124,58,237,0.12);color:#fff}
.opt.oc{border-color:var(--green)!important;background:rgba(34,197,94,0.12)!important;color:var(--green)!important}
.opt.ow{border-color:var(--red)!important;background:rgba(239,68,68,0.12)!important;color:var(--red)!important}
.opt-lt{flex-shrink:0;width:22px;height:22px;border-radius:50%;margin-top:1px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;background:rgba(255,255,255,0.07);color:#64748b;transition:all .15s}
.expbox{padding:12px 14px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);margin-bottom:14px}
.exp-t{color:#CBD5E1;font-size:13px;line-height:1.65;margin-bottom:10px}
.tip{padding:9px 12px;border-radius:8px;border-left:2px solid}
.tip-lbl{font-family:var(--mono);font-size:11px;font-weight:700}
.tip-txt{font-size:12px;color:#94A3B8}
/* RESULT */
.res-card{padding:26px 20px;border-radius:14px;text-align:center;border:2px solid;margin-bottom:14px}
.res-obj{font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px}
.res-score{font-family:var(--mono);font-size:64px;font-weight:700;line-height:1;margin-bottom:6px}
.res-sub{font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:18px}
.res-badge{display:inline-block;padding:7px 20px;border-radius:20px;font-family:var(--mono);font-size:11px;font-weight:700;border:1px solid}
.bdown{padding:16px;border-radius:12px;background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.07);margin-bottom:14px}
.bdown-title{font-family:var(--mono);font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.sbar{margin-bottom:12px}
.sbar-hdr{display:flex;justify-content:space-between;margin-bottom:5px}
.sbar-lbl{font-size:12px;color:#94A3B8;font-weight:600}
.sbar-val{font-family:var(--mono);font-size:12px;font-weight:700}
.sbar-track{height:6px;border-radius:3px;background:rgba(255,255,255,0.08);overflow:hidden}
.sbar-fill{height:100%;border-radius:3px;transition:width .7s ease}
.divider{height:1px;background:rgba(255,255,255,0.06);margin:14px 0}
/* MISSED */
.missed-sum{padding:12px 14px;border-radius:10px;margin-bottom:14px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.missed-sum-l{display:flex;align-items:center;gap:10px}
.missed-circle{width:36px;height:36px;border-radius:50%;background:rgba(239,68,68,0.2);border:1.5px solid rgba(239,68,68,0.4);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:14px;font-weight:700;color:var(--red);flex-shrink:0}
.missed-ttl{font-size:15px;font-weight:600;color:#CBD5E1}
.missed-s{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
.missed-ico{font-family:var(--mono);font-size:12px;color:var(--red);transition:transform .2s}
.missed-ico.open{transform:rotate(180deg)}
.missed-panel{display:none;margin-bottom:14px}
.missed-panel.open{display:block}
.m-sec-title{font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--red);margin-bottom:10px;padding:0 2px}
.m-item{padding:12px 13px;border-radius:10px;margin-bottom:8px;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2)}
.m-item-lbl{font-size:13px;font-weight:600;color:#E2E8F0;margin-bottom:8px;line-height:1.4}
.m-axes{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.m-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;font-family:var(--mono);font-size:11px}
.m-axis-name{color:var(--muted);width:70px;flex-shrink:0}
.m-yours{color:var(--red)}
.m-arr{color:var(--muted)}
.m-correct{color:var(--green)}
.m-exp{font-size:12px;color:#94A3B8;line-height:1.6;border-top:1px solid rgba(255,255,255,0.06);padding-top:8px}
.m-mcq-item{padding:12px 13px;border-radius:10px;margin-bottom:8px;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2)}
.m-mcq-q{font-size:15px;font-weight:600;color:#E2E8F0;margin-bottom:8px;line-height:1.4}
.m-mcq-ans{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;font-family:var(--mono);font-size:11px}
.m-mcq-tip{font-size:12px;color:#94A3B8;line-height:1.6;border-top:1px solid rgba(255,255,255,0.06);padding-top:8px}
.focus-hint{padding:12px 14px;border-radius:10px;margin-bottom:14px;background:rgba(217,119,6,0.08);border:1px solid rgba(217,119,6,0.25);font-size:15px;color:#CBD5E1;line-height:1.65}
.res-btns{display:flex;gap:10px}
.btn-sec{flex:1;padding:14px;border-radius:10px;font-family:var(--mono);font-size:12px;font-weight:700;border:1.5px solid;background:transparent;cursor:pointer;min-height:52px;letter-spacing:.04em}
.btn-pri{flex:1;padding:14px;border-radius:10px;font-family:var(--mono);font-size:12px;font-weight:700;border:none;cursor:pointer;min-height:52px;letter-spacing:.04em;color:#fff}
.btn-sec:active,.btn-pri:active{opacity:.8}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.ai{animation:fadeIn .25s ease both}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
</style>
</head>
<body>

<!-- REALM MAP -->

<div id="v-realm" class="view active">
  <div class="hdr">
    <div class="hdr-left"><div class="sub">SY0-701 TRAINER</div><div class="title">Security+</div></div>
    <div class="hdr-stats">
      <div class="stat"><div class="lbl">TOTAL XP</div><div class="val" id="h-xp" style="color:var(--d1)">0</div></div>
      <div class="stat"><div class="lbl">DONE</div><div class="val" id="h-done" style="color:var(--muted)">0/1</div></div>
    </div>
  </div>
  <div class="content">
    <div class="hero">
      <div style="font-size:46px;margin-bottom:10px">🛡️</div>
      <h1>Security+ Trainer</h1>
      <p>SY0-701 · PBQ + MCQ · Realm by Realm</p>
      <div class="xp-wrap">
        <div class="xp-track"><div class="xp-fill" id="g-xp-bar" style="width:2%"></div></div>
        <div class="xp-lbl" id="g-xp-lbl">0 / 100 XP</div>
      </div>
    </div>
    <div class="realm-list" id="realm-list"></div>
  </div>
</div>

<!-- LEVEL MAP -->

<div id="v-level" class="view">
  <div class="hdr">
    <button class="hdr-back" onclick="showRealm()">← REALMS</button>
    <div style="text-align:center">
      <div class="sub" id="lm-sub" style="color:var(--d1)"></div>
      <div class="title" id="lm-title"></div>
    </div>
    <div class="stat"><div class="lbl">DONE</div><div class="val" id="lm-done" style="color:var(--muted)">0/1</div></div>
  </div>
  <div class="content"><div class="lvl-list" id="level-list"></div></div>
</div>

<!-- RUNNER -->

<div id="v-runner" class="view">
  <div class="hdr">
    <button class="hdr-back" id="r-back">← LEVELS</button>
    <div style="text-align:center">
      <div class="sub" id="r-obj"></div>
      <div class="title" id="r-name"></div>
    </div>
    <div class="hdr-stats">
      <div class="stat"><div class="lbl">PBQ</div><div class="val" id="r-pbq" style="color:var(--muted)">60</div></div>
      <div class="stat"><div class="lbl">MCQ</div><div class="val" id="r-mcq" style="color:var(--muted)">40</div></div>
    </div>
  </div>
  <div class="content" id="r-content"></div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const REALMS=[
  {id:"d1",num:"1.0",name:"General Security Concepts",weight:12,icon:"🔐",color:"var(--d1)",
   levels:[{id:"d1l1",obj:"1.1",name:"Security Controls",type:"dual_classify",xp:100},{id:"d1l2",obj:"1.2",name:"Zero Trust Architecture",type:"classify",xp:100},{id:"d1l3",obj:"1.3",name:"Change Management",type:"triage",xp:100},{id:"d1l4",obj:"1.4",name:"Cryptographic Solutions",type:"match",xp:100},{id:"d1l5",obj:"1.0",name:"Realm 1 Review",type:"review",xp:150}]},
  {id:"d2",num:"2.0",name:"Threats, Vulnerabilities & Mitigations",weight:22,icon:"⚠️",color:"var(--d2)",levels:[{id:"d2l1",obj:"2.1",name:"Threat Actors & Motivations",type:"dual_classify",xp:100},{id:"d2l2",obj:"2.2",name:"Threat Vectors & Attack Surfaces",type:"scenario_builder",xp:100},{id:"d2l3",obj:"2.3",name:"Vulnerability Types",type:"classify",xp:100},{id:"d2l4",obj:"2.4",name:"Indicators of Malicious Activity",type:"soc_triage",xp:100},{id:"d2l5",obj:"2.5",name:"Mitigation Techniques",type:"match",xp:100},{id:"d2l6",obj:"2.0",name:"Realm 2 Review",type:"review",xp:150}]},
  {id:"d3",num:"3.0",name:"Security Architecture",weight:18,icon:"🏗️",color:"var(--d3)",levels:[{id:"d3l1",obj:"3.1",name:"Architecture Models & Implications",type:"match2",xp:125},{id:"d3l2",obj:"3.2",name:"Secure Enterprise Infrastructure",type:"match2",xp:125},{id:"d3l3",obj:"3.3",name:"Data Protection Concepts",type:"hotspot",xp:125},{id:"d3l4",obj:"3.4",name:"Resilience & Recovery Architecture",type:"sequence",xp:125},{id:"d3l5",obj:"3.0",name:"Realm 3 Review",type:"review",xp:175}]},
  {id:"d4",num:"4.0",name:"Security Operations",weight:28,icon:"⚙️",color:"var(--d4)",levels:[{id:"d4l1",obj:"4.1",name:"Security Techniques & Hardening",type:"yesno",xp:125},{id:"d4l2",obj:"4.2",name:"Asset Management Lifecycle",type:"fillagap",xp:100},{id:"d4l3",obj:"4.3",name:"Vulnerability Management",type:"match",xp:125},{id:"d4l4",obj:"4.4",name:"Security Alerting & Monitoring",type:"alert_triage",xp:125},{id:"d4l5",obj:"4.5",name:"Enterprise Security Enhancement",type:"config_table",xp:150},{id:"d4l6",obj:"4.6",name:"Identity & Access Management",type:"classify",xp:150},{id:"d4l7",obj:"4.7",name:"Automation & Orchestration",type:"automation_risk",xp:150},{id:"d4l8",obj:"4.8",name:"Incident Response",type:"sequence",xp:150},{id:"d4l9",obj:"4.9",name:"Investigation Data Sources",type:"match",xp:150},{id:"d4l10",obj:"4.0",name:"Realm 4 Review",type:"review",xp:200}]},
  {id:"d5",num:"5.0",name:"Security Program Management",weight:20,icon:"📋",color:"var(--d5)",levels:[]},
];
const ALL_LEVELS=REALMS.flatMap(r=>r.levels);
const TOTAL_XP=ALL_LEVELS.reduce((s,l)=>s+l.xp,0)||100;

const D1L1={
  pbq:{
    cia_tag:"⚑ C · I · A",
    scenario:"Following an independent security assessment, a mid-sized enterprise must formally document its control posture before submitting a remediation plan to the board. Each control must be classified across two independent axes. Axis 1: Category — how the control is implemented. Axis 2: Type — what the control does when activated. Both axes must be correct to receive credit.",

        {id:"a", label:"Source 1 — the firewall DENY records show that most exfiltration attempts were blocked, confirming the firewall was working correctly. The successful transfer in Source 2 is expected behavior for port 443 traffic"},
        {id:"b", label:"Source 3 — the IDS/IPS alert on the C2 beaconing explains the exfiltration because IDS alerts automatically block matching traffic. If the transfer succeeded, the IDS signature was not yet deployed when the transfer occurred"},
        {id:"c", label:"Source 2 — the firewall log showing the permitted 443 connection explains the gap: the firewall's allow rule for outbound HTTPS created a policy blind spot that the attacker exploited. The firewall blocked obvious C2 ports but permitted the exfiltration channel because port 443 is trusted outbound traffic. Firewall logs show both what was blocked AND what was permitted — both are investigative evidence"},
        {id:"d", label:"Source 4 — process creation records are the most reliable evidence because endpoint logs record attacker actions directly on the compromised host, making them more authoritative than network-layer logs for explaining why the exfiltration succeeded"},
      ],
      correct:"c",
      explanation:"Firewall logs record both DENY and PERMIT decisions — both are investigative evidence. The DENY records show the attacker's blocked attempts; the PERMIT record on port 443 reveals the policy gap that enabled exfiltration. Attackers routinely use trusted ports (443, 80, 53) to blend into permitted traffic. The firewall log is the source that explains the gap: it explicitly shows the permitted connection that carried the exfiltration. Understanding what firewall logs allow — not just what they block — is the exam-relevant concept here.",
      exam_tip:"Firewall logs = allow/deny decisions based on rules, source/dest IP, port, protocol, direction, rule name. They record BOTH permitted and denied traffic — investigators look at permitted connections, not just denials. Attackers exploit firewall policy gaps by using trusted ports. Firewall logs cannot see application-layer content — they see the connection, not the payload.",
    },
    {
      id:"q2",
      q:"A web application hosted internally begins generating errors. The security team suspects the application is being abused. An analyst pulls application logs and finds: repeated failed login attempts against admin accounts from a single session, SQL syntax appearing in form submission fields, a service account querying database tables it has never accessed before, and error messages revealing internal database schema details in the HTTP response body. Which option BEST explains what application logs uniquely provide that other log sources cannot?",
      options:[
        {id:"a", label:"Application logs provide network flow data showing which IP addresses connected to the application — this information is unique to application logs because firewall and network logs do not capture inbound web traffic"},
        {id:"b", label:"Application logs record user actions, input content, session context, authentication events, and application errors within the application layer — they capture the actual SQL payload in a form field, the session ID tied to the attack, the service account's query behavior, and the error message content. This application-layer context is invisible to firewall, network, and IDS logs, which see the connection but cannot see inside the HTTP request or application response"},
        {id:"c", label:"Application logs provide the same data as OS security logs but formatted differently — both record authentication failures, user actions, and error conditions. The distinction between application logs and OS security logs is the output format, not the data captured"},
        {id:"d", label:"Application logs are only useful for identifying network-layer attacks like DDoS — for application-layer attacks like SQL injection, the IDS/IPS log is the authoritative source because it has signatures specifically designed to detect SQL injection patterns in web traffic"},
      ],
      correct:"b",
      explanation:"Application logs are generated by the application itself and capture the application-layer context that network-layer logs cannot see: the actual content of user input (SQL payload in a form field), session identifiers, authentication outcomes within the application, specific database queries made by user accounts, and error message content returned to users. A firewall sees a TCP connection on port 443; an IDS may fire a SQL injection signature; but only the application log shows the exact SQL string submitted, the session it belongs to, the account that submitted it, and the error response the application generated.",
      exam_tip:"Application logs = application-layer evidence: user input content, session IDs, authentication events within the app, query behavior, error messages. They capture what the application processed — not just that a connection occurred. The trap: IDS logs can detect SQL injection signatures in traffic, but application logs show the actual payload, session context, and application response that IDS cannot see.",
    },
    {
      id:"q3",
      q:"An analyst is investigating a compromised host. She has access to two log sources from the same system at the same timestamp. Log Source A shows: EventID 4624 (successful logon), Account: DOMAIN\\svc_backup, Logon Type: 3 (network), Source IP: 10.0.5.22, and EventID 4672 (special privileges assigned to new logon) indicating the account logged on with SeDebugPrivilege and SeImpersonatePrivilege. Log Source B shows: Process svchøst.exe (PID 4821) injected code into lsass.exe, behavior classified as credential dumping (T1003.001), parent process: cmd.exe, verdict: MALICIOUS, EDR action: process terminated. Which option CORRECTLY identifies both log sources and explains the investigative value each provides?",
      options:[
        {id:"a", label:"Log Source A: OS security log — Windows Security Event Log records authentication events (EventID 4624), logon types, source IPs, and privilege assignments (EventID 4672). These are OS-level identity and access events. Log Source B: endpoint log — EDR telemetry records process behavior, code injection, behavioral classification with MITRE ATT&CK technique mapping, and automated response actions. OS logs record what identity events occurred; EDR logs record what the process did behaviorally"},
        {id:"b", label:"Log Source A: endpoint log — EDR tools record logon events and privilege assignments as part of behavioral monitoring. Log Source B: OS security log — process injection events are recorded by Windows Security Event Log when process auditing is enabled. The distinction is that endpoint logs record identity events while OS logs record process behavior"},
        {id:"c", label:"Both are OS security logs — EventIDs and process injection events are both recorded by the Windows Security Event Log when the appropriate audit policies are enabled. EDR is simply a vendor-specific interface for viewing Windows Security Event Log data"},
        {id:"d", label:"Log Source A: network log — logon type 3 indicates a network-sourced event, making it a network log entry rather than an OS security log. Log Source B: endpoint log — correctly identified"},
      ],
      correct:"a",
      explanation:"OS security logs (Windows Security Event Log) record identity and access events: authentication successes and failures (EventID 4624/4625), logon types, source IPs for network logons, and privilege assignments (EventID 4672). These are OS-level events generated by the operating system's audit subsystem. Endpoint logs (EDR telemetry) record behavioral events: process creation, code injection, behavioral classification, MITRE ATT&CK technique mapping, and automated response actions. EDR adds behavioral analysis and threat intelligence context that the OS log does not provide. The key distinction: OS logs record identity events (who logged on, with what privileges); EDR logs record behavioral events (what the process did after it ran).",
      exam_tip:"OS security logs = EventIDs, authentication (4624/4625), privilege assignment (4672), account changes (4720/4740), logon type, source IP. Generated by OS audit subsystem. Endpoint/EDR logs = process behavior, code injection, MITRE ATT&CK technique mapping, behavioral verdicts, automated response. The trap: process creation (EventID 4688) appears in OS security logs when auditing is enabled — but behavioral classification and MITRE mapping only come from EDR. OS logs = who/what identity event; EDR = what the process did.",
    },
    {
      id:"q4",
      q:"A network engineer reviews IDS/IPS logs during an investigation and finds three alert entries: Alert 1 — Rule: 'ET SCAN Nmap SYN Scan Detected', SID: 2000537, Severity: LOW, SRC: 10.0.5.22, multiple destination ports, 847 packets in 3 seconds. Alert 2 — Rule: 'ET MALWARE CobaltStrike Beacon HTTP', SID: 2024897, Severity: HIGH, SRC: 10.0.1.15, DST: 198.51.100.47, Port: 443. Alert 3 — Rule: 'ET POLICY Executable File Transfer', SID: 2021997, Severity: MEDIUM, SRC: 198.51.100.47, DST: 10.0.1.15, content match: 'MZ' header. Which option CORRECTLY interprets all three alerts and explains the IDS/IPS log's investigative value?",
      options:[
        {id:"a", label:"Alert 1: a confirmed Nmap scan — IDS alerts are definitive proof of attacker activity and do not produce false positives. Alert 2: confirmed C2 communication — the HIGH severity means the connection was automatically blocked by the IPS. Alert 3: confirmed malware download — the MZ header match means an executable was successfully transferred to the internal host"},
        {id:"b", label:"All three alerts are false positives — IDS/IPS systems generate excessive noise and the signatures listed (Nmap, CobaltStrike, MZ header) are commonly triggered by legitimate traffic. IDS logs should only be used as a starting point and are not reliable investigative evidence"},
        {id:"c", label:"Alert 1: firewall scan block — high packet rates are filtered by the firewall before reaching the IDS. Alert 2: application log entry — C2 beaconing is detected at the application layer, not the network layer. Alert 3: endpoint log entry — executable file transfers are only detectable by endpoint agents, not network-based IDS systems"},
        {id:"d", label:"Alert 1: detected reconnaissance activity — a high packet rate to multiple ports matching a known scan signature, originating from an internal host. Alert 2: detected potential C2 beaconing — a HIGH severity signature match for CobaltStrike HTTP beacon behavior on an outbound 443 connection. Alert 3: detected a potential executable file transfer inbound — the MZ (PE executable) magic byte header was detected in the traffic stream. IDS logs identify suspicious patterns through signature matching — they provide detection leads, not confirmed proof, and must be correlated with other sources"},
      ],
      correct:"d",
      explanation:"IDS/IPS logs record signature-based detections — they fire alerts when network traffic matches known attack patterns (rule name, SID, severity, matched traffic metadata). Alert 1 shows internal reconnaissance behavior. Alert 2 shows outbound C2 beacon behavior on a trusted port. Alert 3 shows an inbound executable transfer — the MZ magic bytes ('MZ' = Windows PE header) in the traffic stream. IDS alerts are detection leads, not confirmed proof — a signature match indicates suspicious behavior that requires correlation with endpoint, firewall, and application logs to confirm. An IDS alert alone does not prove an attack occurred, and IPS blocking does not guarantee the threat was stopped.",
      exam_tip:"IDS/IPS logs = signature-based detections, rule name, SID, severity, matched traffic. IDS = detect and alert. IPS = detect, alert, and block. SID = signature identifier. Severity = rule-defined risk level. IDS logs provide detection leads — correlation with other sources is required to confirm. The trap: IDS alerts are not proof of a successful attack. MZ header = Windows PE executable magic bytes, a common detection indicator for executable file transfers.",
    },
    {
      id:"q5",
      q:"An analyst investigating a suspected insider threat reviews two data sources. Source 1 shows connection records for the past 30 days: internal host 10.0.8.14 made 847 outbound connections to the same external IP, each exactly 4 minutes apart, transferring between 1.2KB and 1.8KB per session, all on port 443 during business hours. Source 2 shows file attribute records for a compressed archive on the same host: filename 'q3_financial_backup.zip', size 4.2GB, created 2024-11-01 02:14:33, last modified 2024-11-01 02:14:33, owner: jsmith, hidden attribute: TRUE, author metadata: 'automated_export_v2'. Which option CORRECTLY identifies both sources and explains the investigative significance of each?",
      options:[
        {id:"a", label:"Source 1: packet capture — connection timing and payload size data can only be obtained from full packet captures. Source 2: application log — file creation events with owner and author data are recorded by application audit logs, not file system metadata"},
        {id:"b", label:"Source 1: firewall log — outbound connection records with IP, port, and timing data are firewall log entries. Source 2: metadata — file attributes including timestamps, owner, size, and author are metadata. The beaconing pattern in Source 1 is detectable from firewall permit records, and the hidden attribute and identical creation/modification timestamps in Source 2 indicate programmatic file creation"},
        {id:"c", label:"Source 1: network log — traffic flow records showing connection frequency, timing regularity, data volume per session, and destination IP are network log (NetFlow/traffic flow) data. Source 2: metadata — file system and document metadata records timestamps, owner, file size, hidden attributes, and embedded document properties like author. The regular 4-minute interval with consistent small payload is a beaconing pattern; the hidden 4.2GB file with identical create/modify timestamps and automated author field indicates programmatic creation consistent with staged exfiltration"},
        {id:"d", label:"Source 1: IDS/IPS log — beaconing detection requires signature matching, which only IDS/IPS systems perform. Source 2: OS security log — file ownership and hidden attributes are recorded by the Windows Security Event Log file system auditing subsystem"},
      ],
      correct:"c",
      explanation:"Network logs (NetFlow, traffic flow records) capture connection metadata: source/destination IP, port, protocol, bytes transferred, timestamps, and connection frequency — without full packet content. The regular 4-minute interval with consistent small payload size is a beaconing pattern — a C2 heartbeat that blends into permitted HTTPS traffic. Metadata captures file attributes: timestamps (created, modified, accessed), owner, size, hidden flag, and embedded document properties (author). The identical creation and modification timestamps indicate the file was programmatically created rather than manually assembled. The 'automated_export_v2' author field and hidden attribute are anomalies consistent with staged exfiltration preparation.",
      exam_tip:"Network logs = flow data, connection metadata, timing, bytes transferred, no packet content. NetFlow is the canonical network log format. Metadata = file attributes: timestamps, owner, size, hash, hidden flag, embedded properties (author, GPS, print history). Beaconing indicators: regular intervals, consistent small payload, same external IP. Metadata forensics: identical create/modify = programmatic creation, author field = embedded document property, hidden = concealment attempt.",
    },
    {
      id:"q6",
      q:"During an investigation, the IR team discovers an internet-facing web server was compromised. A junior analyst asks why the team is reviewing vulnerability scan results from three weeks before the incident rather than focusing entirely on log data from the day of the attack. The senior analyst explains the investigative value of pre-incident vulnerability scan data. Which option BEST captures that explanation?",
      options:[
        {id:"a", label:"Vulnerability scan results from before the incident establish the attack surface that existed at the time of compromise — they identify which CVEs were present and unpatched on the affected system, helping the IR team determine the likely initial access vector. If the scan shows an unpatched CVE with a known public exploit matching the attacker's observed behavior, the scan result corroborates the root cause hypothesis. Scans support investigation by mapping the pre-incident security posture to the observed attack chain"},
        {id:"b", label:"Pre-incident vulnerability scan results are not useful for active investigations — they reflect the system state weeks before the attack and cannot confirm which vulnerabilities were actually exploited. Only post-incident scans can identify what was compromised"},
        {id:"c", label:"Pre-incident vulnerability scans are reviewed because they contain embedded log data from the scan agent that records attacker reconnaissance activity — scan agents log inbound connection attempts, making them a secondary source of attack timeline data"},
        {id:"d", label:"Vulnerability scan results are only useful for compliance reporting — they confirm whether systems met patch requirements before the incident but provide no investigative value for identifying how a compromise occurred or which systems were affected"},
      ],
      correct:"a",
      explanation:"Vulnerability scan results support investigations by establishing the pre-incident attack surface — the set of vulnerabilities that existed on the target when it was compromised. If the scan identifies an unpatched CVE with a known exploit matching the observed attack technique, the scan result corroborates the root cause hypothesis and confirms the initial access vector. This is how IR teams move from 'the server was compromised' to 'the server was compromised via CVE-XXXX-YYYY, which was unpatched for three weeks.' Scans also identify other at-risk systems with the same vulnerability — enabling proactive containment before additional systems are compromised.",
      exam_tip:"Vulnerability scans in investigations: establish pre-incident attack surface, identify unpatched CVEs, corroborate root cause hypothesis, identify the likely initial access vector. Scans support RCA — they answer 'what was exploitable' which narrows down 'what was exploited.' Also used to identify other at-risk systems during active incidents. The trap: scans are not log sources — they are point-in-time snapshots of vulnerability state, not event records.",
    },
    {
      id:"q7",
      q:"A CISO asks the SOC team to explain how three data presentation tools are being used during an active investigation. The team describes: Tool A — a real-time visual interface showing current alert counts by severity, active incidents, SIEM rule hit rates, and mean time to detect over the past 24 hours, updated every 60 seconds. Tool B — a scheduled document generated every morning at 06:00 containing the previous day's top 10 alerts by volume, patch compliance percentage, endpoint agent coverage, and a list of systems that failed their last vulnerability scan. Tool C — a full binary capture of all packets traversing the network segment where the compromised host resides, collected starting 4 minutes after the initial IDS alert, used to reconstruct the exact HTTP request payload, extract transferred files, and confirm C2 communication patterns. Which option CORRECTLY identifies all three tools?",
      options:[
        {id:"a", label:"Tool A: automated report — scheduled updates at 60-second intervals make it an automated reporting system. Tool B: dashboard — morning delivery of summarized metrics is a dashboard view. Tool C: network log — full packet collection is a network logging function, distinct from packet capture which only captures headers"},
        {id:"b", label:"Tool A: dashboard — real-time visual interface with live metrics updated continuously, used for situational awareness during active investigations. Tool B: automated report — scheduled, recurring document with aggregated metrics delivered at a fixed time, used for trend analysis and compliance tracking. Tool C: packet capture (PCAP) — full binary capture of network packets enabling payload inspection, file extraction, and protocol reconstruction. Each serves a distinct investigative purpose: dashboards for real-time awareness, reports for historical trends, PCAP for deep packet analysis"},
        {id:"c", label:"Tool A: automated report — alert counts and SIEM metrics updated every 60 seconds are automated report outputs. Tool B: vulnerability scan — morning reports on patch compliance and failed vulnerability scans are scan outputs. Tool C: packet capture — correctly identified"},
        {id:"d", label:"All three are dashboards — real-time displays, scheduled summaries, and packet capture interfaces are all dashboard components within a unified SOC visibility platform"},
      ],
      correct:"b",
      explanation:"Dashboards provide real-time visual situational awareness — live metrics, current alert state, and trend indicators updated continuously. They answer 'what is happening right now.' Automated reports are scheduled, recurring documents with aggregated data over a time period — they answer 'what happened over the past day/week/month' and support trend analysis, compliance tracking, and management reporting. Packet captures (PCAP) are full binary recordings of network traffic — they enable payload inspection, protocol reconstruction, file carving, and C2 pattern confirmation that no other data source provides. PCAP is the only source that shows exactly what data traversed the wire.",
      exam_tip:"Dashboard = real-time, visual, live metrics, situational awareness. Automated report = scheduled, recurring, aggregated historical data, trend analysis. Packet capture (PCAP) = full binary packet recording, payload inspection, file extraction, protocol reconstruction. The distinction: dashboards show current state, reports show historical trends, PCAP shows exactly what was in the traffic. PCAP is the deepest investigative source — it can answer questions no log source can.",
    },
    {
      id:"q8",
      q:"An analyst captures network traffic on the segment where a compromised host resides and loads the PCAP file into Wireshark. She observes: 847 DNS TXT queries from the internal host to a single external domain over 4 hours, each query returning a base64-encoded string in the TXT record; HTTP GET requests to a CDN IP with a User-Agent string that matches a known CobaltStrike malleable C2 profile; a large outbound transfer to an external IP on port 443 where the TLS certificate was issued to a domain registered 3 days ago; and ICMP packets with payloads of 1,024 bytes, far larger than the standard 32-byte Windows ping payload. Which option BEST explains what the packet capture uniquely reveals that log sources alone could not confirm?",
      options:[
        {id:"a", label:"Packet captures are less useful than log sources for this investigation — the activities described (DNS queries, HTTP requests, large transfers, ICMP) would all be visible in firewall and network logs without the complexity of PCAP analysis"},
        {id:"b", label:"Packet captures are only useful for confirming IDS alerts — they provide the raw traffic that IDS signatures match against, making PCAP a validation tool for IDS detections rather than an independent investigative source"},
        {id:"c", label:"The activities observed are all false positives — DNS TXT queries, CDN traffic, port 443 transfers, and ICMP are all normal network behaviors that generate suspicious-looking patterns in packet captures without indicating actual compromise"},
        {id:"d", label:"Packet captures reveal the full content of network traffic — the actual DNS TXT query responses (base64-encoded C2 commands), the exact User-Agent string matching a C2 profile, the TLS certificate details of the suspicious domain, and the ICMP payload content. These payload-level details are invisible to firewall logs (which see port/IP), network flow logs (which see connection metadata), and IDS logs (which match signatures but may not capture full payload). PCAP is the only source that lets the analyst confirm what data was actually in the packets"},
      ],
      correct:"d",
      explanation:"Packet captures provide full packet content — headers and payload — which no other log source can match. Firewall logs see IP/port/rule. Network flow logs see connection metadata (bytes, timing, direction). IDS logs match signatures against traffic patterns. Only PCAP shows the actual content: the base64-encoded C2 commands in DNS TXT responses (DNS tunneling), the exact User-Agent string confirming a C2 framework profile, the TLS certificate chain details of the suspicious domain, and the oversized ICMP payload content (covert channel). PCAP is the authoritative source for payload-level confirmation — it turns suspicious patterns into confirmed evidence.",
      exam_tip:"PCAP = full packet content, headers + payload. Uniquely reveals: actual data transferred, exact protocol content, TLS certificate details, C2 command content, covert channel payloads. Other sources: firewall = allow/deny decisions; network log = flow metadata; IDS = signature matches. PCAP fills the gap none of the others can — it shows what was actually in the traffic. DNS tunneling indicator: high volume TXT queries + encoded responses. C2 beaconing: regular intervals + known User-Agent profile. Covert ICMP: oversized payload beyond standard ping size.",
    },
    {
      id:"q9",
      q:"A SOC analyst receives a report that a finance workstation (10.0.8.14) may have been used to exfiltrate customer PII. She needs to build a complete picture of the incident. She identifies five investigative questions: (A) Was any outbound connection from 10.0.8.14 blocked or permitted by the perimeter security policy? (B) Did 10.0.8.14 execute any suspicious processes or inject code into other processes? (C) Did any user on 10.0.8.14 authenticate with elevated privileges or were any accounts locked out? (D) Was there a known unpatched vulnerability on 10.0.8.14 that could have been exploited for initial access? (E) What was the exact payload content of the outbound connection — were files actually transferred and if so what were they? Which option CORRECTLY maps each investigative question to its best data source?",
      options:[
        {id:"a", label:"A: IDS/IPS log — signature alerts show blocked and permitted connections. B: OS security log — EventID 4688 records all process creation. C: endpoint log — EDR tracks authentication and account lockout behavior. D: automated report — scheduled patch compliance reports identify unpatched systems. E: network log — NetFlow records show payload content of outbound transfers"},
        {id:"b", label:"A: firewall log — records allow/deny decisions on outbound connections including rule name, source, destination, port, and protocol. B: endpoint log (EDR) — records process execution, code injection, behavioral detections, and MITRE technique mapping. C: OS security log — records authentication events (EventID 4624/4625), privilege assignments (EventID 4672), and account changes. D: vulnerability scan results — identify CVEs present on the system at the time of the incident. E: packet capture — provides full packet content including payload, enabling file extraction and confirmation of what data was transferred"},
        {id:"c", label:"A: network log — NetFlow records show all outbound connections regardless of policy decisions. B: application log — application-layer events include process launches triggered by user actions. C: OS security log — correctly identified. D: dashboard — real-time dashboards display current patch status for all endpoints. E: IDS/IPS log — IDS signatures detect file transfer patterns and confirm payload content"},
        {id:"d", label:"All five questions can be answered from a single unified SIEM platform — SIEM aggregates firewall, endpoint, OS, vulnerability, and packet capture data into a single queryable source, making individual log source identification unnecessary for investigation"},
      ],
      correct:"b",
      explanation:"Each investigative question maps to a specific data source based on what that source captures. Firewall logs answer policy questions — was traffic permitted or denied. EDR answers behavioral questions — what did the process do. OS security logs answer identity questions — who authenticated and with what privileges. Vulnerability scans answer attack surface questions — what was exploitable. Packet captures answer payload questions — what data was actually transferred. This multi-source correlation is the core competency the 4.9 objective tests: given an investigation scenario, identify which data source answers which question.",
      exam_tip:"Multi-source correlation map: Firewall = policy (permit/deny). EDR/endpoint = process behavior. OS security log = identity events (auth, privilege, accounts). Vulnerability scan = attack surface, CVEs, initial access vector. PCAP = payload content, file transfer confirmation. No single source answers all questions — investigations require correlating across sources. The exam tests whether you can match the investigative question to the correct source.",
    },
  ],
};


const D4L10={
  pbq:null,
  mcqs:[
    {
      id:"q1",
      q:"A security team is implementing a baseline configuration program for 400 servers. They begin by documenting the required security settings for each server role — OS hardening, service disablement, patch levels, and firewall rules — and recording them in a configuration management database. They then push these configurations to all 400 servers using an automated deployment tool. Six months later, a compliance scan reveals that 23 servers have drifted from the approved baseline due to unauthorized local changes. The team remediates the drift and implements continuous configuration monitoring. Which option CORRECTLY maps each activity to its baseline lifecycle phase?",
      options:[
        {id:"a", label:"Documentation phase: deploy — pushing settings to the CMDB deploys the baseline. Automated push: maintain — continuous deployment tools maintain consistency. Drift remediation: establish — finding and correcting drift re-establishes the baseline from scratch each time"},
        {id:"b", label:"Documentation phase: establish — defining and recording the required security settings creates the baseline. Automated push: deploy — distributing the baseline to all systems implements it. Drift remediation + continuous monitoring: maintain — detecting deviation, remediating it, and monitoring for future drift are all maintain-phase activities"},
        {id:"c", label:"All three activities are deployment activities — establishing, pushing, and monitoring baseline configurations are all sub-tasks of the unified deployment phase that spans the entire baseline lifecycle"},
        {id:"d", label:"Documentation phase: maintain — baselines are maintained through documentation updates. Automated push: establish — pushing configurations to servers establishes the baseline on each individual system. Drift remediation: deploy — redeploying correct configurations to drifted systems is a deployment activity"},

      correct:"b",
      explanation:"Establish = define and document the baseline — what settings, configurations, and patch levels are required. Deploy = distribute and apply the baseline to target systems. Maintain = monitor for drift, remediate deviations, and update the baseline as requirements change. These three phases are sequential and ongoing — a baseline program that only establishes and deploys without maintaining will drift over time, as the 23 servers demonstrate.",
      exam_tip:"Establish = create/define the baseline. Deploy = push it to systems. Maintain = monitor, remediate drift, update. All three are required for an effective baseline program. Configuration drift = systems deviating from the approved baseline over time. Continuous monitoring is a maintain-phase control.",
    },
    {
      id:"q2",
      q:"A security architect is prioritizing hardening efforts across four system categories in a manufacturing environment: (1) general-purpose Windows servers running business applications with standard patch management and EDR agents installed; (2) employee laptops running Windows 11 with full-disk encryption, EDR, and automated patch management; (3) IP-connected temperature sensors and environmental monitors on the factory floor running embedded firmware with no patch mechanism and no authentication — they transmit sensor data in plaintext; (4) programmable logic controllers managing assembly line machinery, running real-time operating systems that cannot be patched without halting production and have no network segmentation from the corporate network. Which systems represent the HIGHEST security risk and require the most urgent hardening attention?",
      options:[
        {id:"a", label:"Category 1 — general-purpose servers are the highest risk because they host business applications and are internet-facing, making them the primary target for external attackers and the most likely entry point for ransomware"},
        {id:"b", label:"Category 2 — employee laptops are the highest risk because users are the primary attack vector through phishing, and laptops leave the corporate network perimeter, exposing them to untrusted networks"},
        {id:"c", label:"Categories 3 and 4 — IoT sensors with no authentication or patch mechanism and ICS/SCADA PLCs running unpatched RTOS with no network segmentation represent the highest risk. They cannot be patched, cannot authenticate connections, run legacy or specialized operating systems with limited security controls, and in the case of PLCs, a compromise could cause physical harm to equipment or personnel. These systems have the highest impact potential and the fewest compensating controls"},
        {id:"d", label:"All four categories present equal risk — modern threat actors target all system types equally, and the presence of EDR on servers and laptops does not meaningfully reduce their risk compared to IoT and ICS systems"},
      ],
      correct:"c",
      explanation:"IoT devices and ICS/SCADA systems represent the highest hardening priority for several compounding reasons: they typically cannot be patched (no patch mechanism or production halt required), lack authentication, run specialized or legacy operating systems with no security tooling, and often have no network segmentation. ICS/SCADA compromise carries physical consequence risk — assembly line PLCs controlling machinery can cause equipment damage or personnel injury if manipulated. RTOS (Real-Time Operating Systems) are designed for deterministic performance, not security, and rarely support modern security agents.",
      exam_tip:"IoT = no patch mechanism, no authentication, plaintext transmission, embedded firmware. ICS/SCADA = operational technology, physical consequence risk, RTOS, patching requires production downtime. Both = hardest to secure, fewest compensating controls, highest impact potential. Segmentation is the primary compensating control when patching is impossible — air gap or VLAN isolation from corporate networks.",
    },
    {
      id:"q3",
      q:"A company is choosing a mobile device policy for three employee groups. Group A consists of executives who insist on using their personal iPhones and will not accept corporate-issued devices — IT must support whatever personal device they choose. Group B consists of field technicians who need mobile devices for work but the company wants to control the device, the OS version, and all installed applications while still allowing some personal use. Group C consists of contractors who use their own devices but the company needs to ensure corporate data is isolated from personal data and can be remotely wiped from the corporate partition without touching personal content. Which option CORRECTLY maps each group to its deployment model?",
      options:[

        {id:"b", label:"Group A: CYOD — executives choose from an approved device list. Group B: BYOD — technicians bring personal devices that the company manages through MDM. Group C: COPE — corporate-owned devices issued to contractors with personal use permitted"},
        {id:"c", label:"Group A: BYOD — employees use personal devices, IT has limited control, highest user flexibility and lowest corporate control. Group B: COPE — corporate-owned, personally enabled — company controls the device and OS while permitting personal use. Group C: CYOD — choose your own device — personal device with corporate containerization allowing selective remote wipe of corporate data without affecting personal content"},

      exam_tip:"BYOD = personal device, user choice, minimal corporate control, highest risk. COPE = corporate-owned, company controls everything, personal use permitted. CYOD = personal device or approved list, corporate container, selective wipe. The key CYOD differentiator: selective remote wipe — corporate data can be removed without wiping personal content. MDM (Mobile Device Management) enforces policy across all three models.",

    {
      id:"q4",
      q:"A security engineer is reviewing application security controls for a web application that handles financial transactions. She evaluates five controls: (1) all user-supplied input is checked against an allowlist before being processed by the backend; (2) session tokens are flagged so browsers cannot access them via JavaScript; (3) a suspicious file uploaded by a user is executed in an isolated virtual environment to observe its behavior before being allowed into production; (4) the application's source code is scanned by an automated tool before each release to identify insecure coding patterns without executing the code; (5) each software release is digitally signed by the development team's certificate, and the deployment pipeline verifies the signature before installing the package. Which option CORRECTLY identifies all five controls?",
      options:[
        {id:"a", label:"(1) Static analysis — analyzing input patterns. (2) Input validation — validating cookie security settings. (3) Code signing — signing uploaded files for integrity. (4) Sandboxing — isolating code analysis in a secure environment. (5) Secure cookies — signing cookies with deployment certificates"},
        {id:"b", label:"(1) Input validation — allowlist-based filtering of user-supplied input. (2) Secure cookies — HttpOnly flag preventing JavaScript access to session tokens. (3) Sandboxing — executing suspicious files in an isolated environment to observe behavior safely. (4) Static code analysis — automated source code scanning for insecure patterns without execution. (5) Code signing — digitally signing releases to verify integrity and authenticity before deployment"},
        {id:"c", label:"(1) Input validation — correctly identified. (2) Secure cookies — correctly identified. (3) Static analysis — behavioral observation is a form of static analysis. (4) Dynamic analysis — running automated scans without execution is dynamic testing. (5) Code signing — correctly identified"},
        {id:"d", label:"All five are forms of input validation — validating cookies, sandboxing uploads, scanning code, and signing releases are all methods of validating input at different layers of the application stack"},

      exam_tip:"Input validation = allowlist/blocklist user input, prevents injection. Secure cookies = HttpOnly (no JS access), Secure (HTTPS only). Sandboxing = isolated execution environment for untrusted code. Static analysis = source code scanning without execution, pre-release. Dynamic analysis = testing running code. Code signing = cryptographic signature on releases, verifies integrity + authenticity. Static = no execution; dynamic = with execution; sandbox = isolated execution.",

      q:"A company decommissions three categories of storage media containing different data classifications. Category A: SSDs from HR workstations containing employee PII — the company wants to reuse these drives in a lower-security environment. Category B: hard drives from a classified government contract environment — these must be destroyed and the company must provide documentation to the client proving destruction. Category C: backup tapes containing financial records subject to a 7-year regulatory retention requirement — these must be decommissioned from active use but the data must remain accessible for the retention period. Which option CORRECTLY maps each category to its appropriate disposal approach?",
      options:[
        {id:"a", label:"Category A: destruction — PII requires physical destruction to ensure no data recovery. Category B: sanitization — government drives should be sanitized and returned to the vendor. Category C: certification — tapes should be certified as destroyed and the data reconstructed from other sources for the retention period"},
        {id:"b", label:"All three categories require physical destruction — any storage media that has held sensitive data must be physically destroyed regardless of reuse requirements or retention obligations"},
        {id:"c", label:"Category A: data retention — PII must be retained for regulatory purposes, so drives should be archived rather than sanitized. Category B: sanitization — government drives should be sanitized using DoD 5220.22-M standard. Category C: destruction — financial records should be destroyed after the retention period expires, but tapes should be destroyed now and data migrated to a compliant archive"},
        {id:"d", label:"Category A: sanitization — cryptographic erase or multi-pass overwrite removes PII while preserving the drive for reuse. Category B: destruction + certification — physical destruction (shredding/degaussing) with documented certification satisfies the client's proof requirement. Category C: data retention policy — tapes are retained in a secure archive for the full 7-year regulatory period before disposal"},

      exam_tip:"Sanitization = data removed, media reusable. Methods: cryptographic erase, secure overwrite, degaussing. Destruction = media physically destroyed, not reusable. Methods: shredding, incineration, disintegration. Certification = documented proof of destruction. Data retention = legal/regulatory requirement to preserve data for a defined period — not disposal. The trap: retention and disposal are opposites — you cannot dispose of data that is under a retention hold.",

      id:"q6",
      q:"A security team uses four methods to identify vulnerabilities across their environment. Method 1: an automated tool scans all network-accessible systems weekly, checking for known CVEs, misconfigurations, and missing patches using a signature database. Method 2: a contracted security firm attempts to exploit vulnerabilities in the web application using the same techniques an attacker would use, with the goal of gaining unauthorized access. Method 3: the team subscribes to commercial and open-source intelligence feeds that provide information on newly discovered vulnerabilities, active exploit campaigns, and attacker TTPs before internal scans detect them. Method 4: a compliance auditor manually reviews system configurations, access controls, and patch logs against a defined security standard. Which option CORRECTLY identifies all four methods?",
      options:[
        {id:"a", label:"Method 1: penetration testing — automated scanning simulates attacker behavior. Method 2: vulnerability scan — contracted firms run automated scans with commercial tools. Method 3: system audit — reviewing intelligence feeds audits the threat landscape. Method 4: threat feed — auditors consume threat intelligence to assess compliance"},
        {id:"b", label:"Method 1: vulnerability scan — automated, signature-based detection of known CVEs and misconfigurations. Method 2: penetration testing — authorized simulated attack to identify and exploit vulnerabilities. Method 3: threat intelligence feed — external intelligence on emerging vulnerabilities and active exploits. Method 4: system/process audit — manual review of configurations and controls against a defined standard"},
        {id:"c", label:"Method 1: vulnerability scan — correctly identified. Method 2: red team exercise — contracted firms conduct red team operations, not penetration tests. Method 3: OSINT — open-source intelligence is the only legitimate form of threat feed. Method 4: vulnerability scan — manual configuration review is a form of manual vulnerability scanning"},

      exam_tip:"Vulnerability scan = automated, known CVEs, signature-based, broad coverage. Penetration test = authorized exploitation attempt, deeper than scanning, tests real exploitability. Threat feed = external intelligence, emerging threats, attacker TTPs, earlier warning. System audit = manual, standards-based, configuration and process review. The trap: pen testing is not just scanning — it attempts exploitation. Scans identify; pen tests exploit.",

    {
      id:"q7",
      q:"A vulnerability scanner reports four findings on an internet-facing web server. Finding 1: CVSSv3 Base Score 9.8 — remote code execution, network-exploitable, no authentication required, no user interaction. Finding 2: CVSSv3 Base Score 7.2 — SQL injection, requires authentication, low-privilege account needed. Finding 3: CVSSv3 Base Score 9.8 (same base score as Finding 1) — but the environmental score is adjusted to 6.1 because the affected component has no internet exposure, handles no sensitive data, and compensating controls (WAF, network segmentation) are in place. Finding 4: CVSSv3 Base Score 4.3 — information disclosure, but the system is the primary authentication server for all 3,000 employees and the vulnerability exposes password hashes. Which option CORRECTLY explains how to prioritize these findings for remediation?",
      options:[
        {id:"a", label:"Priority order: Finding 1 first, Finding 4 second, Finding 2 third, Finding 3 last. Finding 1 is critical: unauthenticated RCE on an internet-facing system with no compensating controls. Finding 4 ranks above Finding 2 despite a lower base score because organizational context — primary auth server, 3,000 users, password hash exposure — elevates its real-world impact beyond the base score. Finding 3 deprioritizes despite its 9.8 base score because environmental variables (no internet exposure, compensating controls) reduce actual risk to 6.1. Finding 2 requires authentication, reducing exploitability"},
        {id:"b", label:"Findings 1 and 3 are equal priority because they share the same base score of 9.8 — CVSS base scores are the authoritative prioritization metric and environmental adjustments should not be used to reduce remediation urgency for critical vulnerabilities"},
        {id:"c", label:"Priority order: Findings 1 and 3 tied first, Finding 2 second, Finding 4 last. Base score is the only valid prioritization metric — environmental adjustments are estimates and should not override the base score. Finding 4 has the lowest score and is lowest priority regardless of the system's role"},
        {id:"d", label:"All four findings should be remediated simultaneously — vulnerability prioritization is a compliance violation because it implies some vulnerabilities are acceptable to leave unpatched, which contradicts zero-tolerance vulnerability management policy"},

      correct:"a",
      explanation:"CVSS base scores provide a starting point but must be adjusted by environmental and temporal variables for accurate prioritization. Finding 3 has the same base score as Finding 1 but a 6.1 environmental score because compensating controls and lack of internet exposure reduce actual exploitability — it is correctly deprioritized. Finding 4's low base score (4.3) understates its organizational impact: the primary authentication server for 3,000 users exposing password hashes is a critical finding regardless of score. Organizational context — asset criticality, data sensitivity, exposure — must inform prioritization alongside CVSS.",
      exam_tip:"CVSS Base Score = technical severity, no environmental context. Environmental Score = adjusts for organizational context (compensating controls, exposure, data sensitivity). Temporal Score = adjusts for exploit availability and patch status. Prioritization rule: base score is a starting point, not the final answer. High base score + strong compensating controls = lower actual priority. Low base score + critical asset + sensitive data = higher actual priority. Always factor asset criticality and exposure.",

    {
      id:"q8",
      q:"A vulnerability assessment identifies four findings across an organization's systems. The security team must select the most appropriate response for each. Finding A: a critical RCE vulnerability in Apache on an internet-facing web server — the vendor patch has been available for 10 days. Finding B: a high-severity vulnerability in a legacy industrial control system — no vendor patch exists, and the system cannot be taken offline without halting manufacturing for two weeks. Finding C: a medium-severity vulnerability in a SaaS application managed entirely by the vendor — the organization has no ability to patch it directly. Finding D: a low-severity vulnerability in an internal tool — after risk assessment, leadership formally accepts the risk because remediation cost exceeds the asset's value. Which option CORRECTLY maps each finding to its response strategy?",
      options:[
        {id:"a", label:"Finding A: risk acceptance — critical vulnerabilities on internet-facing systems should be formally accepted until a maintenance window is available. Finding B: patching — the vendor will eventually release a patch for the ICS system. Finding C: segmentation — the organization should network-segment the SaaS application. Finding D: compensating control — a compensating control reduces the risk to acceptable levels"},
        {id:"b", label:"Finding A: patching — apply the available vendor patch to remediate the RCE vulnerability. Finding B: compensating control — implement network segmentation, enhanced monitoring, or access restrictions to reduce risk when patching is impossible. Finding C: insurance/transfer — the risk is transferred to the vendor through the SaaS contract and SLA; the organization monitors for vendor remediation. Finding D: risk acceptance — leadership formally acknowledges and accepts the residual risk after determining remediation cost exceeds value"},
        {id:"c", label:"Finding A: compensating control — WAF rules can compensate for the unpatched RCE until a patch is applied. Finding B: risk acceptance — manufacturing downtime risk justifies accepting the vulnerability. Finding C: patching — the organization should demand the vendor patch the SaaS vulnerability immediately. Finding D: segmentation — isolating the internal tool segments the low-severity vulnerability from the rest of the network"},

      exam_tip:"Patching = vendor patch available, apply it. Compensating control = no patch available, reduce risk through alternative means (segmentation, monitoring, access restriction). Insurance/transfer = risk shifted to another party (vendor SLA, cyber insurance). Risk acceptance = formally documented decision not to remediate, leadership-approved. Segmentation = isolates vulnerable systems, reduces exposure. The trap: compensating controls are not a substitute for patching when a patch is available — they are used when patching is not possible.",

    {
      id:"q9",
      q:"A security operations center implements a monitoring architecture. Raw logs from 847 endpoints, 23 firewalls, 6 IDS sensors, and 14 applications are forwarded to a central platform that normalizes and indexes them for querying and correlation. The platform applies detection rules that fire alerts when suspicious patterns are identified across multiple log sources. The platform also generates weekly PDF summaries of alert volumes, top threat categories, and mean time to detect. A compliance requirement mandates that all logs be retained for 13 months. The SOC manager reviews a real-time display showing current alert queue depth, active incidents, and analyst workload updated every 30 seconds. Which option CORRECTLY identifies the four functions and explains the role of the central platform?",
      options:[
        {id:"a", label:"Log forwarding: vulnerability scanning — sending logs to a central platform scans them for vulnerabilities. Correlation and alerting: IDS — applying detection rules to logs is an IDS function. Weekly PDF: dashboard — dashboards generate scheduled PDF reports. 13-month retention: legal hold — compliance retention is a legal hold requirement"},
        {id:"b", label:"All functions are performed by the dashboard — modern SOC dashboards aggregate logs, correlate events, generate reports, archive data, and display real-time metrics in a unified interface"},
        {id:"c", label:"Log forwarding: archiving — forwarding logs to central storage archives them. Detection rules: automated reporting — rules that generate alerts are automated reporting functions. Weekly PDF: dashboard — PDF summaries are dashboard exports. Retention: log aggregation — retaining logs aggregates them over time"},
        {id:"d", label:"Log forwarding and normalization: log aggregation — centralizing and normalizing logs from diverse sources. Detection rule alerting: SIEM correlation — Security Information and Event Management platform applies rules across aggregated logs to generate alerts. Weekly PDF: automated report — scheduled, recurring document with aggregated metrics. 13-month retention: archiving — long-term log storage for compliance. Real-time display: dashboard — live visual interface showing current operational state"},
      ],
      correct:"d",
      explanation:"Log aggregation: centralizing logs from diverse sources into a normalized, queryable format. SIEM: applies correlation rules across aggregated logs to detect patterns that individual log sources cannot reveal — the central platform performing cross-source detection is the defining SIEM function. Automated reports: scheduled, recurring documents with aggregated metrics — different from dashboards in that they are periodic point-in-time snapshots rather than live displays. Archiving: long-term log retention for compliance, forensics, and legal requirements. Dashboard: real-time visual display of current operational metrics.",
      exam_tip:"Log aggregation = centralize + normalize logs from multiple sources. SIEM = correlation engine, cross-source detection rules, alert generation. Automated report = scheduled, recurring, historical metrics. Dashboard = real-time, live, current state. Archiving = long-term retention for compliance/forensics. The trap: SIEM is not just storage — its value is correlation across sources. A log repository without correlation rules is not a SIEM.",
    },
    {
      id:"q10",
      q:"A SOC team uses four monitoring tools that each serve a distinct purpose. Tool A monitors all endpoints for file system changes, registry modifications, and data leaving the organization — when a user attempts to email a file containing credit card numbers, Tool A intercepts and blocks the transmission. Tool B receives trap messages from network devices whenever a device experiences a fault, threshold breach, or configuration change — the NOC uses these messages to detect network device failures before users report them. Tool C collects IP flow records from routers and switches showing source IP, destination IP, port, protocol, bytes transferred, and connection duration for every network conversation — analysts use it to detect beaconing and unusual data volumes. Tool D runs credentialed scans against all systems weekly and produces a report of CVEs, missing patches, and configuration weaknesses ranked by severity. Which option CORRECTLY identifies all four tools?",
      options:[
        {id:"a", label:"Tool A: SIEM — SIEMs monitor endpoints and block data transmission. Tool B: NetFlow — NetFlow collects trap messages from network devices. Tool C: DLP — DLP analyzes flow records for data volume anomalies. Tool D: automated report — weekly reports identify CVEs from manual review"},
        {id:"b", label:"Tool A: DLP (Data Loss Prevention) — monitors and blocks unauthorized data exfiltration based on content inspection. Tool B: SNMP traps — network device notifications sent to a management station when threshold or fault conditions occur. Tool C: NetFlow — IP flow telemetry showing connection metadata for traffic analysis. Tool D: vulnerability scanner — credentialed scanning producing CVE and configuration findings ranked by severity"},
        {id:"c", label:"Tool A: antivirus — blocking email with credit card numbers is a malware detection function. Tool B: SIEM — SIEM receives alerts from network devices. Tool C: packet capture — flow records are packet capture metadata. Tool D: penetration testing tool — credentialed scanning is a pen testing technique"},
        {id:"d", label:"All four are SIEM functions — DLP, SNMP monitoring, NetFlow analysis, and vulnerability scanning are all integrated into modern SIEM platforms, making them SIEM sub-components rather than distinct tools"},
      ],
      correct:"b",
      explanation:"DLP inspects content and enforces data handling policies — blocking email containing credit card numbers (PAN data) is a classic DLP use case. SNMP traps are asynchronous notifications sent by network devices to a management station when configurable conditions occur — fault detection and threshold monitoring. NetFlow collects IP flow records (not full packets) from network infrastructure — flow metadata enables traffic pattern analysis, beaconing detection, and volume anomaly identification. Vulnerability scanners perform credentialed or uncredentialed scanning to identify CVEs, missing patches, and misconfigurations.",
      exam_tip:"DLP = content inspection, data exfiltration prevention, policy enforcement. SNMP traps = device-initiated fault/threshold notifications to management station. NetFlow = IP flow records, connection metadata, traffic pattern analysis (not full packets). Vulnerability scanner = CVE identification, patch gap detection, configuration weakness. The trap: NetFlow ≠ packet capture — NetFlow shows who talked to whom, how much, and when. PCAP shows what was in the conversation.",
